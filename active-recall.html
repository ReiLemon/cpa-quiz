CとABM", "imgs": ["active-recall-images/kanri_16-3_p1.webp", "active-recall-images/kanri_16-3_p2.webp"]}, {"chapter": "第16章 活動基準原価計算", "q": "問題16-4", "imp": "B", "diff": "A", "topic": "ABC（製品別原価計算）", "imgs": ["active-recall-images/kanri_16-4_p1.webp", "active-recall-images/kanri_16-4_p2.webp"]}];

    const CATEGORIES = [
      { id: 'zaimu-keisan', name: '財務会計（計算）', color: 'red', hasData: true, data: ZAIMU_KEISAN },
      { id: 'kanri-keisan', name: '管理会計（計算）', color: 'orange', hasData: true, data: KANRI_KEISAN },

      { id: 'kanri-riron', name: '管理会計（理論）', color: 'orange' },

    ];

    /* 全科目の評価件数を集計するヘルパー */
    const getRatingCounts = () => {
      const counts = { '全然ダメ': 0, '曖昧': 0, '思い出せた': 0 };
      CATEGORIES.forEach(cat => {
        if (!cat.hasData || !cat.data) return;
        const state = getState(cat.id);
        Object.values(state).forEach(s => {
          if (s.mastered) return;
          if (s.rating && counts.hasOwnProperty(s.rating)) counts[s.rating]++;
        });
      });
      return counts;
    };

    /* 全然ダメが5問以上（前日以前の分）なら新規ロック */
    const isLockedByZenzenDame = (catId) => {
      const state = getState(catId);
      const todayStart = new Date(); todayStart.setHours(0,0,0,0);
      const todayMs = todayStart.getTime();
      let count = 0;
      Object.values(state).forEach(s => {
        if (s.mastered) return;
        if (s.rating === '全然ダメ' && s.ratedAt && s.ratedAt < todayMs) count++;
      });
      return count >= 5;
    };

    const getStorageKey = (catId) => `ar3_${catId}`;
    const getState = (catId) => {
      const data = localStorage.getItem(getStorageKey(catId));
      return data ? JSON.parse(data) : {};
    };
    const setState = (catId, state) => {
      localStorage.setItem(getStorageKey(catId), JSON.stringify(state));
    };

    /* 起動時: 旧ロジック(時刻ベース)のnextReviewを日付境界(0:00)に正規化 */
    (() => {
      const migKey = 'ar3_date_migrate_v1';
      if (localStorage.getItem(migKey)) return;
      try {
        CATEGORIES.forEach(cat => {
          const state = getState(cat.id);
          let changed = false;
          Object.keys(state).forEach(k => {
            const s = state[k];
            if (s && s.nextReview && !s.mastered) {
              const d = new Date(s.nextReview);
              d.setHours(0,0,0,0);
              if (d.getTime() !== s.nextReview) {
                s.nextReview = d.getTime();
                changed = true;
              }
            }
          });
          if (changed) setState(cat.id, state);
        });
      } catch(e){}
      localStorage.setItem(migKey, '1');
    })();

    const shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    const getDueProblems = (catId, problems) => {
      const state = getState(catId);
      const now = new Date().getTime();
      return problems.filter(p => {
        if (!p.imgs || p.imgs.length === 0) return false;
        const key = `${p.q}`;
        const status = state[key];
        if (!status) return true;
        if (status.mastered) return false;
        return status.nextReview && status.nextReview <= now;
      });
    };

    const getColorClasses = (color) => {
      const colors = {
        blue: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700' },
        red: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700' },
        green: { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-700' },
        orange: { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-700' },
        purple: { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700' },
        teal: { bg: 'bg-teal-50', border: 'border-teal-200', text: 'text-teal-700' },
      };
      return colors[color] || colors.blue;
    };

    const THEME_MAP = {
      red:    { accent:'#e53e3e', accent2:'#c53030', accentLight:'#fff5f5', accentShadow:'rgba(229,62,62,.12)' },
      orange: { accent:'#e67e22', accent2:'#d35400', accentLight:'#fff8f0', accentShadow:'rgba(230,126,34,.12)' },
      blue:   { accent:'#3182ce', accent2:'#2b6cb0', accentLight:'#ebf8ff', accentShadow:'rgba(49,130,206,.12)' },
      green:  { accent:'#38a169', accent2:'#2f855a', accentLight:'#f0fff4', accentShadow:'rgba(56,161,105,.12)' },
      purple: { accent:'#805ad5', accent2:'#6b46c1', accentLight:'#faf5ff', accentShadow:'rgba(128,90,213,.12)' },
      teal:   { accent:'#319795', accent2:'#2c7a7b', accentLight:'#e6fffa', accentShadow:'rgba(49,151,149,.12)' },
    };
    const applyTheme = (color) => {
      const t = THEME_MAP[color] || THEME_MAP.red;
      const r = document.documentElement.style;
      r.setProperty('--accent', t.accent);
      r.setProperty('--accent2', t.accent2);
      r.setProperty('--accent-light', t.accentLight);
      r.setProperty('--accent-shadow', t.accentShadow);
    };
    const resetTheme = () => {
      const r = document.documentElement.style;
      ['--accent','--accent2','--accent-light','--accent-shadow'].forEach(p => r.removeProperty(p));
    };

    /* ── TodoPanel (reusable) ── */
    const TodoPanel = ({ storageKey, title, placeholder, style: ws }) => {
      const [items, setItems] = useState([]);
      const [input, setInput] = useState('');
      useEffect(() => { const d = localStorage.getItem(storageKey); if (d) setItems(JSON.parse(d)); }, [storageKey]);
      const save = (n) => { setItems(n); localStorage.setItem(storageKey, JSON.stringify(n)); };
      const add = () => { if (!input.trim()) return; save([...items, { id: Date.now(), text: input.trim(), done: false }]); setInput(''); };
      const toggle = (id) => save(items.map(it => it.id === id ? { ...it, done: !it.done } : it));
      return (
        <div style={{background:'var(--card)',borderRadius:12,padding:12,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',minHeight:0,...(ws||{})}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:6}}>To Do List</div>
          <div style={{display:'flex',gap:5,marginBottom:6}}>
            <input type="text" value={input} onChange={e => setInput(e.target.value)}
              placeholder="今日のやることを追加" style={{flex:1,padding:'5px 8px',border:'1px solid var(--border)',borderRadius:6,fontSize:12,outline:'none',background:'var(--card2)'}} />
            <button onClick={add} style={{padding:'5px 10px',background:'var(--sky,#4a9bd9)',color:'#fff',border:'none',borderRadius:6,fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>追加</button>
          </div>
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
            {items.length===0 && <div style={{color:'var(--text2)',fontSize:11,textAlign:'center',padding:10}}>まだ項目がありません</div>}
            {items.map(it => (
              <div key={it.id} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 6px',background:it.done?'var(--card2)':'var(--card)',borderRadius:5,border:'1px solid var(--border)'}}>
                <span style={{flex:1,fontSize:12,color:it.done?'var(--text2)':'var(--text)',textDecoration:it.done?'line-through':'none',wordBreak:'break-word'}}>{it.text}</span>
                <input type="checkbox" checked={it.done} onChange={() => toggle(it.id)} style={{accentColor:'var(--sky,#4a9bd9)',cursor:'pointer',width:14,height:14,flexShrink:0}} />
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ── MemoPanel ── */
    const MemoPanel = ({ storageKey, title, placeholder, style: ws }) => {
      const [text, setText] = useState('');
      useEffect(() => { const d = localStorage.getItem(storageKey); if (d) setText(d); }, [storageKey]);
      const save = (v) => { setText(v); localStorage.setItem(storageKey, v); };
      return (
        <div style={{background:'var(--card)',borderRadius:12,padding:12,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',minHeight:0,...(ws||{})}}>
          <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:6}}>{title}</div>
          <textarea value={text} onChange={e => save(e.target.value)} placeholder={placeholder}
            style={{flex:1,width:'100%',padding:'6px 8px',border:'1px solid var(--border)',borderRadius:8,fontSize:12,outline:'none',background:'var(--card2)',resize:'none',lineHeight:1.7,color:'var(--text)',boxSizing:'border-box',minHeight:50}} />
        </div>
      );
    };

    /* ── Study Timer (本日の勉強時間) ── */
    const StudyTimer = () => {
      const today = new Date();
      const dayStr = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
      const SK_DAY = `ar3_timer_day_${dayStr}`;
      const SK_RUN = 'ar3_timer_running';
      const SK_START = 'ar3_timer_start';
      const SK_MONTH = 'ar3_study_time';

      const [elapsed, setElapsed] = useState(0);     /* 今日の累積秒 */
      const [running, setRunning] = useState(false);
      const intervalRef = React.useRef(null);

      /* 初期化: 保存済み秒数 + もし前回running中だったら差分を足す */
      useEffect(() => {
        let saved = parseInt(localStorage.getItem(SK_DAY) || '0', 10);
        const wasRunning = localStorage.getItem(SK_RUN) === '1';
        const startTs = parseInt(localStorage.getItem(SK_START) || '0', 10);

        /* 日付変更チェック: 前回のstartが今日でなければリセット＆月へ加算 */
        if (startTs > 0) {
          const sd = new Date(startTs);
          const startDay = `${sd.getFullYear()}-${sd.getMonth()+1}-${sd.getDate()}`;
          if (startDay !== dayStr && wasRunning) {
            /* 前日分の残りを月に加算してリセット */
            const prevEnd = new Date(sd.getFullYear(), sd.getMonth(), sd.getDate(), 23, 59, 59).getTime();
            const prevExtra = Math.floor((prevEnd - startTs) / 1000);
            const prevDayKey = `ar3_timer_day_${startDay}`;
            const prevSaved = parseInt(localStorage.getItem(prevDayKey) || '0', 10);
            const prevTotal = prevSaved + prevExtra;
            localStorage.setItem(prevDayKey, String(prevTotal));
            flushDayToMonth(prevTotal, new Date(startTs));
            saved = 0;
            localStorage.setItem(SK_DAY, '0');
            localStorage.removeItem(SK_RUN);
            localStorage.removeItem(SK_START);
          }
        }

        if (wasRunning && startTs > 0) {
          const extra = Math.floor((Date.now() - startTs) / 1000);
          saved += extra;
          setElapsed(saved);
          setRunning(true);
          localStorage.setItem(SK_START, String(Date.now()));
          localStorage.setItem(SK_DAY, String(saved));
        } else {
          setElapsed(saved);
        }
      }, []);

      /* 月累計へ加算するヘルパー */
      const flushDayToMonth = (daySecs, dateObj) => {
        const d = dateObj || new Date();
        const mk = SK_MONTH;
        const raw = localStorage.getItem(mk);
        const data = raw ? JSON.parse(raw) : { monthH: 135, monthM: 50, totalH: 1731, totalM: 52, lastFlushed: '' };
        const addM = Math.floor(daySecs / 60);
        let mh = (data.monthH || 0), mm = (data.monthM || 0) + addM;
        mh += Math.floor(mm / 60); mm = mm % 60;
        let th = (data.totalH || 0), tm = (data.totalM || 0) + addM;
        th += Math.floor(tm / 60); tm = tm % 60;
        data.monthH = mh; data.monthM = mm; data.totalH = th; data.totalM = tm;
        localStorage.setItem(mk, JSON.stringify(data));
      };

      /* タイマー tick */
      useEffect(() => {
        if (running) {
          intervalRef.current = setInterval(() => {
            setElapsed(prev => {
              const next = prev + 1;
              localStorage.setItem(SK_DAY, String(next));
              return next;
            });
          }, 1000);
        } else {
          clearInterval(intervalRef.current);
        }
        return () => clearInterval(intervalRef.current);
      }, [running]);

      const start = () => {
        setRunning(true);
        localStorage.setItem(SK_RUN, '1');
        localStorage.setItem(SK_START, String(Date.now()));
      };
      const stop = () => {
        setRunning(false);
        localStorage.removeItem(SK_RUN);
        localStorage.removeItem(SK_START);
      };

      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      const pad = (n) => String(n).padStart(2, '0');

      return (
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:"'SF Mono','Menlo',monospace",fontSize:30,fontWeight:900,color:'var(--text)',letterSpacing:2}}>
            {h > 0 && <>{h}<span style={{fontSize:14}}>:</span></>}{pad(m)}<span style={{fontSize:14}}>:</span>{pad(s)}
          </div>
          <div style={{marginTop:8}}>
            {!running ? (
              <button onClick={start} style={{padding:'6px 24px',background:'#38a169',color:'#fff',border:'none',borderRadius:8,fontWeight:800,fontSize:13,cursor:'pointer',letterSpacing:1}}>▶ START</button>
            ) : (
              <button onClick={stop} style={{padding:'6px 24px',background:'#e53e3e',color:'#fff',border:'none',borderRadius:8,fontWeight:800,fontSize:13,cursor:'pointer',letterSpacing:1}}>■ STOP</button>
            )}
          </div>
        </div>
      );
    };

    /* ── Monthly Study Time Display (3月の勉強時間 + 全累積) ── */

            <span style={{fontWeight:700}}>全累積</span>　{data.totalH}<span style={{fontSize:10}}>時間</span>{data.totalM}<span style={{fontSize:10}}>分</span>

    /* ── StudyDiary: 過去の勉強文章 (日付ナビ付き) ── */
    const StudyDiary = () => {
      const [offset, setOffset] = useState(0);
      const getDateForOffset = (off) => {
        const d = new Date(); d.setDate(d.getDate() - off); return d;
      };
      const d = getDateForOffset(offset);
      const dk = `ar3_diary_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
      const [text, setText] = useState('');
      useEffect(() => {
        const saved = localStorage.getItem(dk);
        setText(saved || '');
      }, [dk]);
      const save = (v) => { setText(v); localStorage.setItem(dk, v); };
      const fmt = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}）`;
      const isToday = offset === 0;
      return (

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>

            <button onClick={() => setOffset(o => Math.max(0, o-1))} disabled={offset===0} style={{background:'none',border:'none',fontSize:18,cursor: offset===0?'default':'pointer',color: offset===0?'#cee0f2':'#4a9bd9',padding:'0 6px'}}>▷</button>
          </div>

            placeholder={isToday ? "今日の勉強内容を書く..." : "この日の勉強記録..."}

        </div>
      );
    };

    /* 丸数字変換テーブル（前方定義） */
    const _N2C = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕','㉖','㉗','㉘','㉙','㉚','㉛','㉜','㉝','㉞','㉟'];
    /* 問題集の章番号 → テキスト巻(v) + テキスト内の章番号(tc) */
    /* 財務: 問題集34章 → テキスト①〜⑨ */
    const ZAIMU_MAP = {
      1:{v:1,tc:1},2:{v:1,tc:2},3:{v:1,tc:3},4:{v:1,tc:4},5:{v:1,tc:5},6:{v:1,tc:6},7:{v:1,tc:7},
      8:{v:2,tc:9},9:{v:2,tc:10},10:{v:2,tc:11},11:{v:2,tc:12},
      12:{v:3,tc:14},13:{v:3,tc:15},14:{v:3,tc:16},15:{v:3,tc:17},
      16:{v:4,tc:18},17:{v:4,tc:19},18:{v:4,tc:21},19:{v:4,tc:22},
      20:{v:5,tc:23},21:{v:5,tc:24},22:{v:5,tc:25},23:{v:5,tc:26},24:{v:5,tc:27},25:{v:5,tc:28},
      26:{v:6,tc:29},
      27:{v:8,tc:31},28:{v:8,tc:32},29:{v:8,tc:33},30:{v:8,tc:34},
      31:{v:9,tc:36},32:{v:7,tc:39},33:{v:7,tc:40},34:{v:1,tc:0}
    };
    /* 管理: 問題集16章 → テキスト①〜④ */
    const KANRI_MAP = {
      1:{v:1,tc:1},2:{v:1,tc:7},3:{v:1,tc:9},
      4:{v:2,tc:10},5:{v:2,tc:11},
      6:{v:2,tc:15},7:{v:3,tc:17},8:{v:3,tc:19},9:{v:3,tc:20},
      10:{v:3,tc:22},11:{v:3,tc:23},
      12:{v:4,tc:24},13:{v:4,tc:25},14:{v:4,tc:27},15:{v:4,tc:28},16:{v:4,tc:29}
    };
    /* 問題IDからテキスト巻+テキスト章番号+章名を取得 */
    const getProbInfo = (catId, qId, catData) => {
      const m = qId.match(/問題(\d+)-(\d+)/);
      if (!m) return null;
      const probCh = parseInt(m[1]);
      const map = catId === 'zaimu-keisan' ? ZAIMU_MAP : catId === 'kanri-keisan' ? KANRI_MAP : null;
      if (!map || !map[probCh]) return null;
      const { v, tc } = map[probCh];
      const volCircled = _N2C[v] || v;
      const tcCircled = tc > 0 ? (_N2C[tc] || tc) : '';
      // 章名（問題データから取得）
      const data = catData || [];
      const sameChapter = data.filter(p => p.q.startsWith('問題'+probCh+'-'));
      const chName = sameChapter.length > 0 ? (sameChapter[0].chapter || '').replace(/^第\d+章\s*/, '') : '';
      return { vol: 'テキスト'+volCircled, tcCircled, chName };
    };
    /* 問題データからimgsを検索するヘルパー */
    const findProbImgs = (catId, qId) => {
      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat || !cat.data) return null;
      const prob = cat.data.find(p => p.q === qId);
      return prob ? prob.imgs : null;
    };
    /* カテゴリデータを取得するヘルパー */
    const getCatData = (catId) => {
      const cat = CATEGORIES.find(c => c.id === catId);
      return (cat && cat.data) || [];
    };

    /* ── Category Select (top page) ── */
    const CategorySelect = ({ onSelect, onStartRecall }) => {
      const today = new Date();
      const dayKey = `ar3_todo_${today.getFullYear()}_${today.getMonth()+1}_${today.getDate()}`;
      const memoKey = `ar3_memo_${today.getFullYear()}_${today.getMonth()+1}_${today.getDate()}`;

      /* 今日とくべき問題: 「全然ダメ」「曖昧」で評価済み＆復習期日到来のみ */
      const allDue = React.useMemo(() => {
        const result = [];
        const now = Date.now();
        CATEGORIES.forEach(cat => {
          if (!cat.hasData || !cat.data) return;
          const state = getState(cat.id);
          cat.data.forEach(p => {
            if (!p.imgs || p.imgs.length === 0) return;
            const key = `${p.q}`;
            const s = state[key];
            if (!s) return;                     // 未回答は除外
            if (s.mastered) return;             // 完璧は除外
            if (s.rating !== '全然ダメ' && s.rating !== '曖昧') return;
            if (s.nextReview && s.nextReview > now) return; // まだ期日前
            result.push({ ...p, catId: cat.id, catName: cat.name, catColor: cat.color });
          });
        });
        return shuffle(result);
      }, []);

      /* 問題クリック → モーダル表示 */
      const [activeProblem, setActiveProblem] = useState(null);
      const [modalRonten, setModalRonten] = useState('');
      const [modalKaiho, setModalKaiho] = useState('');
      const [showPrevNotes, setShowPrevNotes] = useState(false);
      const [prevNotes, setPrevNotes] = useState(null);

      const [expandedNoteId, setExpandedNoteId] = useState(null);
      const [modalQueueIdx, setModalQueueIdx] = useState(-1);
      const [modalMarkerActive, setModalMarkerActive] = useState(false);
      const [modalMarkerColor, setModalMarkerColor] = useState('rgba(255,255,0,0.3)');
      const [modalEraseMode, setModalEraseMode] = useState(false);
      const modalCanvasRef = useRef(null);
      const modalPreviewRef = useRef(null);
      const modalImgRef = useRef(null);
      const modalDrawing = useRef(false);
      const modalStartPt = useRef(null);

      const modalGetPos = (e) => { const c = modalPreviewRef.current || modalCanvasRef.current; const r = c.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return {x:t.clientX-r.left, y:t.clientY-r.top}; };
      const modalSnapLine = (p1,p2) => { const dy=Math.abs(p2.y-p1.y), dx=Math.abs(p2.x-p1.x); if(dx>10&&dy<dx*0.15){const y=(p1.y+p2.y)/2; return{x1:p1.x,y1:y,x2:p2.x,y2:y};} return{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y}; };
      const modalStartDraw = (e) => { e.preventDefault(); modalDrawing.current=true; modalStartPt.current=modalGetPos(e); };
      const modalMoveDraw = (e) => { if(!modalDrawing.current) return; e.preventDefault(); const pv=modalPreviewRef.current; if(!pv) return; const ctx=pv.getContext('2d'); ctx.clearRect(0,0,pv.width,pv.height); const s=modalSnapLine(modalStartPt.current,modalGetPos(e)); ctx.save(); ctx.strokeStyle=modalEraseMode?'rgba(255,0,0,0.3)':modalMarkerColor; if(modalEraseMode) ctx.setLineDash([6,4]); ctx.lineWidth=modalEraseMode?28:14; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); ctx.restore(); };
      const modalEndDraw = (e) => { if(!modalDrawing.current) return; modalDrawing.current=false; const pv=modalPreviewRef.current; if(pv) pv.getContext('2d').clearRect(0,0,pv.width,pv.height); const refEl=modalPreviewRef.current||modalCanvasRef.current; const ep=e.changedTouches?{x:e.changedTouches[0].clientX-refEl.getBoundingClientRect().left,y:e.changedTouches[0].clientY-refEl.getBoundingClientRect().top}:modalGetPos(e); const c=modalCanvasRef.current; const ctx=c.getContext('2d'); const s=modalSnapLine(modalStartPt.current,ep); if(modalEraseMode){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.lineWidth=28;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();}else{ctx.save();ctx.globalCompositeOperation='source-over';ctx.strokeStyle=modalMarkerColor;ctx.lineWidth=14;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();} modalStartPt.current=null; if(activeProblem) { try{localStorage.setItem('ar3_mhl_'+activeProblem.catId+'_'+activeProblem.q, c.toDataURL('image/png'));}catch(e){} } };
      const modalSyncCanvas = () => { const c=modalCanvasRef.current; const img=modalImgRef.current; if(!c||!img) return; const container=img.parentElement; const w=container.scrollWidth||img.clientWidth; const h=container.scrollHeight||img.clientHeight; if(w===0||h===0) return; c.width=w; c.height=h; c.style.width=w+'px'; c.style.height=h+'px'; const pv=modalPreviewRef.current; if(pv){pv.width=w;pv.height=h;pv.style.width=w+'px';pv.style.height=h+'px';} };
      const modalRestoreCanvas = (p) => { const c=modalCanvasRef.current; if(!c) return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const d=localStorage.getItem('ar3_mhl_'+p.catId+'_'+p.q); if(d){const im=new window.Image(); im.onload=()=>{ctx.drawImage(im,0,0,c.width,c.height);}; im.src=d;} };

      const openProblem = (p, queueIdx, restoreNotes) => {
        // imgsがなければデータから検索して補完
        if (!p.imgs || p.imgs.length === 0) {
          const found = findProbImgs(p.catId, p.q);
          if (found) p = { ...p, imgs: found };
        }
        if (queueIdx === undefined) setModalQueueIdx(-1);
        setActiveProblem(p);
        if (restoreNotes) {
          // 計算ノートから開いた場合: 過去の書き込みを復元
          try {
            const bulkKey = `ar3_notes_${p.catId}`;
            const bulk = JSON.parse(localStorage.getItem(bulkKey) || '{}');
            const n = bulk[p.q];
            setModalRonten(n && n.ronten ? n.ronten : ''); setModalKaiho(n && n.kaiho ? n.kaiho : '');
          } catch(e) { setModalRonten(''); setModalKaiho(''); }
        } else {
          // 今日の復習から開いた場合: 空白で新規アクティブリコール
          setModalRonten(''); setModalKaiho('');
          // 過去の書き込みを読み込む
          try {
            const histKey = `ar3_history_${p.catId}_${p.q}`;
            const hist = JSON.parse(localStorage.getItem(histKey) || '[]');
            setPrevNotes(hist.length > 0 ? { ronten: hist[hist.length-1].ronten||'', kaiho: hist[hist.length-1].kaiho||'' } : null);
          } catch(e) { setPrevNotes(null); }
          setShowPrevNotes(false);
        }
        setModalMarkerActive(false); setModalEraseMode(false);
      };

      const saveModalNotes = () => {
        if (!activeProblem) return;
        // 個別キーに保存
        const nk = `ar3_notes_${activeProblem.catId}_${activeProblem.q}`;
        localStorage.setItem(nk, JSON.stringify({ ronten: modalRonten, kaiho: modalKaiho }));
        // 計算問題用のオブジェクト形式にも同期保存
        const bulkKey = `ar3_notes_${activeProblem.catId}`;
        try {
          const bulk = JSON.parse(localStorage.getItem(bulkKey) || '{}');
          if (modalRonten.trim() || modalKaiho.trim()) {
            bulk[activeProblem.q] = { ronten: modalRonten.trim(), kaiho: modalKaiho.trim() };
          }
          localStorage.setItem(bulkKey, JSON.stringify(bulk));
        } catch(e){}
      };

      const rateModal = (rating) => {
        saveModalNotes();
        const p = activeProblem;
        // 履歴に追加
        try {
          const histKey = `ar3_history_${p.catId}_${p.q}`;
          const hist = JSON.parse(localStorage.getItem(histKey) || '[]');
          hist.push({ ronten: modalRonten.trim(), kaiho: modalKaiho.trim(), rating, ratedAt: Date.now() });
          localStorage.setItem(histKey, JSON.stringify(hist));
        } catch(e){}
        const state = getState(p.catId);
        const key = `${p.q}`;
        const intervals = { '全然ダメ': 1, '曖昧': 3, '思い出せた': 7, '完璧': null };
        const days = intervals[rating];
        if (rating === '完璧') {
          state[key] = { mastered: true, lastRating: rating, ratedAt: Date.now() };
        } else {
          const tomorrow = new Date(); tomorrow.setHours(0,0,0,0); tomorrow.setDate(tomorrow.getDate() + days);
          state[key] = { nextReview: tomorrow.getTime(), rating, ratedAt: Date.now() };
        }
        setState(p.catId, state);
        // 次の問題へ進む（allDueの中で現在の問題の次を探す）
        const curIdx = modalQueueIdx >= 0 ? modalQueueIdx : allDue.findIndex(d => d.catId === p.catId && d.q === p.q);
        const nextIdx = curIdx + 1;
        if (nextIdx < allDue.length) {
          const next = allDue[nextIdx];
          setModalQueueIdx(nextIdx);
          openProblem(next);
        } else {
          setActiveProblem(null);
          setModalQueueIdx(-1);
        }
      };

      const makeNumberedKeyHandler = (getValue, setValue) => (e) => {
        if (e.key === 'Enter' && e.shiftKey) {
          e.preventDefault();
          const ta = e.target;
          const start = ta.selectionStart;
          const v = getValue();
          const lines = v.substring(0, start).split('\n');
          const nums = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
          const nextNum = lines.length < nums.length ? nums[lines.length] : '';
          const insert = '\n' + nextNum;
          const newVal = v.substring(0, start) + insert + v.substring(ta.selectionEnd);
          setValue(newVal);
          setTimeout(() => { ta.selectionStart = ta.selectionEnd = start + insert.length; }, 0);
        }
      };
      const handleKaihoKey = makeNumberedKeyHandler(() => modalKaiho, setModalKaiho);
      const handleRontenKey = makeNumberedKeyHandler(() => modalRonten, setModalRonten);

      /* ── デイリースケジュール（15分単位ドラッグ選択式） ── */
      const SCHEDULE_KEY = 'ar3_schedule_' + new Date().toISOString().slice(0,10);
      const SCHEDULE_TYPES = [
        { id:'sleep',   label:'睡眠', color:'#3d405b', text:'#fff' },
        { id:'zaimu',   label:'財務', color:'#e53e3e', text:'#fff' },
        { id:'kanri',   label:'管理', color:'#e67e22', text:'#fff' },
        { id:'kansa',   label:'監査', color:'#805ad5', text:'#fff' },
        { id:'kigyo',   label:'企業', color:'#319795', text:'#fff' },
      ];
      const SCHED_SLOTS = 96; // 24h × 4(15分)
      const SCHED_START = 5;  // 5時スタート
      const slotToTime = (slot) => { const h = (Math.floor(slot/4) + SCHED_START) % 24; const m = (slot%4)*15; return h + ':' + String(m).padStart(2,'0'); };

      const DailySchedule = () => {
        const blocksRef = useRef([]);
        const [blocks, _setBlocks] = useState(() => {
          try { const v = JSON.parse(localStorage.getItem(SCHEDULE_KEY)) || []; blocksRef.current = v; return v; } catch { return []; }
        });
        const setBlocks = (b) => { blocksRef.current = b; _setBlocks(b); localStorage.setItem(SCHEDULE_KEY, JSON.stringify(b)); };
        const dragRef = useRef({ active:false, start:0, end:0 });
        const [, forceUpdate] = useState(0);
        const [menuInfo, setMenuInfo] = useState(null); // {slot_s, slot_e, x}
        const barRef = useRef(null);

        const getSlotFromX = (clientX) => {
          if (!barRef.current) return 0;
          const rect = barRef.current.getBoundingClientRect();
          const ratio = Math.max(0, Math.min(0.999, (clientX - rect.left) / rect.width));
          return Math.floor(ratio * SCHED_SLOTS);
        };

        const onDown = (e) => {
          if (e.button !== 0) return;
          e.preventDefault();
          const s = getSlotFromX(e.clientX);
          dragRef.current = { active:true, start:s, end:s };
          setMenuInfo(null);
          forceUpdate(n => n+1);
        };
        const onMove = (e) => {
          if (!dragRef.current.active) return;
          dragRef.current.end = getSlotFromX(e.clientX);
          forceUpdate(n => n+1);
        };
        const onUp = (e) => {
          if (!dragRef.current.active) return;
          const d = dragRef.current;
          d.active = false;
          const s = Math.min(d.start, d.end);
          const en = Math.max(d.start, d.end) + 1;
          if (en - s < 1) return;
          const rect = barRef.current.getBoundingClientRect();
          const midPct = (s + en) / 2 / SCHED_SLOTS;
          setMenuInfo({ s, e: en, x: midPct * rect.width });
          forceUpdate(n => n+1);
        };

        const selectType = (type) => {
          if (!menuInfo) return;
          const nb = { start: menuInfo.s, end: menuInfo.e, type: type.id, label: type.label, color: type.color, text: type.text };
          let updated = [];
          blocksRef.current.forEach(b => {
            if (b.end <= nb.start || b.start >= nb.end) { updated.push(b); return; }
            if (b.start < nb.start) updated.push({ ...b, end: nb.start });
            if (b.end > nb.end) updated.push({ ...b, start: nb.end });
          });
          updated.push(nb);
          updated.sort((a,b) => a.start - b.start);
          setBlocks(updated);
          setMenuInfo(null);
        };

        const clearBlock = (idx, e) => {
          e.stopPropagation(); e.preventDefault();
          const updated = blocksRef.current.filter((_,i) => i !== idx);
          setBlocks(updated);
        };

        const d = dragRef.current;
        const selMin = d.active ? Math.min(d.start, d.end) : -1;
        const selMax = d.active ? Math.max(d.start, d.end) : -1;

        // 15分精度の時刻文字列
        const fmtSlot = (slot) => { const h = (Math.floor(slot/4) + SCHED_START) % 24; const m = (slot%4)*15; return h + ':' + String(m).padStart(2,'0'); };
        // 勉強時間
        const fmtDur = (dur) => { const h = Math.floor(dur/4); const m = (dur%4)*15; return h > 0 ? (m > 0 ? h+'h'+m+'m' : h+'h') : m+'m'; };

        return (
          <div style={{marginBottom:10,position:'relative',userSelect:'none'}}>
            {/* タイトル行（枠の外） */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:700,color:'#fff',letterSpacing:1}}>Today's Schedule</span>
              {blocks.length > 0 && (
                <span onClick={() => setBlocks([])} style={{fontSize:8,color:'rgba(255,255,255,.6)',cursor:'pointer',fontWeight:600,padding:'1px 6px',borderRadius:4,border:'1px solid rgba(255,255,255,.3)'}}
                  onMouseOver={e => {e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor='rgba(255,255,255,.6)';}}
                  onMouseOut={e => {e.currentTarget.style.color='rgba(255,255,255,.6)';e.currentTarget.style.borderColor='rgba(255,255,255,.3)';}}>全消</span>
              )}
            </div>
            {/* スケジュール本体（枠）— CSS Grid 96列で被り完全防止 */}
            <div style={{padding:'6px 10px 6px',background:'rgba(255,255,255,.12)',borderRadius:10,backdropFilter:'blur(6px)',border:'1px solid rgba(255,255,255,.2)',position:'relative'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat('+SCHED_SLOTS+', 1fr)',gridTemplateRows:'14px 40px 14px 16px',rowGap:2}}>
                {/* Row 1: 勉強時間ラベル */}
                {blocks.map((b,i) => {
                  const dur = b.end - b.start;
                  return (
                    <div key={'dur'+i} style={{gridColumn:(b.start+1)+'/'+(b.end+1),gridRow:1,textAlign:'center',overflow:'hidden',lineHeight:'14px'}}>
                      {dur >= 6 && <span style={{fontSize:8,fontWeight:700,color:'#fff'}}>{fmtDur(dur)}</span>}
                    </div>
                  );
                })}
                {/* Row 2: タイムラインバー（全幅背景） */}
                <div ref={barRef}
                  onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
                  onMouseLeave={() => { if(dragRef.current.active){ dragRef.current.active=false; forceUpdate(n=>n+1); } }}
                  style={{gridColumn:'1/-1',gridRow:2,position:'relative',borderRadius:6,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',cursor:'crosshair',overflow:'hidden'}}>
                  {Array.from({length:24}).map((_,i) => (
                    <div key={i} style={{position:'absolute',left:(i*4/SCHED_SLOTS*100)+'%',top:0,bottom:0,width:1,background:i===0?'transparent':'rgba(255,255,255,.06)'}} />
                  ))}
                  {blocks.map((b,i) => {
                    const dur = b.end - b.start;
                    return (
                    <div key={i} onMouseDown={e => e.stopPropagation()}
                      style={{position:'absolute',left:(b.start/SCHED_SLOTS*100)+'%',width:((b.end-b.start)/SCHED_SLOTS*100)+'%',top:0,height:'100%',background:b.color,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3,zIndex:4,cursor:'pointer',overflow:'hidden'}}
                      onClick={(e) => { e.stopPropagation(); clearBlock(i,e); }}>
                      {dur >= 3 && <span style={{fontSize:12,fontWeight:800,color:b.text,whiteSpace:'nowrap',letterSpacing:1,textShadow:'0 1px 3px rgba(0,0,0,.3)'}}>{b.label}</span>}
                    </div>
                    );
                  })}
                  {d.active && selMin >= 0 && (
                    <div style={{position:'absolute',left:(selMin/SCHED_SLOTS*100)+'%',width:((selMax-selMin+1)/SCHED_SLOTS*100)+'%',top:0,height:'100%',background:'rgba(255,255,255,.35)',borderRadius:3,zIndex:3,border:'2px solid rgba(255,255,255,.8)',pointerEvents:'none'}}>
                      <span style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:9,color:'#fff',whiteSpace:'nowrap',fontWeight:700,textShadow:'0 1px 3px rgba(0,0,0,.5)'}}>{fmtSlot(selMin)}〜{fmtSlot(selMax+1)}</span>
                    </div>
                  )}
                </div>
                {/* Row 3: 開始〜終了時刻 */}
                {blocks.map((b,i) => {
                  const dur = b.end - b.start;
                  return (
                    <div key={'time'+i} style={{gridColumn:(b.start+1)+'/'+(b.end+1),gridRow:3,display:'flex',justifyContent:'space-between',overflow:'hidden',lineHeight:'14px',padding:'0 1px'}}>
                      {dur >= 6 ? (<><span style={{fontSize:8,fontWeight:700,color:'#fff'}}>{fmtSlot(b.start)}</span><span style={{fontSize:8,fontWeight:700,color:'#fff'}}>{fmtSlot(b.end)}</span></>) : null}
                    </div>
                  );
                })}
                {/* Row 4: 時刻目盛り */}
                {Array.from({length:24}).map((_,i) => (
                  <div key={'h'+i} style={{gridColumn:(i*4+1)+'/'+(i*4+5),gridRow:4,textAlign:'left',lineHeight:'16px'}}>
                    {(i % 2 === 0) && <span style={{fontSize:10,color:'#fff',fontWeight:700}}>{(i + SCHED_START) % 24}</span>}
                  </div>
                ))}
              </div>
              {/* 科目選択メニュー（grid外にabsolute） */}
              {menuInfo && (
                <div onMouseDown={e => e.stopPropagation()} style={{position:'absolute',left:((menuInfo.s+menuInfo.e)/2/SCHED_SLOTS*100)+'%',top:8,transform:'translate(-50%,-100%)',background:'#1a202c',borderRadius:8,padding:'5px 6px',display:'flex',gap:4,zIndex:10,boxShadow:'0 4px 20px rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.25)'}}>
                  <span style={{fontSize:8,color:'rgba(255,255,255,.5)',alignSelf:'center',marginRight:2}}>{fmtSlot(menuInfo.s)}〜{fmtSlot(menuInfo.e)}</span>
                  {SCHEDULE_TYPES.map(t => (
                    <div key={t.id} onClick={(e) => { e.stopPropagation(); selectType(t); }}
                      style={{background:t.color,color:t.text,fontSize:10,fontWeight:700,padding:'4px 10px',borderRadius:5,cursor:'pointer',transition:'transform .1s',whiteSpace:'nowrap'}}
                      onMouseOver={e => e.currentTarget.style.transform='scale(1.1)'}
                      onMouseOut={e => e.currentTarget.style.transform='scale(1)'}>
                      {t.label}
                    </div>
                  ))}
                  <div onClick={(e) => { e.stopPropagation(); setMenuInfo(null); }}
                    style={{color:'rgba(255,255,255,.5)',fontSize:10,padding:'4px 5px',cursor:'pointer',display:'flex',alignItems:'center'}}>✕</div>
                </div>
              )}
            </div>
          </div>
        );
      };

      /* 楕円の科目ボタン（ガラスモーフィズム） */
      const CatBtn = ({ cat }) => {
        const t = THEME_MAP[cat.color] || THEME_MAP.blue;
        return (
          <div onClick={() => onSelect(cat)}
            style={{background:'rgba(255,255,255,.2)',border:'2px solid rgba(255,255,255,.45)',borderRadius:'50%',width:115,height:56,cursor:'pointer',transition:'all .18s',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,backdropFilter:'blur(6px)',boxShadow:'0 2px 12px rgba(0,0,0,.08)'}}
            onMouseOver={e => { e.currentTarget.style.background='rgba(255,255,255,.85)'; e.currentTarget.style.borderColor=t.accent; e.currentTarget.querySelector('.cat-label').style.color=t.accent; }}
            onMouseOut={e => { e.currentTarget.style.background='rgba(255,255,255,.2)'; e.currentTarget.style.borderColor='rgba(255,255,255,.45)'; e.currentTarget.querySelector('.cat-label').style.color='#fff'; }}>
            <span className="cat-label" style={{fontWeight:700,fontSize:12,color:'#fff',transition:'color .15s',textAlign:'center',lineHeight:1.2,textShadow:'0 1px 3px rgba(0,0,0,.15)'}}>{cat.name}</span>
          </div>
        );
      };

      return (
        <div style={{minHeight:'100vh',position:'relative',overflow:'hidden',zoom:'125%'}}>
          {/* 背景グラデーション */}
          <div className="top-bg" />
          <div className="top-content" style={{minHeight:'100vh',padding:'10px 16px',display:'flex',flexDirection:'column'}}>
          <div style={{maxWidth:1000,margin:'0 auto',width:'100%',display:'flex',flexDirection:'column',flex:1,minHeight:0}}>

            {/* ── タイトル ── */}
            <div style={{textAlign:'center',marginBottom:10}}>
              <h1 style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:3,textShadow:'0 1px 8px rgba(0,0,0,.15)'}}>Active Recall Study</h1>
              <p style={{fontSize:11,color:'rgba(255,255,255,.75)',margin:'2px 0 0',letterSpacing:2}}>公認会計士試験対策</p>
            </div>

            {/* ── デイリースケジュール ── */}
            <DailySchedule />

            {/* ── メインエリア: 左(科目) + 中(今日の問題) + 右(ToDo+メモ) ── */}
            <div style={{display:'flex',gap:16,flex:1,minHeight:0,alignItems:'flex-start'}}>

              {/* 左列: 6科目を縦に楕円で + 評価件数 */}
              <div style={{display:'flex',flexDirection:'column',gap:6,justifyContent:'flex-start',alignItems:'center',flexShrink:0}}>
                {CATEGORIES.map(cat => <CatBtn key={cat.id} cat={cat} />)}
                {/* 評価件数表示 */}
                {(() => { const c = getRatingCounts(); return (
                  <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3,alignItems:'flex-start'}}>
                    {[
                      {label:'また明日',color:'#e53e3e'},
                      {label:'3日後',color:'#dd6b20'},
                      {label:'7日後',color:'#3182ce'},
                    ].map(r => (
                      <div key={r.label} style={{display:'flex',alignItems:'center',gap:5}}>
                        <span style={{width:8,height:8,borderRadius:'50%',background:r.color,display:'inline-block',flexShrink:0}} />
                        <span style={{fontSize:10,color:'rgba(255,255,255,.85)',fontWeight:600,width:58,display:'inline-block'}}>{r.label}</span>
                        <span style={{fontSize:11,color:'#fff',fontWeight:700,width:16,textAlign:'right',display:'inline-block'}}>{c[r.label]}</span>
                      </div>
                    ))}
                  </div>
                ); })()}
              </div>

              {/* 中央: 今日とくべき問題リスト */}
              <div style={{flex:1.5,display:'flex',flexDirection:'column',minHeight:0,overflowY:'auto',gap:5}}>
                <div style={{fontSize:11,fontWeight:700,color:'#fff',letterSpacing:1,marginBottom:2}}>今日の復習 ({allDue.length})</div>
                {allDue.length === 0 && <div style={{textAlign:'center',fontSize:12,color:'rgba(255,255,255,.7)',padding:20}}>今日の復習問題はありません</div>}
                {allDue.slice(0,15).map((p,i) => {
                  const t = THEME_MAP[p.catColor] || THEME_MAP.blue;
                  const st = getState(p.catId)[`${p.q}`] || {};
                  const ratingColors = {'全然ダメ':'#e53e3e','曖昧':'#dd6b20','思い出せた':'#3182ce','完璧':'#38a169'};
                  const rc = ratingColors[st.rating] || '#dd6b20';
                  const daysAgo = st.ratedAt ? Math.floor((Date.now() - st.ratedAt) / 86400000) : null;
                  const info = getProbInfo(p.catId, p.q, getCatData(p.catId));
                  return (
                    <div key={p.q+i} onClick={() => { onStartRecall({ problem: p, allDue, startIdx: i }); }}
                      style={{display:'flex',alignItems:'center',gap:5,padding:'6px 10px',background:'rgba(255,255,255,.85)',border:'1.5px solid rgba(255,255,255,.5)',borderRadius:10,cursor:'pointer',transition:'all .15s',backdropFilter:'blur(4px)'}}
                      onMouseOver={e => { e.currentTarget.style.background='rgba(255,255,255,.95)'; e.currentTarget.style.borderColor=t.accent; }}
                      onMouseOut={e => { e.currentTarget.style.background='rgba(255,255,255,.85)'; e.currentTarget.style.borderColor='rgba(255,255,255,.5)'; }}>
                      <span style={{width:9,height:9,borderRadius:'50%',background:rc,display:'inline-block',flexShrink:0}} />
                      <span style={{fontSize:10,fontWeight:700,color:'#2d3748',flexShrink:0}}>{p.q}</span>
                      {info && <span style={{fontSize:9,color:'#718096',flexShrink:0}}>{info.vol}{info.tcCircled ? ' 第'+info.tcCircled+'章' : ''}</span>}
                      {info && info.chName && <span style={{fontSize:9,color:'#4a5568',fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{info.chName}</span>}
                      {daysAgo !== null && <span style={{fontSize:8,color:'#a0aec0',flexShrink:0,fontWeight:600}}>{daysAgo === 0 ? '今日' : daysAgo+'日前'}</span>}
                      <span style={{fontSize:8,color:'#fff',background:t.accent,borderRadius:3,padding:'1px 5px',flexShrink:0,fontWeight:700}}>{p.catName.replace(/（.*）/,'')}</span>
                    </div>
                  );
                })}
                {allDue.length > 15 && <div style={{textAlign:'center',fontSize:11,color:'rgba(255,255,255,.7)'}}>他 {allDue.length - 15} 問</div>}

                {/* 計算ノート一覧（4択判定済みのみ） */}
                {(() => {
                  const calcCats = CATEGORIES.filter(c => c.hasData && c.data);
                  const allNotes = [];
                  calcCats.forEach(cat => {
                    const st = getState(cat.id);
                    let notes = {};
                    try { notes = JSON.parse(localStorage.getItem(`ar3_notes_${cat.id}`) || '{}'); } catch(e){}
                    Object.entries(st).forEach(([q, s]) => {
                      if (!(s.rating || s.mastered)) return;
                      const n = notes[q] || {};
                      /* メモ(ronten/kaiho)が書かれていない問題はスキップ */
                      const hasHistory = (() => { try { const h = JSON.parse(localStorage.getItem(`ar3_history_${cat.id}_${q}`) || '[]'); return h.some(e => (e.ronten && e.ronten.trim()) || (e.kaiho && e.kaiho.trim())); } catch(e){ return false; } })();
                      if (!(n.ronten || n.kaiho || hasHistory)) return;
                      /* 今日の復習に出ている問題は除外 */
                      if (allDue.some(d => d.catId === cat.id && d.q === q)) return;
                      const prob = cat.data.flatMap(ch => ch.problems || []).find(p => p.q === q);
                      const ratingColors = {'全然ダメ':'#e53e3e','曖昧':'#dd6b20','思い出せた':'#3182ce','完璧':'#38a169'};
                      const rc = ratingColors[s.rating || s.lastRating] || '#38a169';
                      const daysAgo = s.ratedAt ? Math.floor((Date.now() - s.ratedAt) / 86400000) : null;
                      allNotes.push({ q, catId: cat.id, catName: cat.name, catColor: cat.color, ronten: n.ronten || '', kaiho: n.kaiho || '', chapter: prob?.chapter || q, imgs: prob?.imgs, rc, daysAgo, rating: s.rating || s.lastRating || '完璧' });
                    });
                  });
                  allNotes.sort((a, b) => {
                    const da = a.daysAgo !== null ? a.daysAgo : 9999;
                    const db = b.daysAgo !== null ? b.daysAgo : 9999;
                    return da - db;
                  });
                  if (allNotes.length === 0) return null;
                  return (
                    <div style={{marginTop:8}}>
                      <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.8)',marginBottom:4,letterSpacing:1}}>計算ノート ({allNotes.length})</div>
                      {allNotes.slice(0,10).map((n,i) => {
                        const t = THEME_MAP[n.catColor] || THEME_MAP.red;
                        const noteKey = n.catId + '_' + n.q;
                        const isExpanded = expandedNoteId === noteKey;
                        const isDueToday = allDue.some(d => d.catId === n.catId && d.q === n.q);
                        return (
                          <div key={n.q+i}
                            style={{marginBottom:3,background:'rgba(255,255,255,.85)',border:isExpanded ? '1.5px solid '+t.accent : '1.5px solid rgba(255,255,255,.5)',borderRadius:8,cursor:'pointer',transition:'all .15s',overflow:'hidden'}}
                            onMouseOver={e => { e.currentTarget.style.background='rgba(255,255,255,.95)'; if(!isExpanded) e.currentTarget.style.borderColor=t.accent; }}
                            onMouseOut={e => { e.currentTarget.style.background='rgba(255,255,255,.85)'; if(!isExpanded) e.currentTarget.style.borderColor='rgba(255,255,255,.5)'; }}>
                            <div onClick={() => {
                              if (isDueToday) { const dueIdx = allDue.findIndex(d => d.catId === n.catId && d.q === n.q); onStartRecall({ problem: n, allDue, startIdx: dueIdx >= 0 ? dueIdx : 0 }); }
                              else { setExpandedNoteId(isExpanded ? null : noteKey); }
                            }}
                              style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px'}}>
                            {(() => { const info = getProbInfo(n.catId, n.q, getCatData(n.catId)); return (<>
                              <span style={{width:9,height:9,borderRadius:'50%',background:n.rc,display:'inline-block',flexShrink:0}} />
                              <span style={{fontSize:9,fontWeight:700,color:'#2d3748',flexShrink:0}}>{n.q}</span>
                              {info && <span style={{fontSize:8,color:'#718096',flexShrink:0}}>{info.vol}{info.tcCircled ? ' 第'+info.tcCircled+'章' : ''}</span>}
                              {info && info.chName && <span style={{fontSize:8,color:'#4a5568',fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{info.chName}</span>}
                              {n.daysAgo !== null && <span style={{fontSize:8,color:'#a0aec0',flexShrink:0,fontWeight:600}}>{n.daysAgo === 0 ? '今日' : n.daysAgo+'日前'}</span>}
                              <span style={{fontSize:8,fontWeight:700,color:'#fff',background:t.accent,borderRadius:3,padding:'1px 4px',flexShrink:0}}>{n.catName.replace(/（.*）/,'').slice(0,2)}</span>
                              {!isDueToday && <span style={{fontSize:10,color:'#a0aec0',flexShrink:0,transform:isExpanded?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s'}}>▼</span>}
                            </>); })()}
                            </div>
                            {isExpanded && (() => {
                              const ratingColors = {'全然ダメ':'#e53e3e','曖昧':'#dd6b20','思い出せた':'#3182ce','完璧':'#38a169'};
                              const ratingLabels = {'全然ダメ':'また明日','曖昧':'3日後','思い出せた':'7日後','完璧':'OK'};
                              let hist = [];
                              try { hist = JSON.parse(localStorage.getItem(`ar3_history_${n.catId}_${n.q}`) || '[]'); } catch(e){}
                              // 履歴がなければ既存ノート＋state評価から補完
                              if (hist.length === 0 && (n.ronten || n.kaiho || n.rating)) {
                                const st = getState(n.catId);
                                const s = st[n.q] || {};
                                hist = [{ ronten: n.ronten || '', kaiho: n.kaiho || '', rating: s.rating || s.lastRating || n.rating, ratedAt: s.ratedAt || Date.now() }];
                                // 自動補完した履歴を保存
                                try { localStorage.setItem(`ar3_history_${n.catId}_${n.q}`, JSON.stringify(hist)); } catch(e){}
                              }
                              return (
                                <div style={{padding:'6px 10px 8px 15px',borderTop:'1px solid rgba(0,0,0,.06)',maxHeight:200,overflowY:'auto'}}>
                                  {hist.length > 0 ? hist.slice().reverse().map((h,hi) => {
                                    const d = new Date(h.ratedAt);
                                    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                                    const rc = ratingColors[h.rating] || '#a0aec0';
                                    return (
                                      <div key={hi} style={{marginBottom:5,paddingBottom:5,borderBottom:hi<hist.length-1?'1px dashed rgba(0,0,0,.08)':'none'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                                          <span style={{fontSize:8,color:'#fff',background:rc,borderRadius:3,padding:'1px 5px',fontWeight:700}}>{ratingLabels[h.rating] || h.rating}</span>
                                          <span style={{fontSize:8,color:'#a0aec0'}}>{dateStr}</span>
                                          {hi===0 && <span style={{fontSize:7,color:t.accent,fontWeight:700}}>最新</span>}
                                        </div>
                                        {h.ronten && <div style={{fontSize:9,color:'#4a5568',lineHeight:1.4,whiteSpace:'pre-wrap'}}>📝 {h.ronten}</div>}
                                        {h.kaiho && <div style={{fontSize:9,color:'#718096',lineHeight:1.4,whiteSpace:'pre-wrap'}}>📋 {h.kaiho}</div>}
                                        {!h.ronten && !h.kaiho && <div style={{fontSize:8,color:'#cbd5e0'}}>メモなし</div>}
                                      </div>
                                    );
                                  }) : (
                                    <div style={{fontSize:9,color:'#a0aec0',marginBottom:4}}>まだ解いていません</div>
                                  )}
                                  <div style={{marginTop:4,display:'flex',gap:4}}>
                                    <button onClick={(e) => { e.stopPropagation(); const imgs = n.imgs || findProbImgs(n.catId, n.q); openProblem({q:n.q, catId:n.catId, catName:n.catName, catColor:n.catColor, chapter:n.chapter, imgs:imgs}, undefined, true); }}
                                      style={{padding:'3px 10px',background:t.accent,color:'#fff',border:'none',borderRadius:5,fontSize:9,fontWeight:700,cursor:'pointer'}}>開く</button>
                                  </div>
                                </div>
                              );
                            })()}
                          </div>
                        );
                      })}
                      {allNotes.length > 10 && <div style={{textAlign:'center',fontSize:10,color:'rgba(255,255,255,.6)'}}>他 {allNotes.length - 10} 件</div>}
                    </div>
                  );
                })()}
              </div>

              {/* 右列: ToDoList + メモ */}
              <div style={{flex:.7,display:'flex',flexDirection:'column',gap:6,minHeight:0,maxWidth:240}}>
                <TodoPanel storageKey={dayKey} style={{flex:5,overflow:'hidden',background:'rgba(255,255,255,.9)',backdropFilter:'blur(8px)',border:'1.5px solid rgba(255,255,255,.5)'}} />
                <MemoPanel storageKey={memoKey} title="メモ" placeholder="自由メモ..." style={{flex:1,minHeight:50,overflow:'hidden',background:'rgba(255,255,255,.9)',backdropFilter:'blur(8px)',border:'1.5px solid rgba(255,255,255,.5)'}} />
              </div>
            </div>


          </div>
          </div>

        </div>
      );
    };

    const CalculationStudy = ({ category, onBack }) => {
      const [problems] = useState(category.data);
      const [filtered, setFiltered] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [chapters, setChapters] = useState([]);
      const [selectedChapter, setSelectedChapter] = useState(null);
      const [expandedChapter, setExpandedChapter] = useState(null);
      const [ronten, setRonten] = useState('');
      const [kaiho, setKaiho] = useState('');
      const [showChBar, setShowChBar] = useState(false);
      const [markerColor, setMarkerColor] = useState('rgba(255,255,0,0.3)');
      const [eraseMode, setEraseMode] = useState(false);
      const [lineWidth, setLineWidth] = useState(14);
      const [highlights, setHighlights] = useState({});
      const [markerActive, setMarkerActive] = useState(false);
      const canvasRef = React.useRef(null);
      const previewRef = React.useRef(null);
      const imgRef = React.useRef(null);
      const drawing = React.useRef(false);
      const startPt = React.useRef(null);

      // iPad P2P sync
      const [ipadConnected, setIpadConnected] = useState(false);
      const [ipadCode, setIpadCode] = useState('');
      const [showIpadPanel, setShowIpadPanel] = useState(false);
      const peerRef = React.useRef(null);
      const connRef = React.useRef(null);
      const ipadCanvasRef = React.useRef(null);

      // iPad連携: ホスト(PC)としてPeerを作成
      const startIpadSync = () => {
        const code = String(Math.floor(1000 + Math.random() * 9000));
        setIpadCode(code);
        setShowIpadPanel(true);
        if (peerRef.current) { try { peerRef.current.destroy(); } catch(e){} }
        const hostId = 'cpa-host-' + code;
        const p = new Peer(hostId);
        peerRef.current = p;
        p.on('open', () => { console.log('PeerJS host ready:', hostId); });
        p.on('connection', (c) => {
          connRef.current = c;
          c.on('open', () => {
            setIpadConnected(true);
            // 現在の問題を送信
            if (filtered.length > 0) {
              const cur = filtered[currentIdx];
              const fullImgs = (cur.imgs||[]).map(s => s.startsWith('http') ? s : window.location.origin + '/' + s);
              c.send({ type: 'problem', q: cur.q, label: cur.chapter + ' ' + cur.q, imgs: fullImgs });
              // 既存のiPad書き込みデータを送信
              const data = localStorage.getItem('ar3_ipad_' + category.id + '_' + cur.q);
              if (data) c.send({ type: 'existing-strokes', dataUrl: data });
            }
          });
          c.on('data', (data) => handleIpadData(data));
          c.on('close', () => { setIpadConnected(false); connRef.current = null; });
        });
        p.on('error', (err) => { console.error('PeerJS error:', err); });
      };

      const stopIpadSync = () => {
        if (peerRef.current) { try { peerRef.current.destroy(); } catch(e){} peerRef.current = null; }
        connRef.current = null;
        setIpadConnected(false);
        setIpadCode('');
        setShowIpadPanel(false);
      };

      // iPadからのデータ受信
      const handleIpadData = (data) => {
        if (data.type === 'canvas-data' && data.dataUrl) {
          // iPadからキャンバスデータ受信 → ipadCanvasに描画 + localStorage保存
          const ic = ipadCanvasRef.current;
          if (ic) {
            const ictx = ic.getContext('2d');
            ictx.clearRect(0, 0, ic.width, ic.height);
            const img2 = new window.Image();
            img2.onload = () => { ictx.drawImage(img2, 0, 0, ic.width, ic.height); };
            img2.src = data.dataUrl;
          }
          if (filtered.length > 0) {
            const cur = filtered[currentIdx];
            try { localStorage.setItem('ar3_ipad_' + category.id + '_' + cur.q, data.dataUrl); } catch(e){}
          }
        }
        if (data.type === 'request-strokes') {
          const stored = localStorage.getItem('ar3_ipad_' + category.id + '_' + data.q);
          if (stored && connRef.current && connRef.current.open) {
            connRef.current.send({ type: 'existing-strokes', dataUrl: stored });
          }
        }
        if (data.type === 'clear') {
          const ic = ipadCanvasRef.current;
          if (ic) { ic.getContext('2d').clearRect(0, 0, ic.width, ic.height); }
          if (filtered.length > 0) {
            localStorage.removeItem('ar3_ipad_' + category.id + '_' + filtered[currentIdx].q);
          }
        }
      };

      // 問題切替時にiPadに通知 + iPad書き込み復元
      const notifyIpadProblemChange = (prob) => {
        if (connRef.current && connRef.current.open) {
          const fi = (prob.imgs||[]).map(s => s.startsWith('http') ? s : window.location.origin + '/' + s);
          connRef.current.send({ type: 'problem', q: prob.q, label: prob.chapter + ' ' + prob.q, imgs: fi });
          const data = localStorage.getItem('ar3_ipad_' + category.id + '_' + prob.q);
          if (data) connRef.current.send({ type: 'existing-strokes', dataUrl: data });
        }
        // ipadCanvas復元
        setTimeout(() => {
          const ic = ipadCanvasRef.current;
          if (!ic) return;
          const img2 = imgRef.current;
          if (img2) { ic.width = img2.clientWidth; ic.height = img2.clientHeight; ic.style.width = img2.clientWidth + 'px'; ic.style.height = img2.clientHeight + 'px'; }
          const ictx = ic.getContext('2d');
          ictx.clearRect(0, 0, ic.width, ic.height);
          const stored = localStorage.getItem('ar3_ipad_' + category.id + '_' + prob.q);
          if (stored) {
            const im = new window.Image();
            im.onload = () => { ictx.drawImage(im, 0, 0, ic.width, ic.height); };
            im.src = stored;
          }
        }, 200);
      };

      // cleanup on unmount
      useEffect(() => { return () => { if (peerRef.current) { try { peerRef.current.destroy(); } catch(e){} } }; }, []);

      const hlKey = (qId) => `ar3_hl_${category.id}_${qId}`;
      const saveHighlights = (qId, dataUrl) => {
        try { localStorage.setItem(hlKey(qId), dataUrl); } catch(e) {}
      };
      const loadHighlightData = (qId) => {
        return localStorage.getItem(hlKey(qId)) || null;
      };
      const clearHighlights = (qId) => {
        localStorage.removeItem(hlKey(qId));
        const c = canvasRef.current;
        if (c) { const ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height); }
      };

      const syncCanvas = () => {
        const c = canvasRef.current;
        const pv = previewRef.current;
        const img = imgRef.current;
        if (!c || !img) return;
        const w = img.clientWidth;
        const h = img.clientHeight;
        if (w === 0 || h === 0) return;
        c.width = w; c.height = h;
        c.style.width = w + 'px'; c.style.height = h + 'px';
        if (pv) { pv.width = w; pv.height = h; pv.style.width = w + 'px'; pv.style.height = h + 'px'; }
      };

      const restoreCanvas = (qId) => {
        const c = canvasRef.current;
        if (!c) return;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        const data = loadHighlightData(qId);
        if (data) {
          const img2 = new window.Image();
          img2.onload = () => { ctx.drawImage(img2, 0, 0, c.width, c.height); };
          img2.src = data;
        }
      };

      const getPos = (e) => {
        const c = canvasRef.current;
        const rect = c.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      };
      const snapLine = (p1, p2) => {
        /* Y座標の差が小さければ水平に補正 */
        const dy = Math.abs(p2.y - p1.y);
        const dx = Math.abs(p2.x - p1.x);
        if (dx > 10 && dy < dx * 0.15) {
          const avgY = (p1.y + p2.y) / 2;
          return { x1: p1.x, y1: avgY, x2: p2.x, y2: avgY };
        }
        if (dy > 10 && dx < dy * 0.15) {
          const avgX = (p1.x + p2.x) / 2;
          return { x1: avgX, y1: p1.y, x2: avgX, y2: p2.y };
        }
        return { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
      };
      const drawPreview = (p1, p2) => {
        const pv = previewRef.current;
        if (!pv) return;
        const ctx = pv.getContext('2d');
        ctx.clearRect(0, 0, pv.width, pv.height);
        const s = snapLine(p1, p2);
        if (eraseMode) {
          ctx.save();
          ctx.strokeStyle = 'rgba(255,0,0,0.3)';
          ctx.setLineDash([6, 4]);
          ctx.lineWidth = lineWidth + 14;
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
          ctx.restore();
        } else {
          ctx.save();
          ctx.strokeStyle = markerColor;
          ctx.lineWidth = lineWidth;
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
          ctx.restore();
        }
      };
      const startDraw = (e) => {
        e.preventDefault();
        drawing.current = true;
        startPt.current = getPos(e);
      };
      const moveDraw = (e) => {
        if (!drawing.current) return;
        e.preventDefault();
        drawPreview(startPt.current, getPos(e));
      };
      const endDraw = (e) => {
        if (!drawing.current) return;
        drawing.current = false;
        const pv = previewRef.current;
        if (pv) { pv.getContext('2d').clearRect(0, 0, pv.width, pv.height); }
        const endPt = e.changedTouches ? { x: 0, y: 0 } : getPos(e);
        if (e.changedTouches) {
          const t = e.changedTouches[0];
          const rect = canvasRef.current.getBoundingClientRect();
          endPt.x = t.clientX - rect.left;
          endPt.y = t.clientY - rect.top;
        }
        const c = canvasRef.current;
        const ctx = c.getContext('2d');
        const s = snapLine(startPt.current, endPt);
        if (eraseMode) {
          ctx.save();
          ctx.globalCompositeOperation = 'destination-out';
          ctx.lineWidth = lineWidth + 14;
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
          ctx.restore();
        } else {
          ctx.save();
          ctx.globalCompositeOperation = 'source-over';
          ctx.strokeStyle = markerColor;
          ctx.lineWidth = lineWidth;
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
          ctx.restore();
        }
        startPt.current = null;
        if (c && filtered[currentIdx]) {
          saveHighlights(filtered[currentIdx].q, c.toDataURL('image/png'));
        }
      };

      const getNotesKey = (catId) => `ar3_notes_${catId}`;
      const getNotes = (catId) => {
        const d = localStorage.getItem(getNotesKey(catId));
        return d ? JSON.parse(d) : {};
      };
      const saveNotes = (catId, notes) => {
        localStorage.setItem(getNotesKey(catId), JSON.stringify(notes));
      };

      const loadNotes = (prob) => {
        const notes = getNotes(category.id);
        const n = notes[prob.q] || {};
        setRonten(n.ronten || '');
        setKaiho(n.kaiho || '');
        setTimeout(() => { syncCanvas(); restoreCanvas(prob.q); }, 100);
        notifyIpadProblemChange(prob);
      };

      const persistNotes = () => {
        const p = filtered[currentIdx];
        if (!p) return;
        const notes = getNotes(category.id);
        if (ronten.trim() || kaiho.trim()) {
          notes[p.q] = { ronten: ronten.trim(), kaiho: kaiho.trim() };
        } else {
          delete notes[p.q];
        }
        saveNotes(category.id, notes);
      };

      const isCalc = category.id === 'zaimu-keisan' || category.id === 'kanri-keisan';
      const gradMap = {
        red:    'linear-gradient(135deg, #c53030 0%, #e53e3e 30%, #fc8181 60%, #feb2b2 100%)',
        orange: 'linear-gradient(135deg, #c05621 0%, #dd6b20 30%, #f6ad55 60%, #fbd38d 100%)',
      };
      const calcGrad = gradMap[category.color] || '';

      useEffect(() => {
        applyTheme(category.color);
        return () => resetTheme();
      }, [category.color]);

      const locked = isLockedByZenzenDame(category.id);

      useEffect(() => {
        const uniqueChapters = [...new Set(problems.map(p => p.chapter))];
        setChapters(uniqueChapters);
        const due = getDueProblems(category.id, problems);
        if (locked && due.length > 0) {
          /* ロック中: 復習問題のみ */
          setFiltered(shuffle(due));
          if (due.length > 0) loadNotes(due[0]);
        } else {
          const list = shuffle(due.length > 0 ? due : problems);
          setFiltered(list);
          if (list.length > 0) loadNotes(list[0]);
        }
      }, [problems, category.id]);

      useEffect(() => {
        const onResize = () => {
          const c = canvasRef.current; const img = imgRef.current;
          if (!c || !img) return;
          const prev = c.toDataURL('image/png');
          syncCanvas();
          if (prev && prev.length > 100) {
            const ctx = c.getContext('2d');
            const tmp = new window.Image();
            tmp.onload = () => { ctx.drawImage(tmp, 0, 0, c.width, c.height); };
            tmp.src = prev;
          }
        };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const filterByChapter = (chapter) => {
        persistNotes();
        setSelectedChapter(chapter);
        setExpandedChapter(null);
        const chapterProblems = problems.filter(p => p.chapter === chapter);
        const due = getDueProblems(category.id, chapterProblems);
        const list = shuffle(due.length > 0 ? due : chapterProblems);
        setFiltered(list);
        setCurrentIdx(0);
        if (list.length > 0) loadNotes(list[0]);
      };

      const goToProblem = (prob) => {
        persistNotes();
        setSelectedChapter(prob.chapter);
        setExpandedChapter(null);
        setFiltered([prob]);
        setCurrentIdx(0);
        loadNotes(prob);
      };

      const toggleChapter = (ch) => {
        setExpandedChapter(expandedChapter === ch ? null : ch);
      };

      const getChapterNum = (ch) => {
        const m = ch.match(/第(\d+)章/);
        return m ? parseInt(m[1]) : 999;
      };

      const sortedChapters = [...chapters].sort((a, b) => getChapterNum(a) - getChapterNum(b));

      const rateAnswer = (rating) => {
        persistNotes();
        const p = filtered[currentIdx];
        // 履歴に追加
        try {
          const histKey = `ar3_history_${category.id}_${p.q}`;
          const hist = JSON.parse(localStorage.getItem(histKey) || '[]');
          hist.push({ ronten: ronten.trim(), kaiho: kaiho.trim(), rating, ratedAt: Date.now() });
          localStorage.setItem(histKey, JSON.stringify(hist));
        } catch(e){}
        const state = getState(category.id);
        const key = `${p.q}`;

        const intervals = { '全然ダメ': 1, '曖昧': 3, '思い出せた': 7, '完璧': null };
        const days = intervals[rating];

        if (rating === '完璧') {
          state[key] = { mastered: true, lastRating: rating, ratedAt: new Date().getTime() };
        } else {
          const tomorrow = new Date(); tomorrow.setHours(0,0,0,0); tomorrow.setDate(tomorrow.getDate() + days);
          state[key] = { nextReview: tomorrow.getTime(), rating, ratedAt: new Date().getTime() };
        }

        setState(category.id, state);

        if (currentIdx < filtered.length - 1) {
          const nextIdx = currentIdx + 1;
          setCurrentIdx(nextIdx);
          loadNotes(filtered[nextIdx]);
        } else {
          // 全問終了 → シャッフルして最初から連続
          const newList = shuffle([...problems]);
          setFiltered(newList);
          setCurrentIdx(0);
          setSelectedChapter(null);
          if (newList.length > 0) loadNotes(newList[0]);
        }
      };

      if (filtered.length === 0) {
        return (
          <div className="min-h-screen bg-gray-50 p-4">
            <div style={{maxWidth:1600,margin:'0 auto'}}>
              <button onClick={onBack} className="px-4 py-2 bg-gray-400 text-white rounded mb-4">戻る</button>
              <div className="p-6 bg-white rounded-lg text-center">
                <p className="text-gray-600 mb-4">対象の問題がありません</p>
              </div>
            </div>
          </div>
        );
      }

      const current = filtered[currentIdx];

      return (
        <div style={{background: isCalc ? calcGrad : 'var(--bg)',height:'100vh',overflow:'hidden',padding:'6px 10px',display:'flex',flexDirection:'column',position:'relative'}}>
          {/* Top bar */}
          <div className="top-bar">
            <button onClick={() => { persistNotes(); onBack(); }} style={{padding:'5px 12px',background:'var(--accent)',color:'#fff',borderRadius:6,fontWeight:700,fontSize:12,border:'none',cursor:'pointer',whiteSpace:'nowrap'}}>戻る</button>
