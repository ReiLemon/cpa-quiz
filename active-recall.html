      if (info.s && pf.sub) {
        const num = parseInt(pf.sub);
        if (!isNaN(num)) {
          const sec = info.s.find(([f,t]) => num >= f && num <= t);
          if (sec) secName = ' ' + sec[2];
        }
      }
      return `${info.t} 第${pf.ch}章 ${info.n}${secName} ${pageCode}`;
    };

    const RATINGS = [
      { key: 'もう一回', days: 1, color: '#e53e3e' },
      { key: 'あやふや', days: 3, color: '#dd6b20' },
      { key: 'OK', days: 7, color: '#3182ce' },
      { key: '定着', days: null, color: '#38a169' }
    ];


    /* ── RecallStudy: 今日の復習 専用フルページ ── */
    const RecallStudy = ({ problem, allDue, startIdx, onBack }) => {
      const [queue] = useState(allDue);
      const [qIdx, setQIdx] = useState(startIdx || 0);
      const current = queue[qIdx];

      const [ronten, setRonten] = useState('');
      const [kaiho, setKaiho] = useState('');
      const [showPrev, setShowPrev] = useState(false);
      const [prevNotes, setPrevNotes] = useState(null);

      const [markerActive, setMarkerActive] = useState(false);
      const [markerColor, setMarkerColor] = useState('rgba(255,255,0,0.3)');
      const [eraseMode, setEraseMode] = useState(false);
      const canvasRef = React.useRef(null);
      const previewRef = React.useRef(null);
      const imgRef = React.useRef(null);
      const drawing = React.useRef(false);
      const startPt = React.useRef(null);

      // テーマカラー適用
      useEffect(() => {
        if (current) applyTheme(current.catColor);
        return () => resetTheme();
      }, [current && current.catColor]);

      // 問題読み込み
      useEffect(() => {
        if (!current) return;
        // 空白で新規
        setRonten(''); setKaiho('');
        setShowPrev(false);
        // 前回の書き込みを読み込む
        try {
          const histKey = `ar3_history_${current.catId}_${current.q}`;
          const hist = JSON.parse(localStorage.getItem(histKey) || '[]');
          setPrevNotes(hist.length > 0 ? { ronten: hist[hist.length-1].ronten||'', kaiho: hist[hist.length-1].kaiho||'' } : null);
        } catch(e) { setPrevNotes(null); }
      }, [qIdx]);

      // マーカー関連
      const getPos = (e) => { const c = previewRef.current || canvasRef.current; const r = c.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return {x:t.clientX-r.left, y:t.clientY-r.top}; };
      const snapLine = (p1,p2) => { const dy=Math.abs(p2.y-p1.y), dx=Math.abs(p2.x-p1.x); if(dx>10&&dy<dx*0.15){const y=(p1.y+p2.y)/2; return{x1:p1.x,y1:y,x2:p2.x,y2:y};} return{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y}; };
      const startDraw = (e) => { e.preventDefault(); drawing.current=true; startPt.current=getPos(e); };
      const moveDraw = (e) => { if(!drawing.current) return; e.preventDefault(); const pv=previewRef.current; if(!pv) return; const ctx=pv.getContext('2d'); ctx.clearRect(0,0,pv.width,pv.height); const s=snapLine(startPt.current,getPos(e)); ctx.save(); ctx.strokeStyle=eraseMode?'rgba(255,0,0,0.3)':markerColor; if(eraseMode) ctx.setLineDash([6,4]); ctx.lineWidth=eraseMode?28:14; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); ctx.restore(); };
      const endDraw = (e) => { if(!drawing.current) return; drawing.current=false; const pv=previewRef.current; if(pv) pv.getContext('2d').clearRect(0,0,pv.width,pv.height); const refEl=previewRef.current||canvasRef.current; const ep=e.changedTouches?{x:e.changedTouches[0].clientX-refEl.getBoundingClientRect().left,y:e.changedTouches[0].clientY-refEl.getBoundingClientRect().top}:getPos(e); const c=canvasRef.current; const ctx=c.getContext('2d'); const s=snapLine(startPt.current,ep); if(eraseMode){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.lineWidth=28;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();}else{ctx.save();ctx.globalCompositeOperation='source-over';ctx.strokeStyle=markerColor;ctx.lineWidth=14;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();} startPt.current=null; if(current) { try{localStorage.setItem('ar3_mhl_'+current.catId+'_'+current.q, c.toDataURL('image/png'));}catch(e){} } };
      const syncCanvas = () => { const c=canvasRef.current; const img=imgRef.current; if(!c||!img) return; const container=img.parentElement; const w=container.scrollWidth||img.clientWidth; const h=container.scrollHeight||img.clientHeight; if(w===0||h===0) return; c.width=w; c.height=h; c.style.width=w+'px'; c.style.height=h+'px'; const pv=previewRef.current; if(pv){pv.width=w;pv.height=h;pv.style.width=w+'px';pv.style.height=h+'px';} };
      const restoreCanvas = (q) => { const c=canvasRef.current; if(!c||!current) return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const d=localStorage.getItem('ar3_mhl_'+current.catId+'_'+q); if(d){const im=new window.Image(); im.onload=()=>{ctx.drawImage(im,0,0,c.width,c.height);}; im.src=d;} };

      const saveNotes = () => {
        if (!current) return;
        const nk = `ar3_notes_${current.catId}_${current.q}`;
        localStorage.setItem(nk, JSON.stringify({ ronten, kaiho }));
        const bulkKey = `ar3_notes_${current.catId}`;
        try {
          const bulk = JSON.parse(localStorage.getItem(bulkKey) || '{}');
          if (ronten.trim() || kaiho.trim()) bulk[current.q] = { ronten: ronten.trim(), kaiho: kaiho.trim() };
          localStorage.setItem(bulkKey, JSON.stringify(bulk));
        } catch(e){}
      };

      const rate = (rating) => {
        saveNotes();
        const p = current;
        // 履歴に追加
        try {
          const histKey = `ar3_history_${p.catId}_${p.q}`;
          const hist = JSON.parse(localStorage.getItem(histKey) || '[]');
          hist.push({ ronten: ronten.trim(), kaiho: kaiho.trim(), rating, ratedAt: Date.now() });
          localStorage.setItem(histKey, JSON.stringify(hist));
        } catch(e){}
        const state = getState(p.catId);
        const key = `${p.q}`;
        const intervals = { '全然ダメ': 1, '曖昧': 3, '思い出せた': 7, '完璧': null };
        const days = intervals[rating];
        if (rating === '完璧') {
          state[key] = { mastered: true, lastRating: rating, ratedAt: Date.now() };
        } else {
          const tomorrow = new Date(); tomorrow.setHours(0,0,0,0); tomorrow.setDate(tomorrow.getDate() + days);
          state[key] = { nextReview: tomorrow.getTime(), rating, ratedAt: Date.now() };
        }
        setState(p.catId, state);
        // 次の問題へ
        if (qIdx + 1 < queue.length) {
          setQIdx(qIdx + 1);
        } else {
          onBack();
        }
      };

      const handleNumberedKey = (getValue, setValue) => (e) => {
        if (e.key === 'Enter' && e.shiftKey) {
          e.preventDefault();
          const ta = e.target; const start = ta.selectionStart; const v = getValue();
          const lines = v.substring(0, start).split('\n');
          const nums = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
          const nextNum = lines.length < nums.length ? nums[lines.length] : '';
          const insert = '\n' + nextNum;
          const newVal = v.substring(0, start) + insert + v.substring(ta.selectionEnd);
          setValue(newVal);
          setTimeout(() => { ta.selectionStart = ta.selectionEnd = start + insert.length; }, 0);
        }
      };

      if (!current) return <div style={{padding:40,textAlign:'center'}}>問題がありません<br/><button onClick={onBack}>戻る</button></div>;

      const t = THEME_MAP[current.catColor] || THEME_MAP.blue;

      return (
        <div style={{background:'var(--bg)',height:'100vh',overflow:'hidden',padding:'6px 10px',display:'flex',flexDirection:'column',position:'relative'}}>
          {/* Top bar */}
          <div className="top-bar">
            <button onClick={() => { saveNotes(); onBack(); }} style={{padding:'5px 12px',background:'var(--accent)',color:'#fff',borderRadius:6,fontWeight:700,fontSize:12,border:'none',cursor:'pointer',whiteSpace:'nowrap'}}>戻る</button>
            <span style={{fontSize:13,fontWeight:800,color:'var(--accent)'}}>{current.chapter || current.q}</span>
            <span style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>{current.catName}</span>
            <span style={{fontSize:12,color:'var(--text2)',fontWeight:700,whiteSpace:'nowrap',marginLeft:'auto'}}>{qIdx + 1}/{queue.length}</span>
          </div>

          {/* Main 2-column layout */}
          <div className="main-layout" style={{flex:1,minHeight:0}}>
            {/* Left: PDF display */}
            <div className="pdf-panel" style={{position:'relative',display:'flex',flexDirection:'column'}}>
              <div style={{display:'flex',gap:4,padding:'4px 8px',borderBottom:'1px solid var(--border)',alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
                <button onClick={() => setMarkerActive(!markerActive)}
                  style={{padding:'3px 10px',borderRadius:4,border: markerActive ? '2px solid var(--accent)' : '1px solid var(--border)',
                  background: markerActive ? 'var(--accent-light)' : 'var(--card2)',fontSize:11,fontWeight:700,cursor:'pointer',color: markerActive ? 'var(--accent)' : '#666'}}>
                  {markerActive ? '✏️ マーカーON' : '✏️ マーカー'}
                </button>
                {markerActive && (<>
                  {[{c:'rgba(255,255,0,0.3)',label:'黄',bg:'rgba(255,255,0,0.5)'},{c:'rgba(255,100,150,0.3)',label:'赤',bg:'rgba(255,100,150,0.5)'},{c:'rgba(80,180,255,0.3)',label:'青',bg:'rgba(80,180,255,0.5)'}].map(m => (
                    <button key={m.label} onClick={() => { setMarkerColor(m.c); setEraseMode(false); }}
                      style={{padding:'3px 10px',borderRadius:4,border: !eraseMode && markerColor===m.c ? '2px solid var(--accent)' : '1px solid var(--border)',
                      background:m.bg,fontSize:11,fontWeight:700,cursor:'pointer',color:'#333'}}>{m.label}</button>
                  ))}
                  <button onClick={() => setEraseMode(!eraseMode)}
                    style={{padding:'3px 10px',borderRadius:4,border:eraseMode?'2px solid var(--accent)':'1px solid var(--border)',
                    background:eraseMode?'#ffe0e0':'var(--card2)',fontSize:11,fontWeight:700,cursor:'pointer',color:'#333'}}>消</button>
                </>)}
              </div>
              {current.imgs && current.imgs.length > 0 ? (
                <div style={{flex:1,position:'relative',overflowY:'auto',overflowX:'hidden',display:'flex',flexDirection:'column',alignItems:'center'}}>
                  <div style={{position:'relative',display:'inline-block',width:'100%'}}>
                    {current.imgs.map((imgSrc, imgIdx) => (
                      <img key={imgIdx} ref={imgIdx===0?imgRef:null} src={imgSrc} loading="eager"
                        onLoad={imgIdx===0 ? () => { syncCanvas(); restoreCanvas(current.q); const pv=previewRef.current; if(pv&&canvasRef.current){pv.width=canvasRef.current.width;pv.height=canvasRef.current.height;pv.style.width=canvasRef.current.style.width;pv.style.height=canvasRef.current.style.height;} } : undefined}
                        style={{maxWidth:'100%',display:'block',userSelect:'none',pointerEvents:'none'}} />
                    ))}
                    <canvas ref={canvasRef} style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',pointerEvents:'none'}} />
                    <canvas ref={previewRef}
                      onMouseDown={markerActive?startDraw:undefined} onMouseMove={markerActive?moveDraw:undefined} onMouseUp={markerActive?endDraw:undefined}
                      onMouseLeave={markerActive?(e)=>{if(drawing.current)endDraw(e);}:undefined}
                      style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',pointerEvents:markerActive?'auto':'none',cursor:markerActive?'crosshair':'default'}} />
                  </div>
                </div>
              ) : (
                <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)'}}>PDF画像なし</div>
              )}
            </div>

            {/* Right: memo + rating */}
            <div className="ctrl-panel">
              {/* 前回の書き込み */}
              {prevNotes && (
                <div>
                  <button onClick={() => setShowPrev(v => !v)} style={{width:'100%',padding:'4px 8px',background:showPrev?'#fefcbf':'#f7fafc',border:'1px solid '+(showPrev?'#f6e05e':'#cbd5e0'),borderRadius:6,fontSize:11,fontWeight:700,color:showPrev?'#744210':'#718096',cursor:'pointer',textAlign:'left'}}>
                    {showPrev ? '▲ 前回の書き込みを隠す' : '▼ 前回の書き込みを見る'}
                  </button>
                  {showPrev && (
                    <div style={{marginTop:4,padding:'6px 8px',background:'#fffbeb',border:'1px solid #f6e05e',borderRadius:6,fontSize:11,color:'#744210',lineHeight:1.6,maxHeight:160,overflowY:'auto',whiteSpace:'pre-wrap'}}>
                      {prevNotes.ronten && (<><div style={{fontSize:10,fontWeight:800,color:'#b7791f',marginBottom:2}}>論点</div><div style={{marginBottom:6}}>{prevNotes.ronten}</div></>)}
                      {prevNotes.kaiho && (<><div style={{fontSize:10,fontWeight:800,color:'#b7791f',marginBottom:2}}>解法手順</div><div>{prevNotes.kaiho}</div></>)}
                    </div>
                  )}
                </div>
              )}
              {/* 論点 */}
              <div className="memo-box">
                <label className="memo-label" style={{color:'var(--accent)'}}>論点</label>
                {current.chapter && (
                  <div style={{marginBottom:3,padding:'2px 6px',background:'var(--accent-light)',borderRadius:4,fontSize:9,color:'var(--accent)',fontWeight:600,lineHeight:1.5}}>
                    {current.chapter}
                  </div>
                )}
                <textarea value={ronten} onChange={e => setRonten(e.target.value)}
                  onFocus={(e) => { if (!ronten || ronten.trim() === '') setRonten('①'); }}
                  onKeyDown={handleNumberedKey(() => ronten, setRonten)}
                  placeholder="①から Shift+Enter で次の番号へ"
                  className="memo-input" rows={3} style={{resize:'none',lineHeight:1.6}} />
              </div>
              {/* 解法手順 */}
              <div className="memo-box" style={{flex:1,display:'flex',flexDirection:'column'}}>
                <label className="memo-label" style={{color:'var(--accent)'}}>解法手順</label>
                <textarea value={kaiho} onChange={e => setKaiho(e.target.value)}
                  onFocus={(e) => { if (!kaiho || kaiho.trim() === '') setKaiho('①'); }}
                  onKeyDown={handleNumberedKey(() => kaiho, setKaiho)}
                  placeholder="①から Shift+Enter で次の番号へ"
                  className="memo-input" style={{flex:1,minHeight:120,resize:'vertical',lineHeight:1.7}} />
              </div>
              {/* 4 rating buttons */}
              <div className="rate-grid">
                <button onClick={() => rate('全然ダメ')} className="rate-btn" style={{background:'var(--red)'}}>また明日</button>
                <button onClick={() => rate('曖昧')} className="rate-btn" style={{background:'var(--orange)'}}>3日後</button>
                <button onClick={() => rate('思い出せた')} className="rate-btn" style={{background:'#3182ce'}}>7日後</button>
                <button onClick={() => rate('完璧')} className="rate-btn" style={{background:'var(--green)'}}>OK</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const TheoryStudy = ({ category, onBack }) => {
      const [entries, setEntries] = useState([]);
      const [newFrom, setNewFrom] = useState('');
      const [newTo, setNewTo] = useState('');
      const [newRef, setNewRef] = useState('');
      const [keyword, setKeyword] = useState('');
      const [quizEntry, setQuizEntry] = useState(null);
      const [inputMode, setInputMode] = useState('page');
      const [expandedId, setExpandedId] = useState(null);

      const catColors = {
        blue: { bg: 'linear-gradient(135deg,#1e8cd6 0%,#3da5e8 30%,#5cbcf0 55%,#8ad4f8 80%,#b0e4ff 100%)', accent: '#2b7bb9', light: '#e8f4fd' },
        orange: { bg: 'linear-gradient(135deg,#c05621 0%,#dd6b20 30%,#ed8936 55%,#f6ad55 80%,#feebc8 100%)', accent: '#c05621', light: '#fffaf0' },
        purple: { bg: 'linear-gradient(135deg,#6b3fa0 0%,#8b5fcf 30%,#a87de0 55%,#c8a0f0 80%,#e0c0ff 100%)', accent: '#6b3fa0', light: '#f0e6ff' },
        teal: { bg: 'linear-gradient(135deg,#0d7377 0%,#14919b 30%,#2ab0b8 55%,#60d0d5 80%,#a0e8eb 100%)', accent: '#0d7377', light: '#e0f7f8' }
      };
      const cc = catColors[category.color] || catColors.blue;

      useEffect(() => {
        const state = getState(category.id);
        setEntries(state.entries || []);
      }, [category.id]);

      const saveEntries = (updated) => { const state = getState(category.id); state.entries = updated; setState(category.id, state); setEntries(updated); };

      useEffect(() => {
        if (newFrom) setNewRef(resolveRef(category.id, newFrom, newTo));
        else setNewRef('');
      }, [newFrom, newTo]);

      // ページ指定で出題
      const quizByPage = () => {
        if (!newFrom.trim()) return;
        const ref = newRef || resolveRef(category.id, newFrom.trim(), newTo.trim());
        const existing = entries.find(e => e.pageFrom === newFrom.trim() && e.pageTo === (newTo.trim() || ''));
        if (existing) {
          setQuizEntry(existing);
        } else {
          const entry = { id: Date.now(), pageFrom: newFrom.trim(), pageTo: newTo.trim(), ref, createdAt: Date.now() };
          const updated = [...entries, entry];
          saveEntries(updated);
          setQuizEntry(entry);
        }
        setNewFrom(''); setNewTo(''); setNewRef('');
      };

      // キーワード検索 → ABランクのみ
      const getTopicList = () => {
        const map = CHAPTER_MAP[category.id] || {};
        const topics = [];
        Object.keys(map).forEach(ch => {
          const info = map[ch];
          if (!info.r || (info.r !== 'A' && info.r !== 'B')) return;
          const label = `${info.t} 第${ch}章 ${info.n}`;
          topics.push({ ch: parseInt(ch), t: info.t, name: info.n, rank: info.r, label, sections: info.s || [] });
          if (info.s) {
            info.s.forEach(sec => {
              topics.push({ ch: parseInt(ch), t: info.t, name: info.n, rank: info.r, label: `${info.t} 第${ch}章 ${info.n} ${sec[2]}`, secFrom: sec[0], secTo: sec[1], secName: sec[2] });
            });
          }
        });
        return topics;
      };

      const filteredTopics = keyword.trim()
        ? getTopicList().filter(t => t.label.includes(keyword) || t.name.includes(keyword))
        : getTopicList();

      // キーワードから出題
      const quizByTopic = (topic) => {
        const pageFrom = NUM_TO_CIRCLED[topic.ch] + '-' + (topic.secFrom || '1');
        const pageTo = topic.secTo ? NUM_TO_CIRCLED[topic.ch] + '-' + topic.secTo : '';
        const ref = topic.label;
        const existing = entries.find(e => e.ref === ref);
        if (existing) {
          setQuizEntry(existing);
        } else {
          const entry = { id: Date.now(), pageFrom, pageTo, ref, createdAt: Date.now() };
          const updated = [...entries, entry];
          saveEntries(updated);
          setQuizEntry(entry);
        }
        setKeyword('');
      };

      const deleteEntry = (id) => {
        saveEntries(entries.filter(e => e.id !== id));
        const state = getState(category.id);
        if (state.ratings) { delete state.ratings[`entry_${id}`]; setState(category.id, state); }
        if (quizEntry && quizEntry.id === id) setQuizEntry(null);
      };

      const rateEntry = (entryId, ratingKey) => {
        const state = getState(category.id);
        if (!state.ratings) state.ratings = {};
        const r = RATINGS.find(x => x.key === ratingKey);
        const key = `entry_${entryId}`;
        if (r.days === null) {
          state.ratings[key] = { mastered: true, rating: ratingKey, ratedAt: Date.now() };
        } else {
          const tmrw = new Date(); tmrw.setHours(0,0,0,0); tmrw.setDate(tmrw.getDate() + r.days);
          state.ratings[key] = { nextReview: tmrw.getTime(), rating: ratingKey, ratedAt: Date.now() };
        }
        setState(category.id, state);
        setEntries([...entries]);
        setQuizEntry(null);
      };

      const getRatingInfo = (entryId) => {
        const state = getState(category.id);
        const r = (state.ratings || {})[`entry_${entryId}`];
        if (!r) return { label: '未学習', color: '#a0aec0', isDue: true };
        if (r.mastered) return { label: '定着', color: '#38a169', isDue: false };
        const found = RATINGS.find(x => x.key === r.rating);
        const isDue = r.nextReview <= Date.now();
        return { label: r.rating, color: found ? found.color : '#a0aec0', isDue };
      };

      const dueCount = entries.filter(e => getRatingInfo(e.id).isDue).length;

      const sortedEntries = [...entries].sort((a, b) => {
        const aInfo = getRatingInfo(a.id);
        const bInfo = getRatingInfo(b.id);
        if (aInfo.isDue && !bInfo.isDue) return -1;
        if (!aInfo.isDue && bInfo.isDue) return 1;
        return 0;
      });

      const glass = { background: 'rgba(255,255,255,.85)', backdropFilter: 'blur(12px)', borderRadius: 14, border: '1px solid rgba(255,255,255,.5)', boxShadow: '0 4px 20px rgba(0,0,0,.08)' };
      const inputSt = { padding: '8px 12px', border: '1px solid #d0d8e0', borderRadius: 8, fontSize: 14, outline: 'none', background: '#f8fafc', textAlign: 'center', width: 90 };
      const tabBtn = (active) => ({ flex: 1, padding: '8px 0', background: active ? cc.accent : 'rgba(255,255,255,.15)', color: active ? '#fff' : 'rgba(255,255,255,.7)', border: 'none', borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: 'pointer' });

      // 出題カード表示中
      if (quizEntry) {
        const ri = getRatingInfo(quizEntry.id);
        return (
          <div style={{ minHeight: '100vh', background: cc.bg, padding: '16px 12px' }}>
            <div style={{ maxWidth: 720, margin: '0 auto' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                <button onClick={() => setQuizEntry(null)} style={{ padding: '8px 18px', background: 'rgba(255,255,255,.25)', color: '#fff', border: '1px solid rgba(255,255,255,.4)', borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: 'pointer', backdropFilter: 'blur(8px)' }}>← 戻る</button>
                <h2 style={{ color: '#fff', fontWeight: 800, fontSize: 16, textShadow: '0 1px 4px rgba(0,0,0,.15)' }}>出題</h2>
                <div style={{ width: 70 }} />
              </div>

              <div style={{ ...glass, padding: 28 }}>
                <div style={{ padding: 24, background: cc.light, borderRadius: 14, border: `2px solid ${cc.accent}30`, marginBottom: 20, textAlign: 'center' }}>
                  <div style={{ fontSize: 12, color: '#718096', fontWeight: 700, marginBottom: 10 }}>この範囲の内容を説明してください</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: cc.accent, lineHeight: 1.5 }}>{quizEntry.ref || (quizEntry.pageFrom + ' 〜 ' + quizEntry.pageTo)}</div>
                </div>

                {ri.label !== '未学習' && (
                  <div style={{ textAlign: 'center', marginBottom: 16 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: ri.color, background: ri.color + '18', padding: '4px 14px', borderRadius: 10 }}>前回: {ri.label}</span>
                  </div>
                )}

                <div style={{ fontSize: 13, color: '#718096', fontWeight: 700, textAlign: 'center', marginBottom: 12 }}>理解度を選択</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  {RATINGS.map(r => (
                    <button key={r.key} onClick={() => rateEntry(quizEntry.id, r.key)}
                      style={{ padding: '14px 12px', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 14, color: '#fff', background: r.color, cursor: 'pointer', boxShadow: '0 2px 8px rgba(0,0,0,.12)' }}>
                      {r.key}{r.days !== null ? `（${r.days}日後）` : ''}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', background: cc.bg, padding: '16px 12px' }}>
          <div style={{ maxWidth: 720, margin: '0 auto' }}>
            {/* ヘッダー */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <button onClick={onBack} style={{ padding: '8px 18px', background: 'rgba(255,255,255,.25)', color: '#fff', border: '1px solid rgba(255,255,255,.4)', borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: 'pointer', backdropFilter: 'blur(8px)' }}>← 戻る</button>
              <h2 style={{ color: '#fff', fontWeight: 800, fontSize: 18, textShadow: '0 1px 4px rgba(0,0,0,.15)' }}>{category.name}</h2>
              <div style={{ width: 70 }} />
            </div>

            {/* 入力切替タブ */}
            <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
              <button onClick={() => setInputMode('page')} style={tabBtn(inputMode === 'page')}>ページ指定</button>
              <button onClick={() => setInputMode('keyword')} style={tabBtn(inputMode === 'keyword')}>キーワード出題</button>
            </div>

            {/* ページ指定モード */}
            {inputMode === 'page' && (
              <div style={{ ...glass, padding: 20, marginBottom: 16 }}>
                <h3 style={{ fontSize: 15, fontWeight: 800, color: 'var(--text)', marginBottom: 12 }}>ページ範囲から出題</h3>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, marginBottom: 10 }}>
                  <input type="text" placeholder="6-1" value={newFrom} onChange={e => setNewFrom(autoConvertPage(e.target.value))} style={inputSt} />
                  <span style={{ fontSize: 16, fontWeight: 700, color: '#718096' }}>〜</span>
                  <input type="text" placeholder="6-3" value={newTo} onChange={e => setNewTo(autoConvertPage(e.target.value))} style={inputSt} />
                </div>
                {newFrom && (
                  <input type="text" value={newRef} onChange={e => setNewRef(e.target.value)}
                    style={{ width: '100%', textAlign: 'center', fontSize: 13, color: cc.accent, fontWeight: 700, marginBottom: 10, padding: '6px 12px', background: cc.light, borderRadius: 8, border: `1px solid ${cc.accent}30`, outline: 'none', boxSizing: 'border-box' }} />
                )}
                <button onClick={quizByPage} style={{ width: '100%', padding: '10px 0', background: cc.accent, color: '#fff', border: 'none', borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>出題する</button>
              </div>
            )}

            {/* キーワード出題モード */}
            {inputMode === 'keyword' && (
              <div style={{ ...glass, padding: 20, marginBottom: 16 }}>
                <h3 style={{ fontSize: 15, fontWeight: 800, color: 'var(--text)', marginBottom: 12 }}>キーワードから出題（AB ランク）</h3>
                <input type="text" placeholder="例: 標準原価計算、CVP、退職給付..." value={keyword} onChange={e => setKeyword(e.target.value)}
                  style={{ width: '100%', padding: '10px 14px', border: '1px solid #d0d8e0', borderRadius: 8, fontSize: 14, outline: 'none', background: '#f8fafc', boxSizing: 'border-box', marginBottom: 12 }} />
                <div style={{ maxHeight: 360, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {filteredTopics.length === 0 && (
                    <div style={{ textAlign: 'center', padding: 20, color: '#a0aec0', fontSize: 13 }}>
                      {Object.keys(CHAPTER_MAP[category.id] || {}).length === 0 ? 'この科目のデータは準備中です' : '該当なし'}
                    </div>
                  )}
                  {filteredTopics.map((topic, i) => {
                    const isSec = !!topic.secName;
                    return (
                      <button key={i} onClick={() => quizByTopic(topic)}
                        style={{ display: 'flex', alignItems: 'center', gap: 8, padding: isSec ? '8px 12px 8px 24px' : '10px 12px', background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 10, cursor: 'pointer', textAlign: 'left' }}>
                        <span style={{ fontSize: 10, fontWeight: 800, color: topic.rank === 'A' ? '#e53e3e' : '#dd6b20', background: topic.rank === 'A' ? '#fff5f5' : '#fffaf0', padding: '2px 8px', borderRadius: 6, minWidth: 24, textAlign: 'center' }}>{topic.rank}</span>
                        <span style={{ flex: 1, fontSize: isSec ? 12 : 13, fontWeight: isSec ? 600 : 700, color: isSec ? '#4a5568' : '#2d3748' }}>{topic.label}</span>
                        <span style={{ fontSize: 12, color: cc.accent, fontWeight: 700 }}>出題→</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 出題履歴 */}
            {entries.length > 0 && (
              <div style={{ ...glass, padding: 16, marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 800, color: 'var(--text)' }}>出題履歴（{entries.length}件）</h3>
                  <span style={{ fontSize: 13, fontWeight: 700, color: dueCount > 0 ? '#e53e3e' : '#38a169', background: dueCount > 0 ? '#fff5f5' : '#f0fff4', padding: '4px 12px', borderRadius: 10 }}>
                    {dueCount > 0 ? `復習対象 ${dueCount}件` : '全て完了'}
                  </span>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {sortedEntries.map((entry, idx) => {
                    const ri = getRatingInfo(entry.id);
                    const isExpanded = expandedId === entry.id;
                    return (
                      <div key={entry.id} style={{ background: ri.isDue ? '#fffbf0' : '#f8fafc', borderRadius: 10, border: ri.isDue ? `2px solid ${cc.accent}40` : '1px solid #e2e8f0', overflow: 'hidden' }}>
                        <div
                          onClick={() => setExpandedId(isExpanded ? null : entry.id)}
                          style={{ padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
                          <span style={{ fontSize: 11, color: '#a0aec0', fontWeight: 700, minWidth: 20 }}>{idx + 1}</span>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: '#2d3748', lineHeight: 1.4 }}>{entry.ref || (entry.pageFrom + ' 〜 ' + entry.pageTo)}</div>
                          </div>
                          <span style={{ fontSize: 10, fontWeight: 700, color: ri.color, background: ri.color + '18', padding: '2px 8px', borderRadius: 10, whiteSpace: 'nowrap' }}>{ri.label}</span>
                          {ri.isDue && (
                            <button onClick={(e) => { e.stopPropagation(); setQuizEntry(entry); }}
                              style={{ padding: '3px 10px', background: cc.accent, color: '#fff', border: 'none', borderRadius: 6, fontSize: 10, fontWeight: 700, cursor: 'pointer', whiteSpace: 'nowrap' }}>再出題</button>
                          )}
                          <span style={{ fontSize: 12, color: '#a0aec0', transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>▼</span>
                        </div>
                        {isExpanded && (
                          <div style={{ padding: '0 12px 10px 12px', display: 'flex', gap: 6 }}>
                            <button onClick={(e) => { e.stopPropagation(); setQuizEntry(entry); }}
                              style={{ flex: 1, padding: '7px 0', background: cc.accent, color: '#fff', border: 'none', borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>出題する</button>
                            <button onClick={(e) => { e.stopPropagation(); if(confirm('削除しますか？')) deleteEntry(entry.id); }}
                              style={{ padding: '7px 14px', background: 'none', border: '1px solid #fed7d7', borderRadius: 8, fontSize: 11, color: '#e53e3e', fontWeight: 700, cursor: 'pointer' }}>削除</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const [selected, setSelected] = useState(null);
      const [recallData, setRecallData] = useState(null);

      if (recallData) {
        return <RecallStudy problem={recallData.problem} allDue={recallData.allDue} startIdx={recallData.startIdx} onBack={() => setRecallData(null)} />;
      }

      if (!selected) {
        return <CategorySelect onSelect={setSelected} onStartRecall={(data) => setRecallData(data)} />;
      }

      if (selected.hasData) {
        return <CalculationStudy category={selected} onBack={() => setSelected(null)} />;
      } else {
        return <TheoryStudy category={selected} onBack={() => setSelected(null)} />;
      }
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
