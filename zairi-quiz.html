<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務会計短答対策</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;--card:#ffffff;--card2:#f5f5f5;
  --accent:#e53e3e;--accent2:#c53030;
  --green:#38a169;--red:#e53e3e;--orange:#dd6b20;
  --text:#2d3748;--text2:#718096;--border:#e2e8f0;
  --gold:#c05621;
}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:12px}
.nav{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:12px;padding:4px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nav-btn{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn:hover:not(.active){background:var(--card2)}
.header{text-align:center;margin-bottom:16px}
.header h1{font-size:18px;color:var(--accent);font-weight:800}
.header .sub{color:var(--text2);font-size:11px;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .val{font-size:22px;font-weight:800;color:var(--accent)}
.stat-card .val.green{color:var(--green)}
.stat-card .val.red{color:var(--red)}
.stat-card .val.orange{color:var(--orange)}
.stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
.question-list{display:flex;flex-direction:column;gap:8px}
.q-card{background:var(--card);border-radius:10px;padding:14px;border-left:4px solid var(--accent);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.q-card.answered-correct{border-left-color:var(--green);opacity:.65}
.q-card.answered-wrong{border-left-color:var(--red)}
.q-card.current{border-left-color:var(--accent);box-shadow:0 2px 12px rgba(229,62,62,.12)}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.q-num{font-size:12px;color:var(--text2);font-weight:600}
.q-badges{display:flex;gap:4px}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-a{background:#fed7d7;color:#c53030}
.badge-b{background:#feebc8;color:#9c4221}
.badge-freq-top{background:#fed7d7;color:#c53030}
.badge-freq-high{background:#fefcbf;color:#975a16}
.badge-freq-mid{background:#c6f6d5;color:#276749}
.badge-freq-low{background:#f7fafc;color:#718096}
.q-chapter{font-size:14px;font-weight:700;margin-bottom:2px;color:var(--text)}
.q-chapter .stars{color:var(--gold);margin-left:4px;letter-spacing:1px}
.q-question{font-size:13px;color:var(--text2)}
.q-meta{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text2)}
.q-actions{display:flex;gap:8px;margin-top:10px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s}
.btn-correct{background:var(--green);color:#fff}
.btn-wrong{background:var(--red);color:#fff}
.btn-correct:hover{filter:brightness(1.1)}
.btn-wrong:hover{filter:brightness(1.1)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.memo-input{width:100%;margin-top:8px;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;line-height:1.7;resize:none;letter-spacing:0.3px}
.memo-input:focus{outline:none;border-color:var(--accent)}
.timer-row{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.timer-display{font-family:'SF Mono','Menlo',monospace;font-size:18px;font-weight:700;color:var(--accent);min-width:70px}
.timer-display.running{color:var(--green);animation:pulse 1s infinite}
.timer-display.stopped{color:var(--text)}
.btn-timer{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;transition:all .15s;background:#e6fffa;color:#234e52;border:1px solid #81e6d9}
.btn-timer:hover{background:#b2f5ea}
.btn-timer.running{background:#fff5f5;color:var(--red);border-color:#feb2b2}
.time-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'SF Mono','Menlo',monospace;background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8}
.time-badge.fast{background:#f0fff4;color:#276749;border-color:#c6f6d5}
.time-badge.slow{background:#fff5f5;color:#c53030;border-color:#fed7d7}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.progress-bar{width:100%;height:6px;background:var(--card2);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--accent),#fc8181)}
.section-title{font-size:15px;font-weight:800;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--border);color:var(--text)}
.mistake-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--red);box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:all .2s}
.mistake-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.topic-guide{margin-top:10px;padding:12px;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;font-size:12px;line-height:1.8;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.topic-guide .tg-section{margin-bottom:8px}
.topic-guide .tg-label{font-weight:700;color:#c53030;font-size:11px;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.topic-guide .tg-content{color:var(--text);padding-left:4px}
.topic-guide .tg-formula{background:#fffff0;border:1px solid #e2e8f0;border-radius:4px;padding:6px 8px;margin:4px 0;font-family:'Courier New',monospace;font-size:11px;color:#2d3748}
.expand-hint{font-size:10px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:4px}
.mistake-memo{font-size:12px;color:#9c4221;margin-top:4px;padding:6px;background:#fff;border-radius:4px;border:1px solid #feebc8}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:11px;transition:all .15s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-container{background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{min-width:90px;font-size:11px;color:var(--text2);text-align:right}
.bar-track{flex:1;height:22px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{position:absolute;right:6px;top:3px;font-size:10px;font-weight:700;color:var(--text)}
.group-analysis{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:14px}
.group-card{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s}
.group-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.group-name{font-size:13px;font-weight:700;margin-bottom:6px}
.group-stats{display:flex;gap:12px;font-size:11px;color:var(--text2)}
.group-bar{width:100%;height:4px;background:var(--card2);border-radius:2px;margin-top:6px}
.group-bar-fill{height:100%;border-radius:2px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:13px}
.today-info{background:linear-gradient(135deg,#fff5f5,#fffaf0);border:1px solid #fed7d7;border-radius:12px;padding:14px;margin-bottom:14px;text-align:center}
.today-info .date{font-size:16px;font-weight:800;color:var(--accent)}
.today-info .day-count{font-size:11px;color:var(--text2);margin-top:4px}
.spaced-info{font-size:11px;color:var(--text2);margin-top:4px}
.spaced-info .new{color:var(--green);font-weight:600}
.spaced-info .review{color:var(--orange);font-weight:600}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:linear-gradient(135deg,#fed7d7,#fc8181);border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-top:6px}
.tab-content{min-height:60vh}
.reset-section{margin-top:30px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.btn-danger{background:#fff5f5;color:var(--red);padding:8px 20px;border:1px solid #fed7d7;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-danger:hover{background:#fed7d7}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h3{margin-bottom:10px;font-size:16px}
.modal p{color:var(--text2);font-size:13px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:center}
.completion-banner{background:linear-gradient(135deg,#fff5f5,#fed7d7);border:1px solid #fc8181;border-radius:12px;padding:18px;text-align:center;margin-bottom:14px}
.completion-banner h2{color:var(--accent);font-size:16px;margin-bottom:4px}
.completion-banner p{color:var(--text2);font-size:12px}
.sr-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700}
.sr-new{background:#c6f6d5;color:#276749}
.sr-review{background:#feebc8;color:#9c4221}
.sr-overdue{background:#fed7d7;color:#c53030}
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--card2)}
@media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr)}.group-analysis{grid-template-columns:1fr}.nav-btn{font-size:11px;padding:8px 4px}}
.sd-table{width:100%;border-collapse:collapse;font-size:11px}
.sd-table th{background:var(--accent);color:#fff;padding:6px 8px;text-align:left;font-size:10px}
.sd-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.sd-table tr:nth-child(even) td{background:#f7fafc}
.sd-type-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;flex-shrink:0}

/* ═══ 復習カード v2 (論点形式) ═══ */
.rv-page{padding:8px 0}
.rv-header{text-align:center;margin-bottom:16px}
.rv-header .rv-title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#0ea5e9,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rv-header .rv-sub{font-size:12px;color:var(--text2);margin-top:4px}
.rv-date-group{margin-bottom:20px}
.rv-date-label{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;font-weight:700;color:#0ea5e9}
.rv-date-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#0ea5e9 0%,transparent 100%)}
.rv-problem{margin-bottom:20px}
.rv-prob-head{background:linear-gradient(135deg,#0284c7,#0ea5e9);border-radius:12px 12px 0 0;padding:12px 16px;color:#fff}
.rv-prob-ch{font-size:11px;opacity:0.85}
.rv-prob-q{font-size:16px;font-weight:800;margin-top:2px}
.rv-prob-topic{font-size:12px;color:#fbbf24;font-weight:600;margin-top:2px}
.rv-ronten{background:#fff;border:1px solid #bae6fd;border-top:none;padding:0;margin-bottom:0}
.rv-ronten:last-child{border-radius:0 0 12px 12px;overflow:hidden}
.rv-ronten-head{background:linear-gradient(90deg,#e0f2fe,#f0f9ff);padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.rv-ronten-num{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rv-ronten-title{font-size:14px;font-weight:700;color:#0c4a6e}
.rv-ronten-body{padding:12px 16px 14px}
.rv-desc{font-size:13px;line-height:1.7;color:#334155;margin-bottom:10px}
.rv-formula-box{background:#fff;border-left:3px solid #d97706;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:10px;font-family:'SF Mono','Menlo',monospace;font-size:12px;line-height:1.6;color:#92400e;white-space:pre-wrap}
.rv-trap-box{background:#fff;border-left:3px solid #dc2626;border-radius:0 8px 8px 0;padding:10px 12px;font-size:13px;line-height:1.6;color:#991b1b}
.rv-trap-box::before{content:'⚠ 引っかけ注意';display:block;font-size:11px;font-weight:700;color:#dc2626;margin-bottom:4px}
.rv-memo-box{background:#fff;border-left:3px solid #0ea5e9;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 16px 10px;font-size:13px;line-height:1.6;color:#0c4a6e;white-space:pre-wrap}
.rv-memo-box::before{content:"📝 自分のメモ";display:block;font-size:11px;font-weight:700;color:#0284c7;margin-bottom:4px}

.rv-empty{text-align:center;padding:40px 16px;color:var(--text2)}
.rv-empty-icon{font-size:48px;margin-bottom:12px}
.rv-empty-msg{font-size:14px;line-height:1.6}
.rv-badge-count{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:4px;vertical-align:middle}


/* ═══ カレンダー ═══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-header{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:6px 0}
.cal-cell{min-height:48px;border-radius:6px;padding:3px 4px;font-size:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.cal-cell:hover{border-color:var(--accent)}
.cal-cell.today{border:2px solid var(--accent);font-weight:700}
.cal-cell.other-month{opacity:.3}
.cal-day{font-weight:600;font-size:11px;margin-bottom:2px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.correct{background:#48bb78}
.cal-dot.wrong{background:var(--red)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav button{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text)}
.cal-nav button:active{transform:scale(.97)}
.cal-month-label{font-size:16px;font-weight:800;color:var(--text)}
.cal-detail{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.cal-detail-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.cal-detail-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.cal-detail-item:last-child{border-bottom:none}
.cal-result{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.cal-result.c{background:#48bb78}
.cal-result.w{background:var(--red)}
.cal-summary{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cal-summary-card{flex:1;min-width:80px;background:var(--card);border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cal-summary-card .num{font-size:20px;font-weight:800}
.cal-summary-card .label{font-size:10px;color:var(--text2);margin-top:2px}
/* highlight marker */
mark.hl{background:#fff176;border-radius:2px;padding:0 1px;cursor:pointer}
mark.hl.hl-orange{background:#ffcc80}
mark.hl.hl-green{background:#a5d6a7}
mark.hl.hl-pink{background:#f8bbd0}
mark.hl.hl-blue{background:#90caf9}
.hl-toolbar{position:fixed;z-index:9999;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:6px 8px;display:none;gap:6px;align-items:center}
.hl-toolbar button{border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;line-height:26px;text-align:center}
.hl-toolbar button:active{transform:scale(.9)}
/* ═══ 直前答練 ═══ */
.touren-page{padding:8px 0}
.touren-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.touren-stat-card{background:var(--card);border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.touren-stat-val{font-size:20px;font-weight:800;color:var(--accent)}
.touren-stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.touren-group{margin-bottom:20px}
.touren-group-title{font-size:14px;font-weight:800;color:var(--text);padding:8px 12px;background:var(--card2);border-left:4px solid var(--accent);margin-bottom:10px;border-radius:6px}
.touren-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.touren-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.touren-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.touren-card-title{font-size:13px;font-weight:700;color:var(--text)}
.touren-card-topic{font-size:12px;color:var(--text2);margin-top:2px}
.touren-answer-row{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin:8px 0}
.touren-answer-btn{padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;text-align:center}
.touren-answer-btn:hover{border-color:var(--accent);background:var(--card)}
.touren-answer-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.touren-answer-btn.correct{background:var(--green);color:#fff;border-color:var(--green)}
.touren-answer-btn.wrong{background:var(--red);color:#fff;border-color:var(--red)}
.touren-result{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin:4px 0}
.touren-result.answered-correct{background:#c6f6d5;color:#276749}
.touren-result.answered-wrong{background:#fed7d7;color:#c53030}
.touren-result.unanswered{background:var(--card2);color:var(--text2)}
</style>

<body>
<div id="root"></div>

};

// 日付ベースで今日の短直ユニットを1つ選ぶ（日替わりランダム）
function getTodayTourenUnit() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  const idx = seed % TOUREN_UNITS.length;
  return TOUREN_UNITS[idx];
}

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const daysBetween = (d1, d2) => Math.floor((new Date(d2) - new Date(d1)) / 86400000);
const freqWeight = (f) => f.includes("最頻出") ? 4 : f.includes("頻出") ? 3 : f.includes("可能性") ? 2 : 1;
const impWeight = (imp) => imp === "A" ? 2 : 1;

// 日付ベースのシード付き擬似乱数
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}
function dateToSeed(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) {
    h = ((h << 5) - h) + dateStr.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}
const shortDate = (d) => { if (!d) return ''; const m = d.match(/\d{4}-(\d{2})-(\d{2})/); return m ? `${parseInt(m[1])}/${parseInt(m[2])}` : d; };

// SM-2 スペースドリピティション
// ═══════════════════════════════════════════════════════════
const DEFAULT_SR = { interval: 0, repetitions: 0, easeFactor: 2.5, nextReview: null, lastReview: null };

function updateSR(sr, quality) {
  const s = { ...sr };
  if (quality >= 3) {
    if (s.repetitions === 0) s.interval = 1;
    else if (s.repetitions === 1) s.interval = 3;
    else s.interval = Math.round(s.interval * s.easeFactor);
    s.repetitions += 1;
  } else {
    s.repetitions = 0;
    s.interval = 1;
  }
  s.easeFactor = Math.max(1.3, s.easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  const next = new Date(todayStr());
  next.setDate(next.getDate() + s.interval);
  s.nextReview = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
  s.lastReview = todayStr();
  return s;
}

// ═══════════════════════════════════════════════════════════
// 毎日17問 出題ロジック
// 優先度: ①未解答 → ②前回不正解 → ③前回○だが過去×あり → ④全正解
// ABランクのみ、総合問題は除外、連結問題を必ず含める
// ═══════════════════════════════════════════════════════════
function generateDailySet(srData, date, dailySets, history) {
  const today = date || todayStr();
  const rng = seededRandom(dateToSeed(today));
  const isSogo = (p) => p.chapter.startsWith("総合");
  const hist = history || [];

  // ═══ 履歴ベースの分類 ═══
  const histByProblem = {};
  hist.forEach(h => {
    if (!histByProblem[h.id]) histByProblem[h.id] = [];
    histByProblem[h.id].push(h);
  });

  const classify = (problemId) => {
    const entries = histByProblem[problemId];
    if (!entries || entries.length === 0) return 'unseen';           // 1. 未解答
    const last = entries[entries.length - 1];
    if (last.result === 'wrong') return 'lastWrong';                // 2. 前回不正解
    const everWrong = entries.some(e => e.result === 'wrong');
    if (everWrong) return 'lastOkButEverWrong';                     // 3. 前回○だが過去×あり
    return 'clean';                                                  // 4. 全部正解
  };

  const TIER = { unseen: 300, lastWrong: 200, lastOkButEverWrong: 100, clean: 10 };

  // 最近3日間の出題にペナルティ
  const recentIds = new Set();
  if (dailySets) {
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const prev = dailySets[ds];
      if (prev && prev.questions) prev.questions.forEach(q => recentIds.add(q.id));
    }
  }

  const enrichProblem = (p) => {
    const sr = srData[p.id];
    const cat = classify(p.id);
    const tierScore = TIER[cat];
    const randomBonus = rng() * 15;
    const recentPenalty = recentIds.has(p.id) ? -50 : 0;
    const impBonus = p.imp === 'A' ? 5 : 0;
    const renketsuBonus = isRenketsu(p.chapter) ? 3 : 0;
    return {
      ...p,
      category: cat,
      srInfo: (!sr || !sr.lastReview) ? DEFAULT_SR : sr,
      priority: tierScore + impBonus + renketsuBonus + randomBonus + recentPenalty
    };
  };

  let selected = [];
  const allEnriched = PROBLEMS.filter(p => !isSogo(p)).map(enrichProblem);

  // ═══ 章分散でラウンドロビン選出 ═══
  const byChapter = {};
  allEnriched.sort((a, b) => b.priority - a.priority).forEach(p => {
    if (!byChapter[p.chapter]) byChapter[p.chapter] = [];
    byChapter[p.chapter].push(p);
  });

  const chapterKeys = Object.keys(byChapter);
  // 日付シードでシャッフル
  for (let i = chapterKeys.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [chapterKeys[i], chapterKeys[j]] = [chapterKeys[j], chapterKeys[i]];
  }

  // 1周目: 各章から1問ずつ
  let picked = [];
  for (const ch of chapterKeys) {
    if (picked.length >= 17) break;
    if (byChapter[ch].length > 0) picked.push(byChapter[ch].shift());
  }
  // 2周目以降: まだ足りなければ優先度順で補充
  if (picked.length < 17) {
    const leftover = Object.values(byChapter).flat().sort((a, b) => b.priority - a.priority);
    while (picked.length < 17 && leftover.length > 0) picked.push(leftover.shift());
  }

  // 連結問題を必ず1問含める
  const hasRenketsu = picked.some(q => isRenketsu(q.chapter));
  if (!hasRenketsu && picked.length > 0) {
    const pickedIds = new Set(picked.map(p => p.id));
    const renketsuPick = allEnriched.find(p => isRenketsu(p.chapter) && !pickedIds.has(p.id));
    if (renketsuPick) picked[picked.length - 1] = renketsuPick;
  }

  selected = picked;

  // 章番号順にソート
  selected.sort((a, b) => a.chapterNum - b.chapterNum);
  return selected;
}

  }, [state]);

      setAnswers(ans);
      setMemos(mem);
      setElapsedTimes(times);

      const newSet = generateDailySet(state.srData, today, state.dailySets, state.history);
      setDailySet(newSet);
      // 旧セットの回答済みデータをIDベースで引き継ぐ

  }, [dailySet, answers]);

    // タイマー停止 & 経過時間取得
    const timeSec = stopTimer(problemId);
    const newAnswers = { ...answers, [problemId]: result };
    setAnswers(newAnswers);
    const today = todayStr();
    const quality = result === 'correct' ? 4 : 1;
    const prob = PROBLEMS.find(p => p.id === problemId);
    const newSr = updateSR(state.srData[problemId] || { ...DEFAULT_SR }, quality);
    const histEntry = { id: problemId, date: today, result, chapter: prob?.chapter||'', question: prob?.q||'', memo: memos[problemId]||'', freq: prob?.freq||'', imp: prob?.imp||'', time: timeSec };
    const newState = { ...state, srData: { ...state.srData, [problemId]: newSr }, history: [...state.history, histEntry] };
    const existingAnswers = (newState.dailySets[today]?.answers || []).filter(a => a.id !== problemId);
    existingAnswers.push(histEntry);
    newState.dailySets[today] = { questions: dailySet, answers: existingAnswers, completed: Object.keys(newAnswers).length >= dailySet.length, date: today };
    setState(newState);
    saveState(newState);
  }, [answers, memos, state, dailySet, timerStart, elapsedTimes]);

  const handleMemoSave = useCallback((problemId, memo) => {
    setMemos(prev => ({ ...prev, [problemId]: memo }));
    if (answers[problemId]) {
      const today = todayStr();
      const newHistory = state.history.map(h => h.id === problemId && h.date === today ? { ...h, memo } : h);
      const ds = { ...state.dailySets };
      if (ds[today]) ds[today] = { ...ds[today], answers: (ds[today].answers||[]).map(a => a.id === problemId ? { ...a, memo } : a) };
      const newState = { ...state, history: newHistory, dailySets: ds };
      setState(newState);
      saveState(newState);
    }
  }, [answers, state]);

  const resetData = () => {
    const empty = { srData: {}, history: [], dailySets: {} };
    setState(empty); saveState(empty); setAnswers({}); setMemos({});

    setConfirmReset(false);
  };

  const regenerateToday = () => {
    const today = todayStr();
    const ns = { ...state }; delete ns.dailySets[today];
    const newSet = generateDailySet(ns.srData, today, ns.dailySets, ns.history);
    setDailySet(newSet);
    setAnswers({}); setMemos({}); setElapsedTimes({}); setTimerStart({});
    ns.dailySets[today] = { questions: newSet, answers: [], completed: false, date: today, _logicVer: 'v7_history_priority' };
    setState(ns); saveState(ns);
  };

  const analysisData = useMemo(() => {
    const chapterStats = ALL_CHAPTERS.map(ch => {
      const chHist = state.history.filter(h => h.chapter === ch);
      const total = chHist.length, correct = chHist.filter(h=>h.result==='correct').length;
      const probCount = PROBLEMS.filter(p=>p.chapter===ch).length;
      const uniqueSeen = new Set(chHist.map(h=>h.id)).size;
      return { chapter: ch, chapterNum: getChapterNum(ch), stars: getStars(ch), total, correct, wrong: total-correct, rate: total>0?Math.round(correct/total*100):0, probCount, uniqueSeen };
    });
    const freqStats = {
      '◎最頻出': state.history.filter(h => h.freq?.includes('最頻出')),
      '○頻出': state.history.filter(h => h.freq?.includes('頻出') && !h.freq?.includes('最頻出')),

      '─低め': state.history.filter(h => h.freq?.includes('低め'))
    };
    const totalAttempts = state.history.length;
    const totalCorrect = state.history.filter(h=>h.result==='correct').length;
    const uniqueDays = new Set(state.history.map(h=>h.date)).size;
    return { chapterStats, freqStats, totalAttempts, totalCorrect, uniqueDays };

  const mistakes = useMemo(() => {
    const wrong = state.history.filter(h => h.result === 'wrong');

  const mistakesByDate = useMemo(() => {
    const g = {};
    [...mistakes].reverse().forEach(m => { if (!g[m.date]) g[m.date] = []; g[m.date].push(m); });

      if (m.memo) g[m.id].memos.push(m.memo);

        const getReviewForProblem = (prob) => {

    const getReviewCards = () => {
      const today = todayStr();
      const yesterday = (() => { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
      const threeDaysAgo = (() => { const d = new Date(); d.setDate(d.getDate()-4); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();

      const getWrongForDate = (dateStr) => {
        const wrongIds = new Set();
        state.history.filter(h => h.result === 'wrong' && h.date === dateStr).forEach(h => wrongIds.add(h.id));

              <div className="stat-card"><div className="val red">{todayProgress.wrong}</div><div className="lbl">不正解</div></div>
              <div className="stat-card"><div className={`val ${todayProgress.rate>=80?'green':todayProgress.rate>=60?'orange':'red'}`}>{todayProgress.rate}%</div><div className="lbl">正答率</div></div>

                    </div>
                    {!answered && (
                      <div>

                          {!timerStart[q.id] && !elapsedTimes[q.id] && (
                            <button className="btn-timer" onClick={()=>startTimer(q.id)}>▶ スタート</button>
                          )}
                          {timerStart[q.id] && (
                            <>
                              <span className="timer-display running">{formatTime(getRunningTime(q.id))}</span>
                              <span style={{fontSize:10,color:'var(--green)'}}>計測中...</span>

                          <button className="btn btn-wrong" onClick={()=>handleAnswer(q.id,'wrong')} disabled={!timerStart[q.id]} style={{opacity:timerStart[q.id]?1:0.4}}>× 不正解</button>
                          <button className="btn btn-secondary" onClick={()=>setShowMemo(p=>({...p,[q.id]:!p[q.id]}))}>メモ</button>
                        </div>
                      </div>
                    )}
                    {answered && (
                      <div className="q-actions">
                        <span style={{fontSize:20}}>{answered==='correct'?'✅':'❌'}</span>
                        {elapsedTimes[q.id] != null && (

                        )}
                        <button className="btn btn-secondary" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>setShowMemo(p=>({...p,[q.id]:!p[q.id]}))}>{memos[q.id]?'メモ編集':'メモ追加'}</button>
                      </div>

                    {(showMemo[q.id] || memos[q.id]) && (

                    )}
                  </div>

                const timeSec = stopTimer(probId);
                const isCorrect = selectedAns === prob.answer;
                const result = isCorrect ? 'correct' : 'wrong';
                setTourenAnswers(prev => ({ ...prev, [probId]: { answer: selectedAns, result, time: timeSec } }));
                const newHistory = [...tourenState.history];
                const existingIdx = newHistory.findIndex(h => h.id === probId);
                const entry = { id: probId, result, answer: selectedAns, date: todayStr(), memo: memos[probId] || '', time: timeSec };
                if (existingIdx >= 0) {
                  newHistory[existingIdx] = entry;
                } else {
                  newHistory.push(entry);
                }
                const newTourenState = { ...tourenState, history: newHistory };
                setTourenState(newTourenState);

              return (

                  };

                }
                const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
                a.href=u;a.download=`cpa_fin_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(u);
              }}>バックアップ (JSON)</button>
              <label className="btn btn-secondary" style={{display:'inline-block',marginLeft:8}}>
                復元
                <input type="file" accept=".json" style={{display:'none'}} onChange={(e)=>{
                  const f=e.target.files[0];if(!f)return;const r=new FileReader();
                  r.onload=(ev)=>{try{
                    const data=JSON.parse(ev.target.result);
                    const keys=Object.keys(data);
                    if(keys.length===0){alert('有効なデータがありません');return;}
                    if(keys[0]==='problems'){setState(data);saveState(data);alert('復元完了（旧形式）');location.reload();return;}
                    if(!confirm(keys.length+'件のデータを復元します。よろしいですか？'))return;
                    keys.forEach(k=>localStorage.setItem(k,data[k]));
                    alert('復元完了！');location.reload();
                  }catch(err){alert('ファイル形式エラー');}};
                  r.readAsText(f);
                }}/>
              </label>
            </div>
            <div className="reset-section">
              <button className="btn-danger" onClick={()=>setConfirmReset(true)}>全データをリセット</button>
              <div style={{fontSize:10,color:'var(--text2)',marginTop:6}}>※全ての学習記録が削除されます</div>
            </div>
          </div>
        )}

      </div>

      {confirmReset && (
        <div className="modal-overlay" onClick={()=>setConfirmReset(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>全データリセット</h3>
            <p>全ての学習記録・SR状態が削除されます。取り消せません。</p>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setConfirmReset(false)}>キャンセル</button>
              <button className="btn btn-wrong" onClick={resetData}>リセットする</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// ===== HIGHLIGHT MARKER SYSTEM =====
(function(){
  var HL_KEY='cpa_fin_hl_v1';
  var hlDB=JSON.parse(localStorage.getItem(HL_KEY)||'{}');

  var tb=document.createElement('div');
  tb.className='hl-toolbar';
  tb.innerHTML='<button style="background:#fff176" data-hlc="">Y</button>'
    +'<button style="background:#ffcc80" data-hlc="hl-orange">O</button>'
    +'<button style="background:#a5d6a7" data-hlc="hl-green">G</button>'
    +'<button style="background:#f8bbd0" data-hlc="hl-pink">P</button>'
    +'<button style="background:#90caf9" data-hlc="hl-blue">B</button>'
    +'<button style="background:#eee;font-size:12px" data-hlc="__clear">✕</button>';
  document.body.appendChild(tb);

  var _sel=null,_container=null;

  // Find a highlightable container
  function findHlContainer(el){
    if(!el) return null;
    // Walk up to find a markable container
    return el.closest('.rv-ronten-body,.rv-prob-head,.rv-memo-box,.mistake-memo,.topic-guide,.tg-content,.q-chapter');
  }

  // Generate an ID for a container based on its text context
  function getContainerId(container){
    var parent = container.closest('.rv-problem,.mistake-item,.q-card');
    if(!parent) return null;
    // Use a hash of the first significant text
    var headEl = parent.querySelector('.rv-prob-ch,.q-num') || parent;
    var txt = (headEl.textContent||'').trim().substring(0,60);
    var section = container.className.split(' ')[0] || 'x';
    return 'hl_' + section + '_' + hashStr(txt);
  }

  document.addEventListener('mouseup',function(e){
    setTimeout(function(){
      var sel=window.getSelection();
      if(!sel||sel.isCollapsed||!sel.rangeCount){tb.style.display='none';return;}
      var range=sel.getRangeAt(0);
      var anc=range.commonAncestorContainer;
      if(anc.nodeType===3) anc=anc.parentElement;
      var container=findHlContainer(anc);
      if(!container){tb.style.display='none';return;}
      _sel=sel;_container=container;
      var rect=range.getBoundingClientRect();
      tb.style.left=Math.max(4,Math.min(rect.left,window.innerWidth-200))+'px';
      tb.style.top=(rect.top-42+window.scrollY)+'px';
      tb.style.display='flex';
    },10);
  });

  document.addEventListener('mousedown',function(e){
    if(!tb.contains(e.target)) tb.style.display='none';
  });

  tb.addEventListener('click',function(e){
    e.stopPropagation();
    var btn=e.target.closest('button');
    if(!btn) return;
    var hlc=btn.getAttribute('data-hlc');
    if(hlc==='__clear'){ removeHL(); }
    else { applyHL(hlc); }
    tb.style.display='none';
    window.getSelection().removeAllRanges();
  });

  function applyHL(cls){
    if(!_sel||_sel.isCollapsed) return;
    var range=_sel.getRangeAt(0);
    var txt=range.toString();
    if(!txt.trim()) return;
    var mark=document.createElement('mark');
    mark.className='hl'+(cls?' '+cls:'');
    try{range.surroundContents(mark);}catch(ex){
      var frag=range.extractContents();
      mark.appendChild(frag);
      range.insertNode(mark);
    }
    _sel.removeAllRanges();
    saveHL();
  }

  function removeHL(){
    if(!_sel||_sel.isCollapsed) return;
    var range=_sel.getRangeAt(0);
    var anc=range.commonAncestorContainer;
    if(anc.nodeType===3) anc=anc.parentElement;
    var container=findHlContainer(anc);
    if(!container) return;
    var marks=container.querySelectorAll('mark.hl');
    marks.forEach(function(m){
      if(range.intersectsNode(m)){
        var parent=m.parentNode;
        while(m.firstChild) parent.insertBefore(m.firstChild,m);
        parent.removeChild(m);
        parent.normalize();
      }
    });
    _sel.removeAllRanges();
    saveHL();
  }

  function saveHL(){
    // Save all highlights on the page
    var allMarks=document.querySelectorAll('mark.hl');
    var db={};
    allMarks.forEach(function(m){
      var container=findHlContainer(m);
      if(!container) return;
      var cid=getContainerId(container);
      if(!cid) return;
      if(!db[cid]) db[cid]=[];
      db[cid].push({t:m.textContent,c:m.className.replace('hl','').trim()});
    });
    hlDB=db;
    try{localStorage.setItem(HL_KEY,JSON.stringify(hlDB));}catch(ex){}
  }

  function restoreAllHL(){
    if(!Object.keys(hlDB).length) return;
    // Find all highlightable containers and try to restore
    var containers=document.querySelectorAll('.rv-ronten-body,.rv-prob-head,.rv-memo-box,.mistake-memo,.topic-guide,.tg-content,.q-chapter');
    containers.forEach(function(container){
      var cid=getContainerId(container);
      if(!cid||!hlDB[cid]) return;
      hlDB[cid].forEach(function(entry){
        var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT,null,false);
        var node;
        while(node=walker.nextNode()){
          var idx=node.textContent.indexOf(entry.t);
          if(idx>=0 && !node.parentElement.closest('mark.hl')){
            var range=document.createRange();
            range.setStart(node,idx);
            range.setEnd(node,idx+entry.t.length);
            var mark=document.createElement('mark');
            mark.className='hl'+(entry.c?' '+entry.c:'');
            try{range.surroundContents(mark);}catch(ex){}
            break;
          }
        }
      });
    });
  }

  // Observe DOM changes to restore highlights when React re-renders
  var observer=new MutationObserver(function(){
    setTimeout(restoreAllHL,100);
  });
  observer.observe(document.body,{childList:true,subtree:true});

  // Initial restore
  setTimeout(restoreAllHL,500);

  function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
})();
</script>
