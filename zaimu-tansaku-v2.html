                                <div key={i} className="sd-section s-formula">
                                  <div className="s-title" style={{color:'#744210'}}>📐 公式</div>
                                  <div className="s-formula-text">{section.f}</div>
                                  {section.c && <div style={{fontSize:11,marginTop:4,color:'var(--text2)',whiteSpace:'pre-wrap'}}>{section.c}</div>}
                                </div>
                              );
                            } else if (section.c) {
                              return (
                                <div key={i} className="sd-section s-text">
                                  <div style={{whiteSpace:'pre-wrap',lineHeight:1.8}}>{section.c}</div>
                                </div>
                              );
                            }
                            return null;
                          })}
                        </div>
                      )}
                      <div style={{textAlign:'center',marginTop:16,display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
                        <button className="sd-back" onClick={()=>{
                          const keys = Object.keys(SUMMARY_DATA).sort((a,b)=>parseInt(a)-parseInt(b));
                          const idx = keys.indexOf(selectedSummary);
                          if (idx > 0) setSelectedSummary(keys[idx-1]);
                        }}>← 前の章</button>
                        <button className="sd-back" onClick={()=>setSelectedSummary(null)}>一覧へ戻る</button>
                        <button className="sd-back" onClick={()=>{
                          const keys = Object.keys(SUMMARY_DATA).sort((a,b)=>parseInt(a)-parseInt(b));
                          const idx = keys.indexOf(selectedSummary);
                          if (idx < keys.length - 1) setSelectedSummary(keys[idx+1]);
                        }}>次の章 →</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {/* ═══ 設定 ═══ */}
        {page === 'settings' && (
          <div>
            <div className="section-title">学習設定・情報</div>
            <div className="chart-container">
              <div className="chart-title">問題集データ</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.8}}>
                対象: 財務会計論（計算）短答対策問題集 1 & 2<br/>
                総問題数（フィルター後）: {PROBLEMS.length}問<br/>
                対象章数: {ALL_CHAPTERS.length}章<br/>
                除外: ランクC重要度・リース会計（第12章）
              </div>
            </div>
            <div className="chart-container">
              <div className="chart-title">★マーク凡例</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:2}}>
                <span style={{color:'var(--gold)'}}>★★★</span> ＝ 最頻出（ほぼ毎回出題）<br/>
                <span style={{color:'var(--gold)'}}>★★</span> ＝ 頻出（高い確率で出題）<br/>
                <span style={{color:'var(--gold)'}}>★</span> ＝ 出題可能性あり<br/>
                （なし） ＝ 出題頻度低め
              </div>
            </div>
            <div className="chart-container">
              <div className="chart-title">アルゴリズム</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.8}}>
                <b style={{color:'var(--accent)'}}>SM-2 スペースドリピティション</b><br/>
                正解→復習間隔延長（1日→3日→7日→15日→...）<br/>
                不正解→翌日再出題<br/><br/>
                <b style={{color:'var(--accent)'}}>出題方式</b><br/>
                毎日17問は<b>全て新規（未学習）問題</b>から出題<br/>
                出題頻度×重要度で優先順位付け<br/>
                連結系問題を必ず1問含む<br/>
                全問既出の場合のみ復習問題をフォールバック<br/><br/>
                間違えた問題はSM-2で復習スケジュール管理。<br/>
                間違い履歴ページで論点・対策を確認できます。
              </div>
            </div>
            <div className="chart-container">
              <div className="chart-title">データ管理</div>
              <button className="btn btn-primary" onClick={()=>{
                const d=JSON.stringify(loadState(),null,2),b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
                a.href=u;a.download=`cpa_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(u);
              }}>バックアップ (JSON)</button>
              <label className="btn btn-secondary" style={{display:'inline-block',marginLeft:8}}>
                復元
                <input type="file" accept=".json" style={{display:'none'}} onChange={(e)=>{
                  const f=e.target.files[0];if(!f)return;const r=new FileReader();
                  r.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);setState(d);saveState(d);alert('復元完了');}catch(err){alert('ファイル形式エラー');}};
                  r.readAsText(f);
                }}/>
              </label>
            </div>
            <div className="reset-section">
              <button className="btn-danger" onClick={()=>setConfirmReset(true)}>全データをリセット</button>
              <div style={{fontSize:10,color:'var(--text2)',marginTop:6}}>※全ての学習記録が削除されます</div>
            </div>
          </div>
        )}
      </div>

      {confirmReset && (
        <div className="modal-overlay" onClick={()=>setConfirmReset(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>全データリセット</h3>
            <p>全ての学習記録・SR状態が削除されます。取り消せません。</p>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setConfirmReset(false)}>キャンセル</button>
              <button className="btn btn-wrong" onClick={resetData}>リセットする</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
