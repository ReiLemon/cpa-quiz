<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務会計短答対策</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;--card:#ffffff;--card2:#f5f5f5;
  --accent:#e53e3e;--accent2:#c53030;
  --green:#38a169;--red:#e53e3e;--orange:#dd6b20;
  --text:#2d3748;--text2:#718096;--border:#e2e8f0;
  --gold:#c05621;
}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:12px}
.nav{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:12px;padding:4px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nav-btn{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn:hover:not(.active){background:var(--card2)}
.header{text-align:center;margin-bottom:16px}
.header h1{font-size:18px;color:var(--accent);font-weight:800}
.header .sub{color:var(--text2);font-size:11px;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .val{font-size:22px;font-weight:800;color:var(--accent)}
.stat-card .val.green{color:var(--green)}
.stat-card .val.red{color:var(--red)}
.stat-card .val.orange{color:var(--orange)}
.stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
.question-list{display:flex;flex-direction:column;gap:8px}
.q-card{background:var(--card);border-radius:10px;padding:14px;border-left:4px solid var(--accent);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.q-card.answered-correct{border-left-color:var(--green);opacity:.65}
.q-card.answered-wrong{border-left-color:var(--red)}
.q-card.current{border-left-color:var(--accent);box-shadow:0 2px 12px rgba(229,62,62,.12)}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.q-num{font-size:12px;color:var(--text2);font-weight:600}
.q-badges{display:flex;gap:4px}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-a{background:#fed7d7;color:#c53030}
.badge-b{background:#feebc8;color:#9c4221}
.badge-freq-top{background:#fed7d7;color:#c53030}
.badge-freq-high{background:#fefcbf;color:#975a16}
.badge-freq-mid{background:#c6f6d5;color:#276749}
.badge-freq-low{background:#f7fafc;color:#718096}
.q-chapter{font-size:14px;font-weight:700;margin-bottom:2px;color:var(--text)}
.q-chapter .stars{color:var(--gold);margin-left:4px;letter-spacing:1px}
.q-question{font-size:13px;color:var(--text2)}
.q-meta{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text2)}
.q-actions{display:flex;gap:8px;margin-top:10px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s}
.btn-correct{background:var(--green);color:#fff}
.btn-wrong{background:var(--red);color:#fff}
.btn-correct:hover{filter:brightness(1.1)}
.btn-wrong:hover{filter:brightness(1.1)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.memo-input{width:100%;margin-top:8px;padding:8px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;resize:none}
.memo-input:focus{outline:none;border-color:var(--accent)}
.timer-row{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.timer-display{font-family:'SF Mono','Menlo',monospace;font-size:18px;font-weight:700;color:var(--accent);min-width:70px}
.timer-display.running{color:var(--green);animation:pulse 1s infinite}
.timer-display.stopped{color:var(--text)}
.btn-timer{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;transition:all .15s;background:#e6fffa;color:#234e52;border:1px solid #81e6d9}
.btn-timer:hover{background:#b2f5ea}
.btn-timer.running{background:#fff5f5;color:var(--red);border-color:#feb2b2}
.time-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'SF Mono','Menlo',monospace;background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8}
.time-badge.fast{background:#f0fff4;color:#276749;border-color:#c6f6d5}
.time-badge.slow{background:#fff5f5;color:#c53030;border-color:#fed7d7}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.progress-bar{width:100%;height:6px;background:var(--card2);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--accent),#fc8181)}
.section-title{font-size:15px;font-weight:800;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--border);color:var(--text)}
.mistake-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--red);box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:all .2s}
.mistake-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.topic-guide{margin-top:10px;padding:12px;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;font-size:12px;line-height:1.8;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.topic-guide .tg-section{margin-bottom:8px}
.topic-guide .tg-label{font-weight:700;color:#c53030;font-size:11px;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.topic-guide .tg-content{color:var(--text);padding-left:4px}
.topic-guide .tg-formula{background:#fffff0;border:1px solid #e2e8f0;border-radius:4px;padding:6px 8px;margin:4px 0;font-family:'Courier New',monospace;font-size:11px;color:#2d3748}
.expand-hint{font-size:10px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:4px}
.mistake-memo{font-size:12px;color:#9c4221;margin-top:4px;padding:6px;background:#fffaf0;border-radius:4px;border:1px solid #feebc8}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:11px;transition:all .15s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-container{background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{min-width:90px;font-size:11px;color:var(--text2);text-align:right}
.bar-track{flex:1;height:22px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{position:absolute;right:6px;top:3px;font-size:10px;font-weight:700;color:var(--text)}
.group-analysis{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:14px}
.group-card{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s}
.group-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.group-name{font-size:13px;font-weight:700;margin-bottom:6px}
.group-stats{display:flex;gap:12px;font-size:11px;color:var(--text2)}
.group-bar{width:100%;height:4px;background:var(--card2);border-radius:2px;margin-top:6px}
.group-bar-fill{height:100%;border-radius:2px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:13px}
.today-info{background:linear-gradient(135deg,#fff5f5,#fffaf0);border:1px solid #fed7d7;border-radius:12px;padding:14px;margin-bottom:14px;text-align:center}
.today-info .date{font-size:16px;font-weight:800;color:var(--accent)}
.today-info .day-count{font-size:11px;color:var(--text2);margin-top:4px}
.spaced-info{font-size:11px;color:var(--text2);margin-top:4px}
.spaced-info .new{color:var(--green);font-weight:600}
.spaced-info .review{color:var(--orange);font-weight:600}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:linear-gradient(135deg,#fed7d7,#fc8181);border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-top:6px}
.tab-content{min-height:60vh}
.reset-section{margin-top:30px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.btn-danger{background:#fff5f5;color:var(--red);padding:8px 20px;border:1px solid #fed7d7;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-danger:hover{background:#fed7d7}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h3{margin-bottom:10px;font-size:16px}
.modal p{color:var(--text2);font-size:13px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:center}
.completion-banner{background:linear-gradient(135deg,#fff5f5,#fed7d7);border:1px solid #fc8181;border-radius:12px;padding:18px;text-align:center;margin-bottom:14px}
.completion-banner h2{color:var(--accent);font-size:16px;margin-bottom:4px}
.completion-banner p{color:var(--text2);font-size:12px}
.sr-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700}
.sr-new{background:#c6f6d5;color:#276749}
.sr-review{background:#feebc8;color:#9c4221}
.sr-overdue{background:#fed7d7;color:#c53030}
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--card2)}
@media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr)}.group-analysis{grid-template-columns:1fr}.nav-btn{font-size:11px;padding:8px 4px}}
/* ═══ サマリー ═══ */
.summary-chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:14px}
.summary-ch-card{background:var(--card);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent;position:relative;overflow:hidden}
.summary-ch-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.summary-ch-card.active{border-color:var(--accent);background:linear-gradient(135deg,#fff5f5,#fffaf0)}
.summary-ch-card .ch-num{font-size:10px;color:var(--text2);font-weight:600}
.summary-ch-card .ch-name{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.summary-ch-card .ch-mistake{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red)}
.summary-detail{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.summary-detail .sd-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
.summary-detail .sd-title{font-size:16px;font-weight:800;color:var(--accent)}
.summary-detail .sd-back{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card2);cursor:pointer;font-size:12px;font-weight:600}
.sd-section{margin-bottom:12px;padding:10px;border-radius:8px;animation:slideDown .2s ease}
.sd-section.s-keypoint{background:linear-gradient(135deg,#ebf8ff,#e6fffa);border-left:4px solid #4299e1}
.sd-section.s-formula{background:#fffff0;border:1px solid #f6e05e;border-left:4px solid #ecc94b;font-family:'SF Mono','Menlo',monospace}
.sd-section.s-table{background:var(--card);border:1px solid var(--border);overflow-x:auto}
.sd-section.s-note{background:#fff5f5;border-left:4px solid #fc8181;font-size:12px}
.sd-section.s-text{background:var(--card2);border-radius:6px;font-size:12px;line-height:1.8}
.sd-section .s-title{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text)}
.sd-section .s-content{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.sd-section .s-formula-text{font-size:13px;font-weight:700;color:#744210;padding:4px 0}
.sd-table{width:100%;border-collapse:collapse;font-size:11px}
.sd-table th{background:var(--accent);color:#fff;padding:6px 8px;text-align:left;font-size:10px}
.sd-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.sd-table tr:nth-child(even) td{background:#f7fafc}
.sd-mistake-banner{background:linear-gradient(135deg,#fff5f5,#fed7d7);border:1px solid #fc8181;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px}
.sd-mistake-banner .mb-title{font-weight:700;color:var(--red);font-size:13px;margin-bottom:4px}
.sd-mistake-banner .mb-item{padding:3px 0;color:var(--text);display:flex;align-items:center;gap:4px}
.sd-type-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;flex-shrink:0}
</style>

  return m ? m[1] : ch;
};

"c":"本支店間取引 通常の本支店間取引と同様に処理する。\n通常の本支店間取引と同様に処理する。\n支店分散計算制度 ※ 各支店の会計帳簿に，他の支店の照合勘定がある場合は，\n支店分散計算制度が採用されていると判断する。\n支店間取引\n本店を経由した取引に擬制して処理を行う。\n本店集中計算制度 ※ 各支店の会計帳簿に，他の支店の照合勘定がない場合は，\n本店集中計算制度が採用されていると判断する。\n－ 16 －"}]},"7":{"n":"１株当たり情報","s":[{"c":"第７—章 １株当たり情報"},{"h":"１．１株当たり当期純利益","f":["１株当たり当期純利益 ＝","＝","普通株式の期中平均発行済株式数 ＝ 期首発行済株式数 ＋ 期中増加株式数 ×","期中平均自己株式数 ＝ 期首自己株式数 ＋ 期中取得自己株式数 ×","期中平均自己株式数 ＝ 期首自己株式数 － 期中処分自己株式数 ×"],"c":"普通株式に係る当期純利益\n普通株式の期中平均株式数(※1)\n損益計算書の当期純利益 － 普通株主に帰属しない金額(※2)\n普通株式の期中平均発行済株式数(※3) － 普通株式の期中平均自己株式数(※4)\n(※1) １年間の利益との対応関係から，株式数は期中の平均株式数を用いる。\n(※2) 普通株主に帰属しない金額には，優先配当額や配当優先株式に係る消却・償還差額等がある。\n(※3) 普通株式の期中平均発行済株式数\n当該発行日から期末までの日数\n365日\n(※4) 普通株式の期中平均自己株式数\n当該取得日から期末までの日数\n365日\n当該処分日から期末までの日数\n365日\n(※5) 自己株式を消却した場合，期中平均自己株式数だけでなく，期中平均発行済株式数も減少するため，\n期中平均株式数は自己株式を消却しなかった場合と同じ結果になる。\n(※6) 株式併合又は株式分割が行われた場合，表示する財務諸表のうち最も古い期間の期首に当該株式併合\n又は株式分割が行われたと仮定する。\n(※7) 暫定的な会計処理の確定による取得原価の配分額の見直しが行われた場合，企業結合年度の財務諸表\nの１株当たり当期純利益及び潜在株式調整後１株当たり当期純利益は，見直しが反映された後の金額に"},{"h":"２．潜在株式調整後１株当たり当期純利益","n":["※ 潜在株式調整後１株当たり当期純利益が，１株当たり当期純利益を下回る場合は「希薄化効果あり」と"],"c":"◆ (1) 転換社債型新株予約権付社債(転換証券)\n潜在株式調整後１株当たり 普通株式に係る当期純利益 ＋ 当期純利益調整額\n当期純利益の算定式 普通株式の期中平均株式数 ＋ 普通株式増加数\n当期純利益調整額 (社債利息 ＋ その他費用) × (１ － 実効税率)\n転換社債型新株予約権付社債が，期首又は発行時にすべて転換されたと仮定\n普通株式増加数\nした場合に発行される普通株式数\n行使分を権利行使後の期中平均株式数の算定に含める。なお，権利行使分に\n権利行使された場合\n係る普通株式増加数は，権利行使までの日数に応じて算定する。\n◆ (2) 新株予約権(ワラント)\n潜在株式調整後１株当たり 普通株式に係る当期純利益\n当期純利益の算定式 普通株式の期中平均株式数 ＋ 普通株式増加数\n当期純利益調整額 ―\n新株予約権が期首又は発行時にすべて行使されたと仮定した場合に発行される普通株式数\n普通株式増加数\n－ 行使による入金額により期中平均株価で自己株式を買い受けたと仮定した普通株式数\n行使分を権利行使後の期中平均株式数の算定に含める。なお，権利行使分に\n権利行使された場合\n係る普通株式増加数は，権利行使までの日数に応じて算定する。"},{"h":"３．１株当たり純資産額","f":["１株当たり純資産額 ＝","＝"],"c":"普通株式に係る期末の純資産額\n普通株式の期末株式数(※1)\n貸借対照表の純資産の部の合計額 － 普通株主に帰属しない金額(※2)\n普通株式の期末発行済株式数 － 普通株式の期末自己株式数\n(※1) 期末の純資産との対応関係から，期末株式数を用いる。\n(※2) 普通株主に帰属しない金額\n連 結 貸 借 対 照 表\n×年×月×日現在\nⅠ 株主資本\n１ 資 本 金 ×××\n—\n２ 新株式申込証拠金 ×××\n３ 資 本 剰 余 金 ×××\n… 普通株主に帰属しない金額\n４ 利 益 剰 余 金 ×××\n５ 自 己 株 式 △×××\n６ 自己株式申込証拠金 ×××\n株主資本合計 ×××\nⅡ その他の包括利益累計額\n１ その他有価証券評価差額金 ×××"}]},"8":{"n":"経過勘定","s":[{"c":"一 第８章 経過勘定"},{"h":"１．会計処理","c":"項目 仕訳\n決算整理仕訳 （借）前払費用 ×× （貸）費 用 ××\n費用の前払い\n再振替仕訳 （借）費 用 ×× （貸）前払費用 ××\n決算整理仕訳 （借）収 益 ×× （貸）前受収益 ××\n収益の前受け\n再振替仕訳 （借）前受収益 ×× （貸）収 益 ××\n決算整理仕訳 （借）費 用 ×× （貸）未払費用 ××\n費用の未払い\n再振替仕訳 （借）未払費用 ×× （貸）費 用 ××\n決算整理仕訳 （借）未収収益 ×× （貸）収 益 ××\n収益の未収\n再振替仕訳 （借）収 益 ×× （貸）未収収益 ××"},{"h":"２．財務諸表の表示","n":["※ 経過勘定のうち，一年基準により分類するのは前払費用のみであり，その他の経過勘定については"],"c":"口\n流動資産\n前払費用\n固定資産(投資その他の資産)\n前受収益 流動負債\n未払費用 流動負債\n未収収益 流動資産\nすべて流動項目として扱う。\n－ 20 －"}]},"9":{"n":"有価証券","s":[{"h":"１．保有目的","n":["※ 株式には満期という概念がないため，株式を満期保有目的の債券として保有することはできない。","※ 公社債には議決権がないため，公社債を子会社株式及び関連会社株式として保有することはできない。"],"c":"◆ (1) 有価証券の保有目的\n保有目的 意 義\n売買目的有価証券 時価の変動により利益を得ることを目的として保有する有価証券\n満期保有目的の債券 企業が満期まで保有することを目的としていると認められる社債その他債券\n子会社株式及び関連会社株式 支配目的及び影響力を行使する目的で保有する株式\n売買目的有価証券，満期保有目的の債券，子会社株式及び関連会社株式の\nその他有価証券\nいずれにも分類されない有価証券\n◆ (2) 有価証券の種類と保有目的の関係\n保有目的 株式 公社債\n売買目的有価証券 ○ ○\n満期保有目的の債券 － ○\n子会社株式及び関連会社株式 ○ －\nその他有価証券 ○ ○"},{"h":"２．有価証券の取得","f":["取得原価 ＝ 購入代価 ＋ 付随費用"],"n":["※ 有価証券を贈与された場合，有価証券の時価をもって取得原価とし，有価証券受贈益(特別利益)を","※ 受渡日前に決算日が到来した場合，評価差額の処理のみ決算日に行う。"],"c":"◆ (1) 取得原価の算定\n計上する。\n◆ (2) 有価証券の認識方法\n原則：約定日基準 購入の契約締結時点(約定日)に認識する方法\n受渡時に認識する方法\n容認：修正受渡日基準"},{"h":"３．有価証券の売却","f":["売却損益の算定 売却損益 ＝ 売却価額 － 売却原価"],"c":"売却原価の算定 一般的には，平均原価法(移動平均法又は総平均法)に基づき算定\n売却手数料の取扱い 「売却損益」と相殺，または，「支払手数料」として営業外費用に計上\n－ 21 －"},{"h":"４．有価証券の期末評価","f":["利息法 有価証券利息(総額) ＝ 帳簿価額(取得原価＋償却額) × 実効利子率× 経過月数/12ヶ月","（原則） クーポン利息 ＝ 額面金額 × クーポン利子率 × 経過月数/12ヶ月","償却額 ＝ 有価証券利息(総額) － クーポン利息","（容認） 償却額 ＝ (額面価額－取得価額) ÷ 償還期間 × 当期経過月数/12ヶ月"],"n":["※ 洗替方式と切放方式のいずれによったとしても毎期の期間損益は同額となる。","※ 売買目的有価証券として保有する株式からの配当金(受取配当金)，売買目的有価証券として保有する","※ 利息法で利払日と決算日が異なる場合，決算日においても決算整理仕訳として償却原価法を適用し，","※ 償却原価法は帳簿価額の修正であり，時価評価ではない。そのため，洗替処理は行わない。","※ 売買目的有価証券として保有する債券については，償却原価法を適用しない。"],"c":"◆ (1) 売買目的有価証券\n① 評価\n決算時に時価評価を行い，時価をもって貸借対照表価額とする。また，評価差額は当期の損益として\n処理する。\n評価差額の会計処理 内容\n洗替方式 期首の再振替仕訳により，取得原価に戻す\n切放方式 当期末の時価評価額を翌期以降の帳簿価額として処理\n② 財務諸表の表示\n貸借対照表 「有価証券」→ 流動資産\n損益計算書 「有価証券評価損益」又は「有価証券運用損益※」→ 営業外損益(純額表示)\n社債からの利息(有価証券利息)を一括して「有価証券運用益(又は損)」に含めて表示することができる。\n◆ (2) 満期保有目的の債券\n① 評価\n時価評価は行わず，取得原価又は償却原価法に基づいて算定した価額(償却原価)をもって，貸借対照表\n価額とする。\n利払日ごとに期中仕訳として償却原価法を適用する。\n償\n却\n原\n価"},{"h":"５．減損処理(時価のある有価証券)","f":["評価損 ＝ 帳簿価額 － 時価"],"n":["※ 時価の著しい下落：50％以上の下落及び30％以上50％未満の下落を著しい下落と定めている場合","※ 減損処理後は，償却原価法を適用しない。","※ 売買目的有価証券について，減損処理は適用しない。"],"c":"◆ (1) 適用要件\n→ 時価が著しく下落し，回復する見込みがない又は不明の場合\n◆ (2) 会計処理\n貸借対照表価額 時価\n切放方式により，当期の損失(特別損失)として処理\n評価損\n翌期以降の評価 減損処理後の帳簿価額に基づいて，保有目的区分に応じた通常の評価を行う\n－ 23 －"},{"h":"６．株式分割及び株式併合","f":["修正後単価 ＝ 帳簿価額 ÷ 分割後の株式数","修正後単価 ＝ 帳簿価額 ÷ 併合後の株式数"],"c":"◆ (1) 株式分割の会計処理\n取得単価の修正のみで仕訳は行わない。\n分割時\n分割後 修正後の単価を用いて「売却原価」及び期末時価評価の際の「帳簿価額」を算定\n◆ (2) 株式併合の会計処理\n取得単価の修正のみで仕訳は行わない。\n併合時\n併合後 修正後の単価を用いて「売却原価」及び期末時価評価の際の「帳簿価額」を算定"},{"h":"７．端数利息","f":["売却損益 ＝ 売買価額(裸相場) － 売却原価(売却時の帳簿価額)","売却損益の算定 売買価額総額(利付相場) ＝ 売買価額(裸相場) ＋ 端数利息","売買価額(裸相場) ＝ 売買価額総額 － 端数利息"],"n":["※ 保有目的が売買目的有価証券以外の場合，期首から売却時までの償却額を","※ 保有目的が売買目的有価証券以外の場合，購入時から償還時までの償却額"],"c":"有価証券の売却と同時に，売却直前の利払日の翌日から売買日までの端数\n利息を購入側から受け取る。\n月割りで計上し，売却時の償却原価を算定する。\n売却側の会計処理\n【有価証券の売却】\n（借）現 金 預 金 ×× （貸）有 価 証 券 ××\n有価証券売却損益 ××\n【端数利息の受取】\n（借）現 金 預 金 ×× （貸）有価証券利息 ××\n有価証券の購入と同時に，購入直前の利払日の翌日から売買日までの端数\n利息を売却側に支払う。そして，次の利払日に端数利息を含めた利息を受け\n取る。\nを月割りで計算する。\n購入側の会計処理\n【有価証券の購入・端数利息の支払】\n（借）有 価 証 券 ×× （貸）現 金 預 金 ××\n有価証券利息 ××\n【利息の受取】\n（借）現 金 預 金 ×× （貸）有価証券利息 ××\n－ 24 －"},{"h":"８．保有目的区分の変更","n":["※1 満期保有目的の債券から他の保有区分への変更又は償還期限前に売却した場合","※2 その他有価証券から売買目的有価証券に保有区分を変更した場合","※3 その他有価証券から子会社株式及び関連会社株式に保有区分を変更した場合"],"c":"◆ (1) 基本的会計処理\n．\n振替時の価額 原則的に変更前の保有目的に係る評価基準に従って処理する\n．\n評価差額の処理 原則的に変更前の保有目的に基づいて処理する\n◆ (2) 具体的会計処理\n変更前保有区分 変更後保有区分 振替時の価額 評価差額\n子会社株式及び関連会社株式 振替時の時価 損益計算書に計上\n売買目的有価証券 満期保有目的の債券 変更は認められない\nその他有価証券 振替時の時価 損益計算書に計上\n売買目的有価証券 振替時の償却原価\n満期保有目的の債券※1 －\nその他有価証券 振替時の償却原価\n売買目的有価証券 帳簿価額\n子会社株式及び関連会社株式 －\nその他有価証券 帳簿価額\n売買目的有価証券 振替時の時価 損益計算書に計上※2\nその他有価証券 満期保有目的の債券 変更は認められない\n子会社株式及び関連会社株式 帳簿価額※3 －\n満期保有目的の債券の一部を他の保有区分に変更したり，償還期限前に売却を行った場合は，残りのすべ"}]},"10":{"n":"手形取引","s":[{"c":"第1一0章 手形取引(金融商品会計)"},{"h":"１．約束手形","n":["※ 自己振出の約束手形を受け取った場合は，受取時に「支払手形」勘定を減少させる。"],"c":"◆ (1) 振出人\n振出時 （借）仕 入 ××（貸）支払手形 ××\n決済時 （借）支払手形 ××（貸）現金預金 ××\n◆ (2) 受取人\n受取時 （借）受取手形 ××（貸）売 上 ××\n決済時 （借）現金預金 ××（貸）受取手形 ××"},{"h":"２．手形の裏書・割引","c":"◆ (1) 手形の裏書\n裏書時 （借）○ ○ ○ ××（貸）受取手形 ××\n決済時 仕訳なし\n◆ (2) 手形の割引\n口\n（借）現金預金 ××（貸）受取手形 ××\n割引時\n手形売却損 ××\n決済時 仕訳なし"},{"h":"３．為替手形","c":"振出人 （借）買 掛 金 ××（貸）売 掛 金 ××\n振出時 受取人 （借）受取手形 ××（貸）売 掛 金 ××\n支払人 （借）買 掛 金 ××（貸）支払手形 ××\n振出人 仕訳なし\n決済時 受取人 （借）現金預金 ××（貸）受取手形 ××\n支払人 （借）支払手形 ××（貸）現金預金 ××\n－ 27 －"},{"h":"４．手形の分類","n":["※ 財務諸表上，短期借入金(短期貸付金)に含めて表示する。"],"c":"受取手形\n営業活動から生じた手形 正常営業循環基準により流動\n支払手形\n営業外受取手形\n営業外手形\n営業外支払手形\n一年基準により表示区分を決定\n手形貸付金※\n金融手形\n手形借入金※"},{"h":"５．手形の不渡り","n":["※ 手形の不渡りに伴う諸費用は，「不渡手形」勘定に含める。","※ 不渡手形の代金を回収した場合，通常の債権の回収と同様に処理し，遅滞利息を「受取利息」勘定と","※ 不渡手形の代金が回収できず貸倒れが生じた場合，通常の債権の貸倒れと同様に処理する。","※ 「不渡手形」は，財務諸表上「破産更生債権等」として表示する(１年以内に回収されることが明らか"],"c":"手許保有の手形の不渡り 「受取手形」を「不渡手形」に振り替える\n裏書・割引手形の不渡り 手形の買戻額を「不渡手形」として計上\nして計上する。\nな場合を除き固定資産の区分に表示する(１年基準))。\n－ 28 －"}]},"11":{"n":"債権債務","s":[{"c":"第1一1章 債権債務(金融商品会計)"},{"h":"１．電子記録債権","c":"手形債権に準じて処理する。 ∴ 期末時点の電子記録債権 → 貸倒引当金の設定対象"},{"h":"２．金融資産の譲渡","n":["※1 新たな金融資産(買戻権)及び金融負債(リコース義務)は時価により計上する。","※3 入金額＋買戻権－リコース義務","※ 貸付金の帳簿価額×残存部分時価/(譲渡部分時価＋残存部分時価)"],"c":"【譲渡部分】\n（借）現 金 預 金 ×× （貸）リコース義務 ××※1\n買 戻 権 ××※1 貸 付 金 ××※2\n貸付金売却益 ××\n会計処理 ※2 貸付金の帳簿価額×譲渡部分時価※3/(譲渡部分時価＋残存部分時価)\n【残存部分】\n（借）回収サービス業務資産 ×× （貸）貸 付 金 ××"},{"h":"３．現先取引","c":"保有する債券等を現物価額で売却し，「短期借入金」を計上する。\n売却時\n（借）現金預金 ××（貸）短期借入金 ××\n買戻条件付現先取引\n先渡価額で買戻し，現物価額との差額を「支払利息」として計上する。\n買戻時 （借）短期借入金 ××（貸）現金預金 ××\n支払利息 ××\n債券等を現物価額で購入し，「短期貸付金」を計上する。\n購入時\n（借）短期貸付金 ××（貸）現金預金 ××\n売戻条件付現先取引 先渡価額で売戻し，現物価額との差額を「受取利息」として計上する。\n売戻時 （借）現金預金 ××（貸）短期貸付金 ××\n受取利息 ××\n－ 29 －"},{"h":"４．ゴルフ会員権","c":"◆ (1) 期末評価\nゴルフ口会員権は時価評価せず，貸借対照表上，取得価額をもって計上する(減損処理のみ適用する)。\n有価証券に準じて処理する(減損部分について，「ゴルフ会員権評価損」\n株式方式\nを計上する)。\n取得価額から預託保証金の額までは「ゴルフ会員権評価損」を計上し，\n減損処理\n預託保証金部分は，「貸倒引当金」を設定する。\nロ預託保証金方式\n取得価額～預託保証金 （借）ゴルフ会員権評価損 ××（貸）ゴルフ会員権 ××\n預託保証金部分 （借）貸倒引当金繰入額 ××（貸）貸倒引当金 ××\n◆ (2) 財務諸表の表示\n貸借対照表 「ゴルフ会員権」→ 固定資産(投資その他の資産)\n「ゴルフ会員権評価損」→ 特別損失\n損益計算書\n「貸倒引当金繰入額」 → 特別損失\n－ 30 －"}]},"12":{"n":"貸倒引当金","s":[{"c":"第1一2章 貸倒引当金(金融商品会計)"},{"h":"１．差額補充法","f":["貸倒引当金繰入額 ＝ 貸倒見積高 － 貸倒引当金残高"]},{"h":"２．債権の区分","c":"債権の分類 内容 貸倒見積高の算定方法\n一般債権 経営状態に重大な問題が生じていない債務者に対する債権 貸倒実績率法\n経営破綻には至っていないが，債務の弁済に重大な問題が 財務内容評価法\n貸倒懸念債権\n生じているか又は生じる可能性の高い債務者に対する債権 キャッシュ・フロー見積法\n経営破綻又は実質的に経営破綻に陥っている債務者に\n破産更生債権等 財務内容評価法\n対する債権 ex) 破産債権，更生債権，不渡手形等"},{"h":"３．貸倒見積高の算定","f":["貸倒実績率 ＝ 算定期間における実際貸倒額 ÷ 債権金額※","貸倒見積高 ＝ 債権の期末残高 × 貸倒実績率","貸倒見積高 ＝ 債権の当初元本金額 × 貸倒実績率 － 貸倒損失発生額","貸倒見積高 ＝ (債権額 － 担保の処分見込額※ － 保証による回収見込額) × 一定率","前期末の貸倒引当金 ＝ 前期末の債権帳簿価額 － 前期末債権に係る将来ＣＦの割引現在価値","当期末の貸倒引当金 ＝ 当期末の債権帳簿価額 － 当期末債権に係る将来ＣＦの割引現在価値","貸倒見積高 ＝ 債権額 － 担保の処分見込額※ － 保証による回収見込額"],"n":["※ 貸倒実績率の算定に用いる債権金額","※ 担保の処分見込額は当期末の時価を用いる。","※ 割引現在価値は，当初の約定利子率を用いて算定する。","※ 当期末の貸倒引当金と前期末の貸倒引当金の差額について貸倒引当金を取り崩す。なお，原則として","※ 担保の処分見込額は当期末の時価を用いる。"],"c":"◆ (1) 一般債権\n① 貸倒実績率の算定\n債権の回収期間 債権金額\n１年未満 債権の期末残高\n１年以上 債権の当初元本\n② 貸倒見積高の算定\n〔債権の回収期間が１年未満の場合〕\n〔債権の回収期間が１年以上の場合〕\n－ 31 －\n◆ (2) 貸倒懸念債権\n① 財務内容評価法\n② キャッシュ・フロー見積法\n取崩額について「受取利息」勘定で処理するが，「貸倒引当金戻入額」勘定で処理することもできる。\n◆ (3) 破産更生債権等\n財務内容評価法"},{"h":"４．同一企業に対して，債権と債務を有している場合","c":"債権債務の純額に対して貸倒引当金を設定する。"},{"h":"５．貸倒時の処理","c":"当期発生債権の貸倒 全額「貸倒損失」勘定で処理\n前期発生債権の貸倒 貸倒引当金を補填し，貸倒引当金を超えた部分は「貸倒損失」勘定で処理"},{"h":"６．貸倒れた債権が回収された場合の処理","c":"「償却債権取立益」を計上\n前期以前に貸倒れた債権が回収された場合\n（借）現金預金 ××（貸）償却債権取立益 ××\n当期の貸倒の処理を取り消す\n当期に貸倒れた債権が回収された場合 （借）現金預金 ××（貸）貸倒損失 ××\n貸倒引当金 ××\n－ 32 －"},{"h":"７．財務諸表の表示","n":["※ 貸倒引当金繰入額・貸倒損失の表示区分は，営業債権・営業外債権の分類に基づき決定する。","※ 営業債権とは，営業取引の過程において生じた売上債権であり，「売掛金」「受取手形」等が該当する。","※ 営業外債権とは，営業債権でない債権をいい，「貸付金」「未収金」「営業外受取手形」等が該当する。"],"c":"◆ (1) 損益計算書 二\n貸倒引当金繰入額 営業債権 販売費及び一般管理費\n貸倒損失 営業外債権 営業外費用\n償却債権取立益 営業外収益\n◆ (2) 貸借対照表\n貸倒引当金は以下のとおり，資産の部に表示する。\n原則 各金銭債権から個別に間接控除する\n容認① 金銭債権から一括で間接控除する\n容認② 各金銭債権から貸倒見積高を直接控除した帳簿価額で計上し，貸倒引当金の額を注記する\n－ 33 －"}]},"13":{"n":"デリバティブ取引","s":[{"c":"一 第13章 デリバティブ取引(金融商品会計)"},{"h":"１．基本的会計処理","n":["※ 契約締結時は正味の債権債務が発生していないため，正味の債権債務及び評価差額は計上されない。","※ 評価差額の処理は，洗替方式と切放方式の両方が認められている(本教材は洗替方式を前提とする)。"],"c":"デリバティブ取引は時価評価を行い，発生する正味の債権債務を資産又は負債に計上するとともに，評価\n差額を当期の損益(営業外損益)として計上する。"},{"h":"２．先物取引","f":["※ 先物取引損益 ＝ 先物元本 × (契約時の先物価格 － 決算時の先物価格)","※ 先物取引損益 ＝ 先物元本 × (契約時の先物価格 － 決済時の先物価格)"],"n":["※ 現物価格と先物価格は期日に一致する。","※1 将来の一定の期日に，一定の価額で売る約束をいう。","※2 将来の一定の期日に，一定の価額で買う約束をいう。"],"c":"◆ (1) 先物価格と現物価格\n先物価格 金融商品を将来の一定の期日に，一定の価額で売買することを約束した価額\n現物価格 金融商品を現在売買する場合の価額\n(2口) 先物取引に係る利益(損失)\n将来の相場予想 取引 損得計算\n予想どおり値下がり → 利益\n値下がり 売建※1\n予想に反し値上がり → 損失\n予想どおり値上がり → 利益\n値上がり 買建※2\n予想に反し値下がり → 損失\n◆ (3) 会計処理\n契約締結時 （借）先物取引差入証拠金 ××（貸）現 金 預 金 ××\n利益の場合：（借）先物取引資産 ××（貸）先物取引損益 ××\n決算時 損失の場合：（借）先物取引損益 ××（貸）先物取引負債 ××\n翌期首 上記時価評価の再振替仕訳を行う。\n【差金決済】\n利益の場合：（借）現 金 預 金 ××（貸）先物取引損益 ××\n損失の場合：（借）先物取引損益 ××（貸）現 金 預 金 ××\n決済時"},{"h":"３．オプション取引","f":["※ オプション損益 ＝ オプション元本 × (決算時のオプションの時価単価 － オプションの取得単価)"],"n":["※ オプション損益"],"c":"口(1) 分類\n権利の種類 取引 買い手・売り手\n買い：買う権利の買い手(買建)\n買う権利 コール・オプション\n売り：買う権利の売り手(売建)\n買い：売る権利の買い手(買建)\n売る権利 プット・オプション\n売り：売る権利の売り手(売建)\n◆ (2) 買い手の会計処理\n契約締結時 （借）買建(売建)オプション ××（貸）現金預金 ××\n評価益の場合：（借）買建(売建)オプション ××（貸）オプション損益 ××\n決算時 評価損の場合：（借）オプション損益 ××（貸）買建(売建)オプション ××\n翌期首 上記時価評価の再振替仕訳を行う。\n決済差益の場合：（借）現 金 預 金 ××（貸）買建(売建)オプション ××\n決済差益の場合：（借）現 金 預 金 ××（貸）オプション損益 ××\n決済差損の場合：（借）現 金 預 金 ××（貸）買建(売建)オプション ××\n転売時又は\nオプション損益 ××\n権利行使時\n転売時：オプション元本 × (転売時のオプションの時価単価 － オプションの取得単価)"},{"h":"４．金利スワップ取引","n":["※ 金利スワップ損益：想定元本 × (変動金利の利率 － 固定金利の利率)","※ 金利スワップ損益：決算時の金利スワップの時価(将来の利益又は損失の現在価値)","※ 変動金利の指標には，東京市場の銀行間取引金利であるTIBORがある。","※ 通常，金利スワップの時価は問題で明示される。"],"c":"契約締結時 仕訳なし\n利益の場合：（借）現 金 預 金 ××（貸）金利スワップ損益 ××\n利息受払時 損失の場合：（借）金利スワップ損益 ××（貸）現 金 預 金 ××\n利益の場合：（借）金利スワップ資産 ××（貸）金利スワップ損益 ××\n決算時 損失の場合：（借）金利スワップ損益 ××（貸）金利スワップ負債 ××\n－ 35 －"},{"h":"５．ヘッジ取引","n":["※ 時価ヘッジは，現行制度上，その他有価証券にのみ適用される。","※ 金利スワップにヘッジ会計を適用した場合，金利スワップを時価評価せず，金銭の受払等の純額を"],"c":"デリバティブ取引\nああああ ヘ ッジ対象の相場変動等による損失の可能性を\n減殺することを目的として，デリバティブ取引\nをヘッジ手段として行う取引\nああああ 投機目的 ヘッジ目的(ヘッジ取引)\nヘッジ対象の損益とヘッジ手段の損益が\nロ ニ同一の会計期間に認識されるか\n認識される 認識されない\n原則的な処理 原則的な処理 ヘッジ会計\n→時価評価し，評価差額を当期 →時価評価し，評価差額を当期 →繰延ヘッジ又は時価ヘッジ\nの損益に計上する。 の損益に計上する。\nヘ\n純 利\nッ\n益\nジ\nに\n対\n計\n象"}]},"14":{"n":"リース会計","s":[{"c":"第1一4章 リース会計"},{"h":"１．リース取引の分類","c":"◆ (1) リース取引の分類\n所有権移転ファイナンス・リース取引\nファイナンス・リース取引 売買処理\n所有権移転外ファイナンス・リース取引\nオペレーティング・リース取引 賃貸借処理\n◆ (2) ファイナンス・リース取引の具体的な判断基準\n①解約不能の要件及び②フルペイアウトの要件の両方を満たすリース取引は，ファイナンス・リース取引\nに該当する。\n① 解約不能(ノンキャンセラブル)の要件\nリース契約に基づくリース期間の中途において当該契約を解除することができないリース取引又はこれ\nに準ずるリース取引は，解約不能の要件を満たすと判定する。\n② フルペイアウトの要件\n借手が，リース物件からもたらされる経済的利益を実質的に享受することができ，かつ，当該リース\n物件の使用に伴って生じるコストを実質的に負担するリース取引は，フルペイアウトの要件を満たすと\n判定する。\n具体的には，以下の「現在価値基準」と「経済的耐用年数基準」のいずれかを満たす場合は，フルペイ\nアウトの要件を満たすと判定する。\n解約不能のリース期間中のリース料総額の割引現在価値が，見積現金購入価額\n現在価値基準\nの概ね90％以上であること"},{"h":"２．ファイナンス・リース取引に係る借手の会計処理(基本)","f":["リース料の支払額 ＝ 元本返済額 ＋ 利息の支払額","支払利息 ＝ 未返済元本 × 利率","元本返済額 ＝リース料の支払額 － 支払利息"],"n":["※ リース料を半年毎に支払う場合は，半年分の利息を月割計算により算定する。"],"c":"◆ (1) リース開始時\n① リース資産及びリース債務の計上額\n借手においてリース物件の貸手の購入価額が\n明らかな場合 明らかでない場合\n所有権移転ＦＬ 貸手の購入価額\n① リース料総額の割引現在価値\n① リース料総額の割引現在価値\n② 見積現金購入価額\n所有権移転外ＦＬ ② 貸手の購入価額\n上記のいずれか低い額\n上記のいずれか低い額\n② リース料総額の割引現在価値の算定に用いる利子率\n借手において貸手の計算利子率を\n知り得る場合 知り得ない場合\n貸手の計算利子率 借手の追加借入利子率\n◆ (2) リース料支払時\n① リース料の支払\nリース料の支払額は利息相当部分と元本返済部分に区分して処理する。なお，利息計算は，原則として\n利息法によるが，リース資産総額の重要性が乏しいと認められる場合は定額法によることができる。\n② 支払利息を算定する際に用いる利子率"},{"h":"３．ファイナンス・リース取引に係る借手の会計処理(応用)","n":["※ 維持管理費用相当額は，金額的重要性が乏しい場合，リース料総額から控除しないことができる。","※ リース資産除却損とリース債務解約損は，「リース解約損」等の科目で損益計算書上合算して表示する"],"c":"◆ (1) 前払い\nリース料総額の 第１回目の支払額 ＋ 第２回目以降の支払額の割引現在価値\n割引現在価値 ※ 第１回目の支払額は割引計算しない。\nリース料支払時 第１回目の支払額は全額元本返済分として扱う。\n見越計上 直前の支払日から決算日までの利息額を「未払利息」として計上する。\n◆ (2) 維持管理費用相当額\nリース料総額の\nリース料総額から維持管理費用相当額を控除して割引現在価値を算定する。\n割引現在価値\nリース料支払時 元本返済額部分及び利息相当額部分とは区別して費用処理する。\n◆ (3) 割安購入選択権(権利行使が確実と認められる場合)\nリース料総額の\nリース料総額に割安購入選択権の行使価額を含めて割引現在価値を算定する。\n割引現在価値\nリース資産の\n自己所有の固定資産と同様に行う。\n減価償却\n◆ (4) 残価保証\nリース料総額の\nリース料総額に残価保証額を含めて割引現在価値を算定する。"},{"h":"４．財務諸表の表示","c":"◆ (1) リース資産\n原則 有形固定資産，無形固定資産の別に，一括してリース資産として表示する。\n容認 有形固定資産または無形固定資産に属する各科目に含める。\n◆ (2) リース債務\n１年以内に支払の期限が到来する額 流動負債\n１年を超えて支払の期限が到来する額 固定負債"},{"h":"５．セール・アンド・リースバック取引","n":["※ 所有権移転ＦＬの場合，減価償却費はセール・アンド・リースバック取引を行わなかった場合と"],"c":"◆ (1) ファイナンス・リース取引に該当する場合の借手の会計処理\n① 売却時\n【固定資産の売却】\nリースの対象となる物件から生じた売却損益を「長期前受収益・長期前払費用」で繰延処理する。\n【リース資産及びリース債務の計上】\n借手においてリース物件の貸手の購入価額が\n明らかな場合 明らかでない場合\n所有権移転ＦＬ 貸手の購入価額\n① リース料総額の割引現在価値\n① リース料総額の割引現在価値\n② 見積現金購入価額\n所有権移転外ＦＬ ② 貸手の購入価額\n上記のいずれか低い額\n上記のいずれか低い額\n② 決算時\n【リース資産の減価償却】\n耐用年数 残存価額 償却方法\n所有権移転ＦＬ 経済的耐用年数 売却前の残存価額 同種の資産の償却方法\n所有権移転外ＦＬ リース期間 ゼロ 合理的な方法\n【長期前受収益・長期前払費用の振替】"},{"h":"６．ファイナンス・リース取引に係る貸手の会計処理","n":["※ 所有権移転外ＦＬで，見積残存価額がある場合，当該金額を「売上原価」から"],"c":"◆ (1) 具体的な処理\nファイナンス・リース取引の貸手側の会計処理は，以下の①～③のいずれかを選択する。なお，いずれの\n方法を用いた場合であっても，各期の利息相当額・リース債権(投資資産)の貸借対照表価額は同額となる。\nまた，所有権移転ＦＬの場合は「リース債権」勘定，所有権移転外ＦＬの場合は「リース投資資産」勘定を\n計上する。\n① リース取引開始日に売上高と売上原価を計上する方法\nリース料総額で「リース債権(投資資産)」及び「売上高」を計上し，リース物件の\n取得価額を「売上原価」として計上する。\n（借）リース債権(投資資産) ××（貸）売 上 高 ××\nリース開始時 （借）売 上 原 価 ××（貸）買 掛 金 ××\n「リース投資資産」へ振り替える。\n（借）リース投資資産 ××（貸）売 上 原 価 ××\n受取リース料を「リース債権(投資資産)」から減額する。\nリース料受取時\n（借）現 金 預 金 ××（貸）リース債権(投資資産) ××\n利息相当額の総額から当期末までに認識すべき額を除いた金額を「繰延リース利益」\nとして繰り延べる。また，「繰延リース利益」は「リース債権(投資資産)」から控除\n決算時\nして表示する。\n（借）繰延リース利益繰入 ××（貸）繰延リース利益 ××"}]},"15":{"n":"研究開発費・ソフトウェア","s":[{"c":"第1一5章 研究開発費・ソフトウェア"},{"h":"１．研究開発費","n":["※ 製造現場において研究開発活動が行われ，かつ，当該研究開発に要した費用を一括して製造現場で"],"c":"◆ (1) 開発費と研究開発費の分類\n分類 会計処理\n① 新製品又は新技術の研究及び開発 研究開発費\n新技術の採用 研究開発費又は開発費\n②\n新経営組織の採用 開発費\n③ 資源の開発 開発費\n④ 市場の開拓 開発費\n◆ (2) 会計処理\nすべて発生時に費用として処理しなければならない。\n◆ (3) 研究開発目的の固定資産に係る会計処理\n原価の内容 会計処理\n特定の研究開発目的にのみ使用さ 取得時に研究開発費として処理する。\nれ，他の目的に使用できない場合 （借）研究開発費 ×× （貸）現金預金 ××\n固定資産として資産計上し，当該資産の減価償却費を研究開発費\nある特定の研究開発目的に使用され\nとして処理する。\nた後に他の目的(他の研究開発目的\n（借）有形固定資産 ×× （貸）現金預金 ××\nを含む)に使用できる場合"},{"h":"２．ソフトウェア","c":"◆ (1) ソフトウェアの制作費\n制作目的 会計処理\n研究開発目的 研究開発費として発生時に費用処理\n受注制作目的 工事契約に準じて処理\n最初に製品化された製品マスターが完成するま\n販 研究開発費として\nでに要した費用\n売 発生時に費用処理\n製品マスターの著しい改良に要した費用\n目 市場販売目的\n製品マスターの機能の改良・強化に要した費用 無形固定資産\n的\n機能維持に要した費用 発生時に費用処理\n製品としてのソフトウェアの制作原価 製造原価又は棚卸資産\n将来の収益獲得または費用削減が確実であると\n無形固定資産\n認められるもの\n自社利用目的\n将来の収益獲得または費用削減が確実であると\n発生時に費用処理"}]},"16":{"n":"減損会計","s":[{"c":"第1一6章 減損会計"},{"h":"１．減損処理のプロセス","c":"ＳＴＥＰ１(減損の兆候の把握) ＮＯ 減\n損\n減損の兆候があるか？ 処\n理\nを\nＹＥＳ\n適\n用\nＳＴＥＰ２(減損損失を認識するかどうかの判定) ＮＯ し\nな\n割引前将来ＣＦの総額が，帳簿価額を下回るか？ い\nＹＥＳ\nＳＴＥＰ３(減損損失の測定)\n帳簿価額を「回収可能価額」まで減額し，当該金額を\n「減損損失」として計上する。"},{"h":"２．財務諸表の表示","c":"損益計算書 「減損損失」勘定(特別損失)\n直接減額方式 減損処理前の取得原価から減損損失を直接控除し，控除後の金額を\n(原則) その後の取得原価とする形式で表示する方法\n① 当該資産に対する減損損失累計額を，取得原価から間接控除する\n貸借対照表\n間接控除方式 形式で表示する方法\n(容認) ② 当該資産に対する減損損失累計額を減価償却累計額に合算して，\n取得原価から間接控除する形式で表示する方法"},{"h":"３．将来キャッシュ・フローの見積方法","c":"・ 生起する可能性が最も高い単一の金額(最頻値)を見積る方法\n・ 生起し得る複数の将来キャッシュ・フローをそれぞれの確率で加重平均した金額(期待値)を見積る方法\n－ 47 －"},{"h":"４．減損損失を認識するかどうかの判定","c":"◆ (1) 割引前将来キャッシュ・フローの計算方法\n① 資産又は資産グループの主要な資産の経済的残存使用年数が長期間になる場合\n資産又は資産グループから生み出される割引前将来キャッ\n経済的残存使用年数 ≦ 20年\nシュ・フローの合計額\n資産又は資産グループから生み出される20年目までの割引\n経済的残存使用年数 ＞ 20年 前将来キャッシュ・フローの合計額に，20 年経過時点の\n回収可能価額を加えた金額\n② 主要な資産以外の構成資産が存在する場合\n主要な資産の経済的残存使用年数 構成資産の経済的残存使用年数経過時点における正味売却\n≧ 他の構成資産の経済的残存使用年数 価額を割引前将来キャッシュ・フローに加える。\n【原則】\n主要な資産の経済的残存使用年数経過時点における，構成\n資産の回収可能価額(原則として当該時点における構成資産\nの正味売却価額)を割引前将来キャッシュ・フローに加える。\n【容認】\n主要な資産の経済的残存使用年数\n主要な資産の経済的残存使用年数経過後，新たに主要な資産\n＜ 他の構成資産の経済的残存使用年数\nになると考えられる資産の使用に係る合理的な計画が存在"},{"h":"５．減損損失の測定","f":["② 帳簿価額 － 回収可能価額 ＝ 減損損失"],"n":["※ 資産グループの場合には，帳簿価額に基づく比例配分等の合理的な方法により，","※ 使用価値の算定に際して用いる割引率 → 税引前の利率","※ ＳＴＥＰ２(減損損失を認識するかどうかの判定)において，将来キャッシュ・フローが見積値から","※ リスクは将来キャッシュ・フローの見積りと割引率のどちらか一方のみに反映する。"],"c":"◆ (1) 回収可能価額の算定\n① 回収可能価額(正味売却価額と使用価値のいずれか高い方の金額)の算定\n会計処理\n当該資産グループの各構成資産に減損損失を配分する。\n正味売却価額 時価 － 処分費用見込額\n使用価値 割引前将来キャッシュ・フローの割引現在価値\n(2口) 将来キャッシュ・フローが見積値から乖離するリスクの反映\n将来キャッシュ・フローの見積りに反映 割引率に反映\nリスクの反映方法 将来キャッシュ・フローを少なめに見積る 割引率を高めに設定する\n「貨幣の時間価値」と「将来キャッシ\n使用価値の算定に 「貨幣の時間価値」のみを反映させた無リ\nュ・フローがその見積値から乖離する\n用いる割引率 スクの割引率\nリスク」の両方を反映させた割引率\n乖離するリスクの反映は行わない(リスクの反映はＳＴＥＰ３(使用価値の算定)において行う)。"},{"h":"６．減損処理後の会計処理","n":["※ 残存価額10％で，減損処理後も残存価額に変更がない場合"],"c":"減損の適用 当期の減価償却計上後の帳簿価額に対して減損処理を適用する。\n減価償却費 翌期の減価償却から，減損損失計上後の帳簿価額に基づき減価償却を実施する。\n(取得原価 × 0.9 － 期首減価償却累計額 － 減損損失) ÷ 残存耐用年数\n取得原価\n定額法 ÷ 残存耐用年数\n- ／グ’\n90％ 減価償却累計額 減損損失\n10％ 残存価額\n定率法 (減損適用直前の帳簿価額 － 減損損失) × 償却率\n減損損失の戻入 減損損失の戻入は行わない。\n－ 49 －"},{"h":"７．共用資産","f":["減損損失の測定 ＝ 各資産又は資産グループの帳簿価額(※)の合計 ＋ 共用資産の帳簿価額","減損損失増加額 ＝ 共用資産を含むより大きな単位での減損損失"],"n":["※ 減損損失計上前の帳簿価額","※ 減損損失計上後の帳簿価額"],"c":"◆ (1) 原則法\n共用資産を含まない各資産又は資産グループごとの減損処理\n通常の手順に従って，各資産又は資産グループごとの減損損失を算定する。\nよし\n共用資産を含むより大きな単位での減損処理\n各資産又は資産グループの帳簿価額(※)の合計 ＋ 共用資産の帳簿価額\n減損損失の認識の判定 ＞ 共用資産を含むより大きな単位から得られる割引前将来キャッシュ・フローの合計\n→ 減損損失を認識する。\n共用資産を含むより大きな単位における減損損失\n－ 共用資産を含むより大きな単位での回収可能価額\n－ 各資産又は資産グループごとの減損損失\n減損損失増加額の配分\n① 共用資産の帳簿価額と正味売却価額の差額を限度として共用資産に配分\n② ①を超える金額は，各資産又は資産グループに合理的な基準により配分\n＜共用資産に配分された減損損失を各資産又は資産グループに配分する方法＞\n回収可能価額を下回る結果とならないように，超過額を\n容易に把握できる 帳簿価額(※)と回収可能価額との差額の比率等により\n配分する。\n各資産又は 超過額を帳簿価額(※)の比率等により配分する。ただし，\n資産グループの 各資産又は資産グループの一部の回収可能価額が容易に"}]},"17":{"n":"税効果会計","s":[{"c":"一 第17章 税金及び税効果会計"},{"h":"１．税金","f":["法人税等 ＝ 課税所得 × 法定実効税率"],"n":["※ 費用となる税金は当該納付額を「租税公課」勘定(販売費及び一般管理費)で処理する。","※ 会計上の利益に申告調整(加算調整・減算調整)を行うことで，課税所得を計算する。"],"c":"◆ (1) 法人(株式会社)に係る税金の種類\n① 利益に課せられる税金 法人税・住民税・事業税\n② 費用となる税金※ 固定資産税，印紙税等\n③ その他の税金 消費税\n◆ (2) 法人税等の算定\nロ\n会計上 税務上 申告調整方法\n損金不算入 費用に計上 損金にならない 利益 ＜ 課税所得となるため加算調整\n損金算入 費用にしてない 損金になる 利益 ＞ 課税所得となるため減算調整\n益金不算入 収益に計上 益金にならない 利益 ＞ 課税所得となるため減算調整\n益金算入 収益にしてない 益金になる 利益 ＜ 課税所得となるため加算調整\n◆ (3) 法人税等の納付\n中間申告により納付した法人税額は「仮払法人税等」勘定で処理する。\n中間申告\n（借）仮払法人税等 ×× （貸）現金預金 ××\n決算時において，当期の課税所得を基に法人税等を算定し，「法人税等」勘定を計上する。\nまた，法人税等のうち中間納付額について「仮払法人税等」勘定を取崩し，差額について\n決算 「未払法人税等」勘定を計上する。\n（借）法人税等 ×× （貸）仮払法人税等 ××\n未払法人税等 ××"},{"h":"２．税効果会計","f":["繰延税金資産(ＤＴＡ) 期末ＤＴＡ ＝ 期末将来減算一時差異 × 税率","繰延税金負債(ＤＴＬ) 期末ＤＴＬ ＝ 期末将来加算一時差異 × 税率","法人税等調整額 ＝ 当期末ＤＴＡ － 前期末ＤＴＡ","圧縮積立金 圧縮積立金 ＝ 期末将来加算一時差異 × (１－税率)","特別償却準備金 特別償却準備金 ＝ 期末将来加算一時差異 × (１－税率)","その他有価証券評価差額金(借方) ＝ 期末評価差損 × (１－税率)","その他有価証券評価差額金(貸方) ＝ 期末評価差益 × (１－税率)","繰延ヘッジ損益(借方) ＝ 期末評価差損 × (１－税率)","繰延ヘッジ損益(貸方) ＝ 期末評価差益 × (１－税率)","※ 繰延税金資産に回収可能性がない(＝将来支払う税金を軽減する効果がない)場合，繰延税金資産の計上","は認められない(繰延税金資産として計上できなかった額＝評価性引当額）。"],"n":["※ 繰延税金資産が増加した場合 → 法人税等調整額を貸方計上","※ 繰延税金負債が増加した場合 → 法人税等調整額を借方計上","※ その他有価証券評価差額金に対する税効果について法人税等調整額","※ 当期に税制改正が行われ，翌期以降の税率が変更された場合，変更後税率(差異解消年度の税率)に基づ","※ 圧縮積立金及び特別償却準備金の差異解消時期は以下のとおりである。"],"c":"◆ (1) 一時差異等\n分類 具体例\n棚卸資産に係る評価損の損金不算入額\n各種引当金の損金不算入額\n未払事業税の損金不算入額\n減価償却費の損金算入限度超過額\n将来減算一時差異\n減損損失\n(繰延税金資産)\n資産除去債務\nその他有価証券評価差額金(評価損)\n繰延ヘッジ損益(評価損)\n繰越欠損金\n圧縮積立金\n特別償却準備金\n将来加算一時差異 資産除去債務に対応する除去費用\n(繰延税金負債) その他有価証券評価差額金(評価益)\n繰延ヘッジ損益(評価益)\n前払年金費用\n交際費の損金算入限度超過額"}]},"18":{"n":"外貨建取引","s":[{"c":"第1一8章 外貨建取引"},{"h":"１．換算","f":["※ 未収収益・未払費用は決算時にＣＲ換算するが，決算時に新たに生じる(＝前Ｔ/Ｂに計上されていな"],"n":["※ 前払金・前受金を含む取引の換算"],"c":"◆ (1) 取引発生時の処理\n取引発生時の為替相場(ＨＲ)により換算する。\n金銭授受時 前払金・前受金を金銭授受時の為替相場(ＨＲ)により換算する。\n前払金・前受金が充当される部分は金銭授受時の為替相場(ＨＲ)による円換算額を計上\n充当時\nし，残りの部分については取引発生時の為替相場(ＨＲ)で換算する。\n◆ (2) 決済時の処理\n外貨建金銭債権債務の決済による収入・支出額は決済時の為替相場により換算する。また，取引発生時の\n円換算額との差額を「為替差損益」で処理する。\n◆ (3) 決算時の処理\n貨幣項目は，決算時の為替相場(ＣＲ)で換算する。また，取引時の円換算額と決算時の円換算額との差額\nを「為替差損益」で処理する。\n貨幣項目 通貨，預金，金銭債権債務，未収収益，未払費用等 ＣＲ換算\n非貨幣項目 棚卸資産，固定資産，繰延資産，前受金，前払金，前受収益，前払費用等 ＨＲ換算\nい)項目であるため，為替差損益は生じない。\n◆ (4) 財務諸表の表示\n「為替差損益」→ 営業外損益(純額表示)\n－ 55 －"},{"h":"２．為替予約","n":["※ 非資金取引については，外貨建金銭債権債務を先物為替相場で換算し，費用・収益項目は取引時の","※ 長短分類を行うか否かは問題の指示によること。","※ ヘッジ対象とヘッジ手段の処理を独立に行う。"],"c":"◆ (1) 振当処理(容認)\n① 分類\nロ【取引発生以前に為替予約が付された場合】\n取引の種類 会計処理\n外貨建金銭債権債務及び収益・費用項目のすべてが先物為替相場により換算される\n非資金取引\nため，換算差額は生じない。\n外貨建金銭債権債務は先物為替相場で換算されるが，取引時の資金収支は直物為替\n資金取引\n相場で換算されるため，直先差額が生じる。\nロ直物為替相場で換算する方法(直先差額を認識する方法)が原則的な処理とされるが，受験上は上記の\nとおり会計処理を行う(特例処理)。\n【取引発生後に為替予約が付された場合】\n取引の種類 会計処理\n非資金取引 取引発生時の直物為替相場で換算されている外貨建金銭債権債務を，為替予約時に\nおいて，為替予約時の先物為替相場で換算替えするため，直々差額及び直先差額が\nロ資金取引 生じる。\n② 換算差額\n取引時の直物為替相場と予約時の直物為替相場との差額であり，当期中の為替相場の\n直々差額"},{"h":"３．予定取引","c":"◆ (1) 振当処理\nヘッジ手段である為替予約を決算日に時価評価し，時価評価差額を繰延ヘッジ損益\n決算時\nで繰り延べる。\n取引時 取引発生以前に為替予約をしている振当処理と同様に処理する。\n口(2) 独立処理\nヘッジ手段である為替予約を決算日に時価評価し，時価評価差額を繰延ヘッジ損益で\n決算時\n繰り延べる。\n予定取引実行時までに，ヘッジ手段である為替予約から生じた損益は，ヘッジ対象に\n取引時\n伴い生じる損益項目に加減する(予定取引により損益が直ちに発生する場合)。\n取引後 通常の独立処理として，ヘッジ手段とヘッジ対象を独立に処理する。\n－ 57 －"},{"h":"４．外貨建有価証券","f":["取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","有価証券売却(運用)損益 ＝ 外貨建売却価額 × 売却時の為替相場(ＨＲ) － 帳簿価額","有価証券評価(運用)損益 ＝ 外貨建時価 × 決算時の為替相場(ＣＲ) － 帳簿価額","取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","償却額 ＝ 外貨建償却額 × 期中平均相場(ＡＲ)","為替差損益 ＝ 外貨建償却原価 × 決算時の為替相場(ＣＲ) － (取得原価 ＋ 償却額)","取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","売却時 投資有価証券売却損益 ＝ 外貨建売却価額 × 売却時の為替相場(ＨＲ) － 帳簿価額","評価差額 ＝ 外貨建時価 × 決算時の為替相場(ＣＲ) － 帳簿価額","取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","原則 評価差額 ＝ 外貨建時価 × 決算時の為替相場(ＣＲ) － (取得原価＋償却額)","決算時 為替差損益 ＝ 外貨建償却原価 × 決算時の為替相場(ＣＲ) － (取得原価 ＋ 償却額)","評価差額 ＝ 外貨建時価 × 決算時の為替相場(ＣＲ) － 外貨建償却原価 × 決算時の為替相場(ＣＲ)"],"n":["※ 為替相場の変動部分も含めて，すべて有価証券売却(運用)損益で処理する。","※ 為替相場の変動部分も含めて，すべて有価証券評価(運用)損益で処理する。","※ 外貨建満期保有目的の債券に為替予約が付されており，振当処理を行う場合は，当該債券の額面金額","※ 全部純資産直入法又は部分純資産直入法を適用し，翌期に洗替処理を行う。"],"c":"◆ (1) 売買目的有価証券\n売却時\n決算時\n貸借対照表価額 外貨建時価 × 決算時の為替相場(ＣＲ)\n◆ (2) 満期保有目的の債券\n【償却原価法】\n決算時\n【換算】\n貸借対照表価額 外貨建償却原価 × 決算時の為替相場(ＣＲ)\nを為替予約相場により換算する。\nまた，額面金額と取得原価の差額は，満期日までの期間にわたって，合理的な方法により配分し，各期\nの為替差損益とする。\n貸借対照表価額\nＣＲ\n為替差損益\nＡＲ\nＨＲ\n有価証券利息\n取得原価\n\\---Y―--ーし—一て一一ノ"},{"h":"５．減損処理(市場価格がある場合)","n":["※ 減損処理は切放法によるため，洗替処理は行わない。"],"c":"外貨建有価証券の時価が著しく下落しており，時価の回復見込みがない又は不明の\n減損の判定\n場合に減損処理を適用する。なお，減損の判定は外貨で行う。\n評価損 外貨建取得原価 × 取得時の為替相場(ＨＲ)－ 外貨建時価 × 決算時の為替相場(ＣＲ)\n貸借対照表価額 外貨建時価 × 決算時の為替相場(ＣＲ)"},{"h":"６．市場価格のない外貨建株式等(その他有価証券)","f":["取得時 取得原価 ＝ 外貨建取得原価 × 取得時の為替相場(ＨＲ)","評価差額 ＝ 外貨建取得原価 × 決算時の為替相場(ＣＲ) － 外貨建取得原価 × 取得時の為替相場(ＨＲ)"],"n":["※ 換算差額ではなく，評価差額として扱う。","※ 減損処理は切放し法によるため，洗替処理は行わない。"],"c":"◆ (1) 基本的会計処理\n決算時\n貸借対照表価額 外貨建取得原価 × 決算時の為替相場(ＣＲ)\n◆ (2) 減損処理\n外貨建有価証券の実質価額が著しく低下している場合に減損処理を適用する。なお，\n減損の判定\n減損の判定は外貨で行う。\n評価損 外貨建取得原価 × 取得時の為替相場(ＨＲ) － 外貨建実質価額 × 決算時の為替相場(ＣＲ)\n貸借対照表価額 外貨建実質価額 × 決算時の為替相場(ＣＲ)"}]},"19":{"n":"社債","s":[{"c":"一 第19章 社債"},{"h":"１．社債の償還","c":"予め定められた日に償還 市場から時価で買い入れて償還\n一括償還 満期償還 買入償還\n分割償還 抽選償還 繰上償還"},{"h":"２．償却原価法","n":["※ 抽選償還・繰上償還の場合，社債の元本残高が分割償還する度に変動するため，これを考慮してクーポン"],"c":"原則：利息法\n容認：定額法(抽選償還・繰上償還の場合，級数法と同様の計算を行う)\n利息・償却額を算定する。"},{"h":"３．未払社債利息","c":"利払日と決算日が異なる場合，決算において，直近の利払日から決算日までの期間に対応する社債利息に\nついて「未払社債利息」を見越計上する。"},{"h":"４．社債償還損益","f":["償還時の支払総額(利付相場) ＝ 償還金額(裸相場) ＋ 端数利息","償還金額(裸相場) ＝ 償還時の支払総額(利付相場) － 端数利息"],"c":"買入償還・繰上償還を行った場合，償還時点の償却原価と償還金額(裸相場)の差額を「社債償還損益」と\nして処理する(満期償還・抽選償還の場合,額面金額で償還するため社債償還損益は生じない)。\nなお，利払日以外に買入償還・繰上償還を行った場合，端数利息(直前の利払日から償還日までの利息)を\n支払うことになるため，問題上，裸相場が与えられていない場合は，利付相場から端数利息を控除して償還\n金額(裸相場)を求める。\nこ"},{"h":"５．財務諸表の表示","c":"償還日が決算日の翌日から起算して1年以内 「一年以内償還予定社債」→ 流動負債\n貸借対照表\n償還日が決算日の翌日から起算して1年超 「社債」→ 固定負債\n「社債利息」→ 営業外費用\n損益計算書\n「社債償還損益」→ 特別損益(総額表示)"},{"h":"６．社債利息の未計上","c":"利払日が到来しているにも関わらず，社債利息を計上していない場合「未払金」を計上する。\n－ 62 －"}]},"20":{"n":"新株予約権付社債","s":[{"c":"第2一0章 新株予約権付社債"},{"h":"１．分類","n":["※ 有価証券の取得として扱う。"],"c":"転換社債型新株予約権付社債 転換社債型以外の新株予約権付社債\n権利行使時の払込方法 代用払込のみ 現金払込 or 代用払込\n発行者側の会計処理 区分法 or 一括法 区分法\n取得者側の会計処理※ 一括法 区分法"},{"h":"２．付与割合","f":["付与割合 ＝ 社債の額面金額：新株予約権の権利行使による払込金額の総額"],"c":"付与割合とは「社債の額面金額」と「新株予約権の権利行使による払込金額の総額」の比率をいう。なお，\n問題上は通常，１：１で出題される。"},{"h":"３．会計処理","f":["※ 権利行使時の交付株式数 ＝ 行使分額面金額 ÷ ＠権利行使価額(付与割合１：１を前提)"],"n":["※ 区分法・一括法のいずれであっても，額面金額と発行価額に差がある場合は償却原価法を適用する。","※ 代用払込の場合は，権利行使時に社債が消滅する。","※ 新株予約権付社債では，端数利息は生じない。"],"c":"社債部分と新株予約権部分を区分して会計処理を行う方法\n区分法\n→ 社債部分は普通社債に準じて処理し，新株予約権部分は新株予約権に準じて処理する。\n社債部分と新株予約権部分を一括して会計処理を行う方法\n一括法\n→ 全体を普通社債に準じて処理する。\n－ 63 －"}]},"21":{"n":"退職給付会計","s":[{"c":"一 第21章 退職給付会計"},{"h":"１．分類","c":"退職一時金制度 退職給付会計を適用し，退職給付引当金を計上\n確定給付型 退職給付会計を適用し，退職給付引当金を計上\n企業年金制度\n確定拠出型 要拠出額を「退職給付費用」に計上"},{"h":"２．退職給付債務，勤務費用及び利息費用の算定方法","f":["|退職 給付債務 ＝ 期末までに発生している退職給付見込額 ÷ (１＋期首の割引率)残存勤務期間|","|勤務 費用 ＝ 退職給付見込額の当期発生額÷(１＋期首の割引率)残存勤務期間|","利息費用 |利息 費用 ＝ 期首の退職給付債務※ × 期首の割引率|"],"n":["※ 期首に過去勤務費用が生じた場合，改訂後の退職給付債務を用いる。"],"c":"期末までに発生している退職給付見込額を現在価値に割引計算して算定する。\n退職給付債務\n当期に発生した退職給付見込額を現在価値に割引計算して算定する。\n勤務費用\n期首の退職給付債務に割引率を乗じて算定する。"},{"h":"３．退職給付見込額のうち，期末までに発生している金額の算定方法","c":"次のいずれかの方法を選択する。\n退職給付見込額について全勤務期間で除した額を各期の退職給付見込額の発生額\n期間定額基準\nとする方法\n退職給付制度の給付算定式に従って各勤務期間に帰属させた給付に基づき見積っ\nた額を，退職給付見込額の各期の発生額とする方法\n→ 勤務期間の後期における給付算定式に従った給付が，初期よりも著しく高い\n給付算定式基準\n水準となるとき(著しく後加重となるとき)には，費用配分が後期に集中することを\n回避するために，当該期間の給付が均等に生じるとみなして補正した給付算定式に\n従わなければならない。\n－ 64 －"},{"h":"４．退職給付引当金及び退職給付費用の算定方法","f":["退職給付費用 退職給付費用 ＝ 勤務費用 ＋ 利息費用 － 期待運用収益 ＋ 各種差異の当期費用処理額(不利差異) － 各種差異の当期費用計上額(有利差異)"],"n":["※ 企業年金制度において，掛金拠出額の一部を従業員が負担している場合，退職給付費用から従業員負担","※ 年金資産の額が退職給付債務に未認識項目を加減した額を超える場合，当該超過額を「前払年金費用」","※ 発生時に全額費用処理することも認められる。"],"c":"◆ (1) 算定方法\n退職給付引当金 退職給付債務の実績額 － 年金資産の公正な評価額 － 未認識項目(不利差異) ＋未認識項目(有利差異)\n額を控除する(退職給付引当金は従業員拠出がない場合と同様に算定する)。\nとして資産計上する。\n年金資\n期\n産\n首 未認識差異：×××\n]\n」\n認\n未 認\n識\n識\n：\n：\n×\n×\n×\n×"},{"h":"５．退職給付信託","c":"信託財産の時価により年金資産として拠出されたものとして処理を行う。また，有価証券等で帳簿価額と\n時価に差額がある場合は「退職給付信託設定損益」を計上する。"},{"h":"６．財務諸表の表示","c":"E7\n「退職給付引当金」→ 固定負債\n貸借対照表\n「前払年金費用」→ 固定資産(投資その他の資産)\n「退職給付費用」→ 売上原価又は販売費及び一般管理費\n損益計算書\n「退職給付信託設定損益」→ 特別損益\n－ 66 －"}]},"22":{"n":"資産除去債務","s":[{"c":"第2一2章 資産除去債務"},{"h":"１．資産除去債務の会計処理","n":["※ 過去に割引前の将来キャッシュ・フローの見積りが増加した場合で，減少部分に適用すべき割引率を"],"c":"◆ (1) 基本的会計処理\n計上時期\n有形固定資産の取得，建設，開発又は通常の使用によって発生した時に負債として計上する。\nよ工 よ工\n資産除去債務に対応する除去費用 資産除去債務の算定\n負債計上額と同額を，関連する有形固定資産の 有形固定資産の除去に要する割引前将来ＣＦを\n帳簿価額に加える。 見積り，割引後の金額で算定する。\n」 こ\n資産除去債務に対応する除去費用の費用配分 時の経過による資産除去債務の調整額\n資産計上された資産除去債務に対する除去費用 時の経過による資産除去債務の調整額(利息費\nは，減価償却を通じて当該有形固定資産の残存 用)は，発生時の費用として処理し，資産除去債\n耐用年数にわたり，各期に費用配分する。 務に加算する。\nょエ\n資産除去債務の履行\n履行時に認識される資産除去債務残高(見積額)\nと資産除去債務の決済のために実際に支払われ\nた額との差額を発生時の費用として処理する。\n◆ (2) 割引前将来キャッシュ・フローと割引率\n割引前将来キャッシュ・フロー 割引率\n・合理的で説明可能な仮定及び予測に基づく自己の支出見積りによる（自己の信用"},{"h":"２．賃借契約に関連する敷金(容認処理)","n":["※ 償却期間：平均的な入居期間"],"c":"建物等の賃借契約において，当該賃借建物等に係る有形固定資産の除去などの原状回\n適用要件\n復が契約で要求されており，かつ，賃借契約に関する敷金が資産計上されている場合\n資産除去債務の負債計上及びこれに対応する除去費用の資産計上に代えて，当該敷金\nの回収が最終的に見込めないと認められる金額を合理的に見積り，そのうち当期の\n処理方法\n負担に属する金額を費用に計上する方法によることができる\n－ 68 －"}]},"23":{"n":"純資産","s":[{"c":"第23—章 純資産"},{"h":"１．表示","n":["※1 任意積立金は具体的な名称で表示される。","※2 繰越利益剰余金がマイナスとなった場合は，マイナスの符号を付す。","※3 自己株式は株主資本の控除項目としてマイナスの符号を付す。","※4 評価・換算差額等が借方残高の場合は，マイナスの符号を付す。","※5 マイナスの符号は△を用いることが一般的である。"],"c":"貸 借 対 照 表\nⅠ 株主資本\n１ 資本金 ×××\n２ 資本剰余金\n◆ (1) 資本準備金 ×××\n◆ (2) その他資本剰余金 ×××\n３ 利益剰余金\n◆ (1) 利益準備金 ×××\n◆ (2) その他利益剰余金\n新築積立金※1 ×××\n別途積立金※1 ×××\n繰越利益剰余金※2 ×××\n４ 自己株式※3 ※5△×××\n株主資本合計 ×××\nⅡ 評価・換算差額等\n１ その他有価証券評価差額金※4 ×××\n２ 繰延ヘッジ損益※4 ×××\n３ 土地再評価差額金※4 ×××\n評価・換算差額等合計 ×××\nⅢ 株式引受権 ×××"},{"h":"２．新株の発行","n":["※ 問題上，特に指示のない場合は，原則規定により処理を行う。","※ 現物出資がなされた場合，受け入れた財産を時価等の公正な評価額で計上し，払込資本に計上する。","※ 新株の発行について，以下のように処理する場合もある。","※ この場合，厳密には新株式申込証拠金は負債として表示するべきだが，決算日後","※ 資本準備金と利益準備金の合計が，資本金の１/４に達するまで，配当金の１/10 の額を準備金として"],"c":"払込金額の全額を資本金に計上する。\n原則\n（借）現金預金 ××（貸）資 本 金 ××\n払込金額の１/２を超えない額は資本準備金とすることができる。\n→ 資本金計上額の最低額は払込金額の１/２\n例外\n（借）現金預金 ××（貸）資 本 金 ××\n資本準備金 ××\n申込期間中，申込証拠金を受け取ったときは，以下の処理を行う(新株式申込証拠金は\n申込期間 「流動負債」の区分に計上する)。\n（借）別段預金 ××（貸）新株式申込証拠金 ××\n申込期間経過後，払込期日の到来していない新株式申込証拠金が，決算日時点にある\n場合には，資本金の区分の次に特別の区分を設けて表示しなければならない。\nⅠ 資本金 ×××\n申込期間 Ⅱ 新株式申込証拠金 ×××\n経過後 Ⅲ 資本剰余金 ×××\nに払込期日が到来すれば直ちに資本金もしくは資本準備金に振り替えられること\nが明らかなので，繰り上げて純資産として取扱う。\n払込期日が到来したときは，以下の処理を行う。\n（借）当座預金 ××（貸）別段預金 ××"},{"h":"４．株主資本の計数の変動","n":["※ 資本金を資本準備金及びその他資本剰余金へ振り替える仕訳は，債権者保護手続が完了し，効力が発生","※ 準備金を剰余金へ振り替える仕訳は，債権者保護手続が完了し，効力が発生した時点で行う。"],"c":"◆ (1) 任意積立金(剰余金の処分)\n任意積立金の設定 （借）繰越利益剰余金 ××（貸）〇〇積立金 ××\n任意積立金の取崩 （借）〇〇積立金 ××（貸）繰越利益剰余金 ××\n◆ (2) 無償増資・減資\n無償増資 株主資本項目を「資本金」へ振り替える。\n（借）資 本 金 ××（貸）資本準備金 ××\n減資\n（借）資 本 金 ××（貸）その他資本剰余金 ××\nした時点で行う。\n◆ (3) 準備金の剰余金への振替(準備金の取崩)\n資本準備金の振替 （借）資本準備金 ××（貸）その他資本剰余金 ××\n利益準備金の振替 （借）利益準備金 ××（貸）繰越利益剰余金 ××\n◆ (4) 繰越利益剰余金が負の値となった場合\n繰越利益剰余金が負の値(借方残高)となった場合，「任意積立金」等を取り崩すことで損失を補填すること\nができる。\n（借）〇〇積立金 ××（貸）繰越利益剰余金 ××"},{"h":"５．自己株式","f":["新株の払込金額 ＝ 払込金額 ×","自己株式の処分対価 ＝ 払込金額 ×"],"n":["※ 処分・消却された自己株式の帳簿価額は，移動平均法等に従って算定する。","※ 「新株の払込金額＜自己株式処分差損」の場合，資本金計上額はゼロと","※ 取得原価で計上する(時価評価は行わない)。","※ 期中に負の値となっても都度補填しない(決算時に負の値となった場合にのみ補填する)。"],"c":"口(1) 自己株式の取得\n取得原価をもって「自己株式」勘定で処理する。なお，取得に係る付随費用\nは，「支払手数料」等の勘定で処理し，取得原価に算入しない。\n有償取得\n（借）自己株式 ××（貸）現金預金 ××\n支払手数料 ××\n無償取得 仕訳は行わず，数のみの増加として取得単価の修正を行う。\n◆ (2) 自己株式の処分・消却\n自己株式の処分対価と帳簿価額の差額をその他資本剰余金として処理する。\n【自己株式の帳簿価額 ＜ 処分対価】\n（借）現金預金 ××（貸）自己株式 ××\n自己株式の処分 その他資本剰余金 ××\n【自己株式の帳簿価額 ＞ 処分対価】\n（借）現金預金 ××（貸）自己株式 ××\nその他資本剰余金 ××\n自己株式の帳簿価額をその他資本剰余金から減額する。\n自己株式の消却\n（借）その他資本剰余金 ××（貸）自己株式 ××\n－ 71 －\n◆ (3) 新株の発行と自己株式の処分を同時に行った場合"},{"h":"６．新株予約権","f":["＝ 権利行使に伴う払込金額 ＋ 新株予約権の発行に伴う払込金額"],"c":"◆ (1) 発行者側の処理\n新株予約権の発行に伴う払込金額を｢新株予約権｣として計上する。\n発行時\n（借）現金預金 ××（貸）新株予約権 ××\n新株の払込金額(自己株式の処分対価)\n【新株を発行した場合】\n（借）現金預金 ××（貸）払込資本 ××\n新株予約権 ××\n権利行使時\n【自己株式を処分した場合】\n（借）現金預金 ××（貸）自己株式 ××\n新株予約権 ×× その他資本剰余金 ××\n【新株の発行と自己株式の処分を同時に行った場合】"},{"h":"５．(3)と同様に処理する。","c":"新株予約権の払込金額を「新株予約権戻入益」として計上する。\n権利行使期間終了時\n（借）新株予約権 ××（貸）新株予約権戻入益 ××\n貸借対照表 |「 新株予約権」→ 純資産の部(株主資本以外)\n財務諸表の表示 損益計算書 |「 新株予約権戻入益」→ 特別利益\n◆ (2) 購入者側の処理\n購入時 取得原価をもって有価証券として処理する(付随費用を取得原価に含める)。\n決算時 保有目的(売買目的有価証券又はその他有価証券)に応じて時価評価を行う。\n新株予約権を株式に振り替える。\n【売買目的有価証券】\n行使時の時価で株式に振り替え，評価損益を計上する。\n（借）有価証券 ××（貸）有価証券 ××\n有価証券評価損益 ××\n権利行使時\n（借）有価証券 × ×現金預金 ××\n【その他有価証券】\n帳簿価額により株式に振り替える。\n（借）投資有価証券 ××（貸）投資有価証券 ××\n現金預金 ××\n「新株予約権不行使損」を計上する。"}]},"24":{"n":"分配可能額","s":[{"c":"一 第24章 分配可能額"},{"h":"１．分配可能額の算定式","f":["分配可能額 ＝ 分配時の剰余金※1","剰余金 ＝ その他資本剰余金 ＋ その他利益剰余金(任意積立金・繰越利益剰余金)","分配時の剰余金 ＝ 前期末Ｂ/Ｓの剰余金 ± 分配時までの剰余金の変動額","Step１ のれん等調整額＝のれん÷２＋繰延資産","資本等金額＝資本金＋資本準備金＋利益準備金"],"n":["※1 剰余金とは，その他資本剰余金とその他利益剰余金(任意積立金・繰越利益剰余金)の合計額であり，","※2 貸方残高(評価差益)の場合，加算しない。","※3 繰延ヘッジ損益は分配可能額の算定上，影響を与えない。","※4 のれん等調整額の減算額は以下の手順で算定する。"],"c":"－ 分配時の自己株式(帳簿価額)\n－ 分配時までの自己株式の処分の対価の額\n－ 前期末その他有価証券評価差額金(借方残高)※2\n－ 前期末土地再評価差額金(借方残高)※2\n－ のれん等調整額の減算額※4\n分配時の剰余金は以下のように求める。\nのれん等調整額及び資本等金額を算定する。\n分配制限の有無を判定する。\nStep２\nのれん等調整額＞資本等金額・・・分配制限あり → Step３へ\n①，②のいずれか小さい方の金額が減算額となる。\nStep３ ① のれん等調整額－資本等金額\n② その他資本剰余金＋繰延資産"},{"h":"２．臨時決算","c":"剰余金の配当及び処分に際して，臨時決算を行い，臨時計算書類(損益計算書・貸借対照表)を作成し，\nそれについて株主総会の承認等を受けた場合には，①臨時決算日までの期間損益，②臨時決算日までの自己\n株式の処分対価の額を剰余金の額に加算することができる。また，分配可能額の算定に当たり考慮する資本\n金，のれん及び繰延資産，その他有価証券評価差額金等は臨時計算書類計上額を用いる。\n－ 76 －"}]},"25":{"n":"ストック・オプション","s":[{"c":"第2一5章 ストック・オプション等"},{"h":"１．用語の定義","c":"付与日 ストック・オプションが付与された日\n権利確定日 ストック・オプションの権利の確定した日\n対象勤務期間 付与日から権利確定日までの期間\nストック・オプションの権利行使により，行使価格に基づく金額が\n権利行使日\n払い込まれた日\n権利行使期間 ストック・オプションの権利を行使できる期間\n|勤 務条件 従業員等の一定期間の勤務や業務執行に基づく条件\n権利確定条件\n|業 績条件 一定の業績の達成に基づく条件"},{"h":"２．権利確定日以前の会計処理","f":["各期の費用計上額 ＝ 公正な評価単価 × (付与数－権利不確定による失効の見積数) × － 前期までの費用計上額","額による費用配分計算を継続する(＝費用の減額はしない)。"],"n":["※ ストック・オプション数の見直し","※ 業績条件の達成見込みの変更等により，権利確定日が変更される場合は，変更後の対象勤務期間に"],"c":"ストック・オプションを付与し，これに応じて企業が従業員等から取得するサービスは，その取得に応じ\nて「株式報酬費用」(販売費及び一般管理費)として計上し，対応する金額を，ストック・オプションの権利\nの行使又は失効が確定するまでの間，貸借対照表の純資産の部に「新株予約権」として計上する。\n（借）株式報酬費用 ××（貸）新株予約権 ××\n◆ (1) 各期の費用計上額の算定方法\n対象勤務期間のうち当期末までの期間\n対象勤務期間\nストック・オプション数※\nストック・オプションの公正な評価額\nストック・オプション数を見直す。\n権利不確定による失効の見積数\n→見直し後のストック・オプション数に基づくストック・オプション\nに重要な変動が生じた場合\nの公正な評価額に基づき，その期までに費用として計上すべき額と，\n(条件変更による場合を除く)\nこれまでに計上した額との差額を見直した期の損益として計上する。\nストック・オプション数を権利確定数と一致させる。\n→修正後のストック・オプション数に基づくストック・オプションの\n権利確定日 公正な評価額に基づき，権利確定日までに費用として計上すべき額と，\nこれまでに計上した額との差額を権利確定日の属する期の損益として"},{"h":"３．権利確定日後の会計処理","c":"権利確定日後のストック・オプションの権利行使及び権利不行使による失効の会計処理は通常の新株予約\n権の会計処理と同様に行う。\n－ 78 －"},{"h":"４．取締役の報酬等として株式を無償交付する取引に関する取扱い","f":["各期の費用計上額 ＝ 公正な評価単価 × (付与数－権利確定条件の不達成等による失効の見積数) × － 前期までの費用計上額"],"n":["※ 株式数の見直し","※ 資本金等増加限度額の１/２を超えない額は，資本準備金とすることができる。","※ 費用の戻入を行う場合，以下の仕訳を行う。","※ 資本金等増加限度額の１/２を超えない額は，資本準備金とすることができる。"],"c":"◆ (1) 各期の費用計上額の算定方法\n対象勤務期間のうち当期末までの期間\n対象勤務期間\n株式数※\n株式の公正な評価額\n株式数を見直す。\n権利確定条件の不達成による\n→見直し後の株式数に基づく株式の公正な評価額に基づき，その期\n失効等の見積数に\nまでに費用として計上すべき額と，これまでに計上した額との差額を\n重要な変動が生じた場合\n見直した期の損益として計上する。\n株式数を権利確定数と一致させる。\n→修正後の株式数に基づく株式の公正な評価額に基づき，権利確定日\n権利確定日\nまでに費用として計上すべき額と，これまでに計上した額との差額を\n権利確定日の属する期の損益として計上する。\n◆ (2) 会計処理\n① 事前交付型\n【新株を発行した場合】"}]},"26":{"n":"会計上の変更","s":[{"c":"第2一6章 会計方針の開示、会計上の変更及び誤謬の訂正"},{"h":"１．遡及処理の有無","n":["※ 減価償却方法の変更は，会計上の見積りの変更と同様に，遡及処理は行わない。"],"c":"会計方針の変更 遡及処理を行う(遡及適用)\n会計上の変更 表示方法の変更 遡及処理を行う(財務諸表の組替え)\n会計上の見積りの変更 遡及処理は行わない\n過去の誤謬の訂正 遡及処理を行う(修正再表示)"},{"h":"２．会計方針の変更・過去の誤謬の訂正","n":["※ 税効果を適用する場合，「会計方針の変更による累積的影響額」「誤謬による累積的影響額」は税引後"],"c":"遡及処理による累積的影響額は，表示する財務諸表のうち最も古い期間(通常前期)の期首残高に反映する。\nとなる。\n－ 81 －"}]},"28":{"n":"収益認識","s":[{"c":"一\n口"},{"h":"１．５ステップ","c":"ステップ１ 顧客との契約を識別する。\nステップ２ 契約における履行義務を識別する。\nステップ３ 取引価格を算定する。\nステップ４ 契約における履行義務に取引価格を配分する。\nステップ５ 履行義務を充足した時に又は充足するにつれて収益を認識する。"},{"h":"２．用語の定義","c":"法的な強制力のある権利及び義務を生じさせる複数の当事者間における取決めを\n契約\nいう。\n顧客との契約において，次の(1)又は(2)のいずれかを顧客に移転する約束をいう。\n◆ (1) 別個の財又はサービス(あるいは別個の財又はサービスの束)\n履行義務\n◆ (2) 一連の別個の財又はサービス(特性が実質的に同じであり，顧客への移転の\nパターンが同じである複数の財又はサービス)\n財又はサービスの顧客への移転と交換に企業が権利を得ると見込む対価の額(ただ\n取引価格\nし，第三者のために回収する額を除く。)をいう。\n独立販売価格 財又はサービスを独立して企業が顧客に販売する場合の価格をいう。\n企業が顧客に移転した財又はサービスと交換に受け取る対価に対する企業の権利\n契約資産\n(ただし，顧客との契約から生じた債権を除く。)をいう。\n財又はサービスを顧客に移転する企業の義務に対して，企業が顧客から対価を受け\n契約負債\n取ったもの又は対価を受け取る期限が到来しているものをいう。\n顧客との契約 企業が顧客に移転した財又はサービスと交換に受け取る対価に対する企業の権利\nから生じた債権 のうち無条件のもの(すなわち，対価に対する法的な請求権)をいう。"},{"h":"３．開示","c":"企業が顧客に移転した財又はサービスと交換に受け取る対価に対する企業の権利\n契約資産\n(顧客との契約から生じた債権を除く。)\n顧客との契約 企業が顧客に移転した財又はサービスと交換に受け取る対価に対する企業の無条\nから生じた債権 件の権利\n財又はサービスを顧客に移転する企業の義務に対して，企業が顧客から対価を受け\n契約負債\n取ったもの又は対価を受け取る期限が到来しているもの\n－ 83 －"},{"h":"４．ステップ１(契約の識別)に関連する論点 → 契約変更","c":"【契約変更を独立した契約として処理する場合】\n次の２要件をいずれも満たす場合には，契約変更を独立した契約として処理する。\n① 別個の財又はサービスの追加により，契約の範囲が拡大されること\n② 変更される契約の価格が，追加的に約束した財又はサービスに対する独立販売価格に特定の契約の\n状況に基づく適切な調整を加えた金額分だけ増額されること\n【契約変更が独立した契約として処理されない場合】\n契約変更が，独立した契約として処理されない場合には，契約変更日において未だ移転していない財又は\nサービスについて，それぞれ次の(1)～(3)のいずれかの方法により処理する。\n◆ (1) 未だ移転していない財又はサービスが契約変更日以前に移転した財又はサービスと別個のものである場合\n契約変更を既存の契約を解約して新しい契約を締結したものと仮定して処理する。なお，残存履行義務に\n配分すべき対価の額は，次の①及び②の合計額とする。\n① 顧客が約束した対価(顧客から既に受け取った額を含む。)のうち，取引価格の見積りに含まれている\nが収益として認識されていない額\n② 契約変更の一部として約束された対価\n◆ (2) 未だ移転していない財又はサービスが契約変更日以前に移転した財又はサービスと別個のものではなく，\n契約変更日において部分的に充足されている単一の履行義務の一部を構成する場合\n契約変更を既存の契約の一部で"},{"h":"５．ステップ２(履行義務の識別)に関連する論点","n":["※ 独立販売価格の比率に基づき各履行義務への配分を行う。","※ 保証サービスの履行に伴い収益を認識する。","※ 独立販売価格の比率に基づき各履行義務への配分を行う。","※ ポイントに関する履行義務は，ポイントと引き換えに財又はサービスが移転する時，または当該","※ 消化仕入を実施する会社が代理人に該当する場合には，純額を「手数料収入」(収益)に計上する。"],"c":"◆ (1) 財又はサービスに対する保証\n合意された仕様\n「企業会計原則」注解18に定める引当金として処理する。\nに従った保証\n（借）製品保証引当金繰入額 ×× （貸）製品保証引当金 ××\n(基本保証)\n保証サービスは履行義務であり，取引価格を財又はサービス及び保証サービスに\n配分する。\n（借）現 金 預 金 ×× （貸）売 上 高 ××\n保証サービス\n（借）現 金 預 金 ×× 契 約 負 債 ××\n(追加保証)\n（借）契 約 負 債 ×× （貸）売 上 高 ××\n◆ (2) カスタマー・ロイヤルティー・プログラム\n顧客との契約において，既存の契約に加えて追加の財又はサービスを取得するオプションを顧客に\n付与する場合には，当該オプションが当該契約を締結しなければ顧客が受け取れない重要な権利を\n顧客に提供するときにのみ，当該オプションを履行義務として扱う。\n（借）現 金 預 金 ×× （貸）売 上 高 ××\n（借）現 金 預 金 ×× 契 約 負 債 ××\nポイントが消滅する時に収益を認識する。"},{"h":"６．ステップ３(取引価格の算定)に関連する論点","f":["契約における 顧客が支払うと見込まれる現金販売価格を反映する金額で認識する(＝現金販売価格"],"n":["※ 現金以外の対価の時価を合理的に見積もることができない場合には，当該対価"],"c":"将来リベートを支払うと予想される部分については，収益を認識せず，「返金負債」\n(負債)を計上する。\nリベート\n（借）現 金 預 金 ×× （貸）売 上 高 ××\n（借）現 金 預 金 ×× 返 金 負 債 ××\n① 企業が権利を得ると見込む対価の額(②返品されると見込まれる商品又は製品の\n対価を除く)で収益を認識する。\n② 返品されると見込まれる商品又は製品については収益を認識せず，当該商品又は\n製品について受け取った又は受け取る対価の額で「返金負債」(負債)を認識する。\n③ 返金負債の決済時に顧客から商品又は製品を回収する権利について「返品資産」\n返品権付き販売\n(資産)を認識する。\n（借）現 金 預 金 ×× （貸）売 上 高 ××\n（借）現 金 預 金 ×× 返 金 負 債 ××\n（借）売 上 原 価 ×× （貸）棚 卸 資 産 ××\n（借返 品 資 産 ××\n顧客との契約に重要な金融要素が含まれる場合，取引価格の算定に当たって，約束し\nた対価の額に含まれる金利相当分の影響を調整する。収益は，約束した財又はサービ\nスが顧客に移転した時点で(又は移転するにつれて)，当該財又はサービスに対して\n重要な金融要素 は一時点で収益を認識し，金利相当分は一定期間にわたって収益を認識する)。"}]},"31":{"n":"包括利益","s":[{"c":"一 第31章 包括利益"},{"h":"１．包括利益","f":["包括利益 ＝ 当期純利益※ ＋ その他の包括利益※","包括利益 ＝ 当期末の連結Ｂ/Ｓ純資産 － 前期末の連結Ｂ/Ｓ純資産"],"n":["※ 親会社に帰属する金額のみならず，非支配株主に帰属する金額を含む。"],"c":"ある企業の特定期間の財務諸表において認識された純資産の変動額のうち，当該\n包括利益の意義\n企業の純資産に対する持分所有者との直接的な取引によらない部分\nその他の包括利益\n包括利益のうち当期純利益に含まれない部分\nの意義\n包括利益の算定式\n－ 持分所有者との直接的な取引による純資産の変動額"},{"h":"２．その他の包括利益","c":"・その他の包括利益の内訳項目は，その内容に基づいて，その他有価証券評価差額金，\n繰延ヘッジ損益，為替換算調整勘定，退職給付に係る調整額等に区分して表示する。\n内訳の開示 ・持分法適用会社のその他の包括利益に対する投資会社の持分相当額は，その他有価\n証券評価差額金や繰延ヘッジ損益等として表示せず，一括して「持分法適用会社に\n対する持分相当額」という名称で区分表示する。\n・その他の包括利益の内訳項目は，税効果を控除した後の金額で表示する。ただし，\n各内訳項目について法人税等及び税効果を控除する前の金額で表示して，それらに\n関連する法人税等及び税効果の金額を一括して加減する方法で記載することができ\n税効果\nる。\n・持分法適用会社のその他の包括利益に対する投資会社の持分相当額は，税効果控除後\nの金額で表示する。"},{"h":"３．包括利益計算書","c":"包括利益を表示する計算書は，次のいずれかの形式による。なお，いずれの形式においても，包括利益の\nうち親会社株主に係る金額及び非支配株主に係る金額を付記する。\n当期純利益を表示する「連結損益計算書」と包括利益を表示する「連結包括利益\n２計算書方式\n計算書」からなる形式\n当期純利益の表示と包括利益の表示を１つの計算書である「連結損益及び包括利益\n１計算書方式\n計算書」で行う形式"},{"h":"４．その他の包括利益累計額","f":["(※1) 27,640(親会社株主に帰属する当期純利益※2)＋2,000(非支配株主に帰属する当期純利益)＝29,640","＋400(利益の計上)－40(Ａ社のれん償却額)＝27,640","(※3) 15,000(Ｐ社差額金増加額)＋2,400(Ｓ社差額金増加額)＝17,400","(※5) 29,640(当期純利益※1)＋17,600(その他の包括利益*)＝47,240","* 17,400(その他有価証券評価差額金※3)＋200(持分法適用会社に対する持分相当額※4)＝17,600","(※6) 27,640(親会社株主に帰属する当期純利益※2)＋17,120(親会社株主に係るその他の包括利益*)＝44,760","＋200(Ａ社差額金増加額のうちＰ社持分)＝17,120","(※7) 2,000(非支配株主に帰属する当期純利益)＋480(非支配株主に係るその他の包括利益*)＝2,480","＋200(Ａ社差額金増加額のうちＰ社持分)＝47,120"],"c":"連結財務諸表の作成に当たっては，個別貸借対照表及び個別株主資本等変動計算書において「評価・換算\n差額等」として表示されていた項目が，「その他の包括利益累計額」と表示される。\n－ 188 －\nこニコ\n包括利益\n・Ｐ社は前期末にＳ社発行済株式総数の80％を75,040円で取得し，Ｓ社を連結子会社とした。\n・Ｐ社は前期末にＡ社発行済株式総数の20％を6,600円で取得し，Ａ社を持分法適用関連会社とした。\n・Ｐ社の資本勘定の推移は次のとおりである。\n資本金 利益剰余金 その他有価証券評価差額金\n前期末 100,000円 150,000円 30,000円\n当期末 100,000円 170,000円 45,000円\n・Ｓ社の資本勘定の推移は次のとおりである。\n資本金 利益剰余金 その他有価証券評価差額金\n前期末 30,000円 50,000円 4,800円\n当期末 30,000円 60,000円 7,200円\n・Ａ社の資本勘定の推移は次のとおりである。\n資本金 利益剰余金 その他有価証券評価差額金\n前期末 10,000円 20,000円 1,000円\n当期末 10,000円 22,000円 2,000円\n・Ａ社及びＳ社の資産及び負債については，時価と帳簿価額との間に重要な乖離は生じていない。"},{"h":"５．組替調整","n":["※ 当期発生額及び組替調整額は，法人税等及び税効果額調整前の金額で注記される。"],"c":"組替調整の 当期純利益を構成する項目のうち，当期又は過去の期間にその他の包括利益に含まれてい\n意義 た部分は，利益の二重計上を避けるため，その他の包括利益の調整(組替調整)が行われる。\n■ その他有価証券評価差額金\n・売却損益及び評価損(減損損失)などの当期純利益に含められた金額\n・子会社のその他有価証券評価差額金で，子会社に対する持分の減少に伴って取り崩さ\nれ，当期純利益に含められた金額\n組替調整の ■ 繰延ヘッジ損益\n具体例 ヘッジ対象に係る損益が認識されたことに伴って当期純利益に含められた金額\n■ 為替換算調整勘定\n子会社に対する持分の減少に伴って取り崩され，当期純利益に含められた金額\n■ 退職給付に係る調整額\n前期末までに認識された未認識項目が償却され，当期純利益に含められた金額\nその他の包括利益の内訳(当期発生額と組替調整額)を開示するために，その他の包括利益\nの内訳項目ごとに組替調整の注記を行う。\n組替調整の |Ｐ /Ｌに収益を計上した場合 |そ の他の包括利益(組替調整額)をマイナスで表示する |\n注記\n|Ｐ /Ｌに費用を計上した場合 |そ の他の包括利益(組替調整額)をプラスで表示する |\n－ 191 －"}]},"32":{"n":"連結退職給付","s":[{"c":"一 第32章 連結退職給付"},{"h":"１．連結財務諸表における取り扱い","n":["※ 連結Ｂ/Ｓの「退職給付に係る調整累計額」→ 親会社持分相当額のみ","※ 連結子会社において支配獲得時に未認識差異がある場合を除く。","※ 連結Ｃ/Ｉの「退職給付に係る調整額」→ 親会社持分＋非支配株主持分"],"c":"・退職給付債務の実績額から年金資産の公正な評価額を控除した額を「退職給付に\n係る負債(資産)」として固定負債(資産)に計上する。\n連結貸借対照表 ・当期末の未認識項目(税効果考慮後)は，「退職給付に係る調整累計額」として\nその他の包括利益累計額に計上する。\n・「退職給付費用」は，個別財務諸表計上額と同額を計上する。\n連結損益及び\n・未認識項目の増減額(税効果考慮後)を「退職給付に係る調整額」としてその他の\n包括利益計算書\n包括利益に計上する。"},{"h":"２．連結子会社の処理","c":"評価差額として処理する(退職給付に係る調整累計額，退職給付に\n支配獲得時に生じた未認識項目\n係る調整額は計上されない)。\n支配獲得後に生じた未認識項目 子会社のその他有価証券評価差額金と同様の処理を行う。"},{"h":"３．注記","f":["(※1) 45,000(X5.3退職給付引当金)－48,000(X5.3退職給付債務実績額)＝△3,000","(※2) 53,000(X6.3退職給付引当金)－58,000(X6.3退職給付債務実績額)＝△5,000","(※3) 58,000(X7.3退職給付引当金)－67,000(X7.3退職給付債務実績額)＝△9,000","(※1) 36,000(X6.3退職給付引当金)－40,000(X6.3退職給付債務実績額)＝△4,000","(※2) 40,000(X7.3退職給付引当金)－45,000(X7.3退職給付債務実績額)＝△5,000","(*1) △3,000(X5.3未認識差異)×{１－40％(税率)}＝△1,800","(*2) △5,000(X6.3未認識差異)×{１－40％(税率)}＝△3, 対して商品を販売している場合，個別貸借対照表の売上債権に基づき算定された\n親会社の「売上債権の増減額」と在外子会社の「仕入債務の増減額(ＡＲ換算額)」を相殺する。なお，相殺\n時に生じる差額は，為替差損益とする。\n〔親会社〕\n売上債権の増減額\n前期末個別Ｂ/Ｓの売上債権 (Ｂ / Ｓ 計 上 額 の 差 額 ) 当期末個別Ｂ/Ｓの売上債権\n►\n〔子会社〕\n仕入債務の増減額\n前期末個別Ｂ/Ｓの仕入債務 ( 外 貨建 の 増 減 額 ×当 期 Ａ Ｒ ) 当期末個別Ｂ/Ｓの仕入債務\n(外貨額) (外貨額)\n◆ (2) 直接法との整合のための調整\n直接法・原則法では，「営業収入」と「商品の仕入による支出」に関する親会社の円換算額と子会社の\nＡＲ換算額との差額が「現金及び現金同等物に係る換算差額」に含まれるが，これと整合させるため「為替\n差損益」を用いて「現金及び現金同等物に係る換算差額」を調整する。\n◆ (3) 棚卸資産に係る未実現損益の調整\n未実現利益の額(ＨＲ換算額)について，国内子会社の場合と同様の修正を行う。\n－ 298 －\n第38章Ⅱ 在外連結キャッシュ・フロー計算書－応用編"},{"h":"１．会計上の分類","c":"企業結合に該当する取引は，その経済的実態に基づいて，取得，共通支配下の取引，共同支配企業の形成\nに分類され，それぞれ異なる会計処理が適用される。\n取得 ある企業が他の企業(又は企業を構成する事業)に対する支配を獲得すること\n結合当事企業(又は事業)のすべてが，企業結合の前後で同一の企業により最終的\n共通支配下の取引\nに支配され，かつ，その支配が一時的ではない場合の企業結合\n複数の独立した企業が契約等に基づき，共同支配企業(複数の独立した企業により\n共同支配企業の形成\n共同で支配される企業)を形成する企業結合"},{"h":"２．取得の会計処理","c":"企業結合が取得に該当する場合，パーチェス法を適用する。パーチェス法とは，被取得企業から受け入れ\nる資産及び負債の取得原価を，対価として交付する現金及び株式等の時価とする方法をいう。\nパーチェス法を適用するには，どの結合当事企業が取得企業となるかを決定する必\n①取得企業の決定 要がある。なお，計算問題上は，総体としての株主が占める相対的な議決権比率の\n大きさに基づいて決定することが多い。\n被取得企業の取得原価は，取得の対価(支払対価)となる財の企業結合日における\n時価で算定する。\n②取得原価の算定 対価の種類 取得原価\n現 金 現金支出額\n株 式 企業結合日における株価 × 交付株式数\n被取得企業の取得原価は，企業結合日時点の時価を基礎として，被取得企業から\n受け入れた資産及び負債に対して配分する(パーチェス法)。なお，受け入れた資産\n③取得原価の配分\n及び負債の純額と被取得企業の取得原価の差額はのれん(又は負ののれん発生益)\nとして処理する。\n取得の対価として株式を交付した場合，取得企業の増加資本について以下のように\n処理する。\n払込資本(資本金・資本剰余金)を計上する。なお，\n新株を発行した場合\n④増加資本の処理 増加すべき払込資本の内訳は任意である。"},{"h":"３．取得(合併)","f":["交付株式数 交付株式数 ＝ 消滅会社の発行済株式数 × 合併比率","合併比率 合併比率 ＝","交付株式数 ＝ (消滅会社の発行済株式総数 － 抱合せ株式数) × 合併比率"],"n":["※ 企業結合に係る特定勘定は貸借対照表上，原則固定負債として表示するが，"],"c":"(1口) 交付株式数と合併比率\n消滅会社の１株当たり企業評価額\n存続会社の１株当たり企業評価額\n◆ (2) 合併比率の算定方法\n企業評価額の算定方法 １株当たり企業評価額\n株式市価法 株価 × 発行済株式総数\n簿価純資産額法 資産(簿価) － 負債(簿価)\n左記の企業評価額を\n時価純資産額法 資産(時価) － 負債(時価)\n発行済株式総数で除して算定\n自己資本 × 自己資本利益率 ÷ 資本還元率\n収益還元価値法\n総資本 × 総資本利益率 ÷ 資本還元率\n◆ (3) 識別可能資産及び負債\n繰延資産 時価がゼロであるため，引き継がない。\n減価償却累計額 有形固定資産を時価で計上するため，引き継がない。\n金銭債権 貸倒引当金を計上し，回収可能価額で引き継ぐ。\n企業結合日における退職給付債務及び年金資産の正味の価額に基づいて計上する\n退職給付引当金\n(未認識項目は引き継がない)。"},{"h":"４．取得(株式交換)","f":["交付株式数 交付株式数 ＝ 完全子会社となる会社の発行済株式総数 × 株式交換比率","株式交換比率 株式交換比率 ＝","交付株式数 ＝ (完全子会社となる会社の発行済株式総数 － 抱合せ株式数) × 株式交換比率","取得原価の算定 (＝その他有価証券から子会社株式への保有目的の変更)。"],"n":["※ 企業評価額の算定方法は合併の場合と同様である。"],"c":"◆ (1) 交付株式数と株式交換比率\n完全子会社となる会社の１株当たり企業評価額\n完全親会社となる会社の１株当たり企業評価額\n◆ (2) 取得関連費用\n取得関連費用のうち，子会社株式の取得に係る付随費用(証券会社への支払手数\n個別財務諸表上 料・外部のアドバイザーへの報酬等)は，金融商品会計基準に従い，子会社株式の\n取得原価に含める。\n連結財務諸表上 発生した事業年度の費用として処理する。\n◆ (3) 段階取得\n取得企業が保有している被取得企業の株式(抱合せ株式)に対して，取得企業の株式\n交付株式数の算定 は交付されない。\n【個別財務諸表上】\n・支配を獲得するに至った個々の取引ごとの原価の合計額をもって，被取得企業の\n取得原価とする。\n・抱合せ株式をその他有価証券として保有していた場合，抱合せ株式に係るその他\n有価証券評価差額金を取り消し，当該株式の帳簿価額を子会社株式に振り替える\n【連結財務諸表上】\n・支配を獲得するに至った個々の取引すべての企業結合日における時価をもって，\n被取得企業の取得原価とする。"}]},"40":{"n":"事業分離","s":[{"c":"第4一0章 事業分離会計"},{"h":"１．分離元企業の個別財務諸表上の会計処理","c":"◆ (1) 基本的考え方\n二\nSTEP１ 分離先企業が事業分離前から子会社か否か\nYES → 共通支配下の取引に該当するため，受取対価を「簿価」で計上\n（借）諸 負 債 (簿価) （貸）諸 資 産 (簿価)\n対価が現金等の財産\n借）現 金 等 (簿価)×借 移転損益(利益剰余金) (差額)\nあ\n（借）諸 負 債 (簿価) （貸）諸 資 産 (簿価)\n対価が分離先企業の株式のみ\n借）子会社株式 (差額)借\nあ\nNO → 亡STEP２へ\n二\nSTEP２ 投資の清算か投資の継続か\n受取対価が１～３ → 投資の清算に該当するため，受取対価を「時価」で計上\n受取対価が４ → 投資の継続に該当するため，受取対価を「簿価」で計上"},{"h":"１．現金等の財産"},{"h":"２．分離先企業以外の株式"},{"h":"３．分離先企業の株式(子会社株式・関連会社株式以外)"},{"h":"４．口分離先企業の株式(子会社株式・関連会社株式)","c":"（借）諸 負 債 (簿価) （貸）諸 資 産 (簿価)\n投資の清算\n借 受 取 対 価 (時価)× 借 移転損益(利益剰余金) (差額)\nあ\n（借）諸 負 債 (簿価) （貸）諸 資 産 (簿価)\n投資の継続\n借）受 取 対 価 (差額)借\nあ\n◆ (2) 事業分離に要した支出額\n事業分離に要した支出額は，発生時の事業年度の費用として処理する。"},{"h":"２．分離先企業の個別財務諸表上の会計処理","c":"分離先企業が子会社か否か\nYES → 共通支配下の取引又は逆取得に該当するため，「簿価」ベースで仕訳を行う\nNO → 取得に該当するため「時価」ベースで仕訳を行う\n（借）諸 資 産 (時価) （貸）諸 負 債 (時価)\n取得\n借 の れ ん (差額)× 借 現金等又は資本 (時価)\nあ\n共通支配下の取引 （借）諸 資 産 (簿価) （貸）諸 負 債 (簿価)\n(対価が現金等の財産) 借）の れ ん (差額)借 現 金 等 (簿価)\nあ\n共通支配下の取引 （借）諸 資 産 (簿価) （貸）諸 負 債 (簿価)\n(対価が分離先企業の株式のみ) 借）受 取 対 価 (差額)借 資 本 (差額)\nあ\n（借）諸 資 産 (簿価) （貸）諸 負 債 (簿価)\n逆取得\n借）受 取 対 価 (差額)借 資 本 (差額)\nあ\n－ 309 －"},{"h":"３．対価が現金等の財産のみの場合(連結財務諸表上の会計処理)","c":"分離先企業が 個別財務諸表上で認識された移転損益は，企業集団内部の取引から生じたもので\n子会社の場合 あるため，連結会計における未実現損益の消去に準じて処理する。\n分離先企業が 個別財務諸表上で認識された移転損益は，関連会社(企業集団外部)との取引から\n関連会社の場合 生じたものであるため，持分法会計における未実現損益の消去に準じて処理する。"},{"h":"４．対価が分離先企業の株式のみの場合(連結財務諸表上の会計処理)","c":"◆ (1) 分離先企業が子会社となる場合\n対価を分離先企業の株式のみとする事業分離において，分離先企業が子会社となる場合，連結上，分離元\n企業が移転した事業の持分を一部売却し，受け取った対価を用いて事業分離直前の分離先企業の持分を取得\nしたとみなす。\n① 事業分離前に分離先企業株式を保有しておらず，事業分離により新たに子会社となる場合\n【移転事業持分の売却】\n事業を移転したとみなされる額(移転した事業の時価×売却割合)と移転した事業に対する持分減少額\n(移転した事業の株主資本相当額×売却割合)との差額を資本剰余金として処理する。\n【分離先企業持分の取得】\n分離先企業に対して投資したとみなされる額(事業分離直前の分離先企業の時価×取得割合)と分離先\n企業に対する持分増加額(事業分離直前の分離先企業の資本合計×取得割合)との差額をのれん(又は負の\nのれん発生益)として処理する。\n② 事業分離前に分離先企業株式を保有しており，事業分離により新たに子会社となる場合\n基本的に①と同様の処理を行う。しかし，支配獲得時まで段階的に取得しているため，事業分離前に\n保有していた分離先企業の株式を支配獲得時の時価に修正し，生じた差額を段階取得に係る差損益として\n処理する。なお，事業分離前に分離先企業を関連会社としており，事業分離により子会社となった場合は，\n分離先企業の株式の持分法評価額と支配獲得時の"},{"h":"５．その他有価証券評価差額金がある場合","c":"◆ (1) 個別財務諸表上の会計処理\n分離元企業の 共通支配下の取引・投資の清算・投資の継続のいずれにおいてもその他有価証券評価\n会計処理 差額金を取り崩す。\n【取得に該当する場合】\n投資有価証券を時価で受け入れるため，その他有価証券評価差額金は引き継がない。\n分離先企業の\n【共通支配下の取引・逆取得に該当する場合】\n会計処理\n移転された資産及び負債を移転前に付された適正な帳簿価額で計上するため，その他\n有価証券評価差額金を引き継ぐ。\n◆ (2) 連結財務諸表上の会計処理\n移転した事業にその他有価証券評価差額金が含まれている場合，連結財務諸表上，当該その他有価証券\n評価差額金を非支配株主持分に按分する。また，移転した事業に係る持分減少額は，移転した事業に係る\n株主資本相当額に基づいて算定する。\n－ 312 －\n改正一論点 リースに関する会計基準\n改正論点 リースに関する会計基準"},{"h":"１．リースを構成する部分とリースを構成しない部分への対価の配分","f":["(＝対価の配分は不要となる)。"],"c":"◆ (1) 借手\n借手は契約における対価の金額について，リースを構成する部分とリースを構成しない\n部分とに配分するにあたって，それぞれの部分の独立価格の比率に基づいて配分する。\nなお，契約における対価の中に，借手に財又はサービスを移転しない活動及びコストに\n原則法\nついて借手が支払う金額が含まれる場合，借手は，当該金額を契約における対価の一部とし\nてリースを構成する部分とリースを構成しない部分とに配分する。また，借手は固定資産税\n及び保険料の金額を把握していたとしても，これを対価から控除することはしない。\nリースを構成する部分と関連するリースを構成しない部分とを合わせてリースを構成す\n例外法 る部分として会計処理するため，契約における対価のすべてがリースを構成する部分となる\n◆ (2) 貸手\n【維持管理費用相当額を契約における対価から控除しない方法】\nリースを構成する部分とリースを構成しない部分の独立販売価格の比率に基づいて，借手\nに財又はサービスを移転しない活動及びコスト(固定資産税及び保険料)を含む契約におけ\nる対価の金額について，リースを構成する部分とリースを構成しない部分とに配分する。\nなお，固定資産税及び保険料に相当する額を対価に含めていたとしても，別個に会計処理\n原則法\nを行うことはしない。\n【維持管理費用相当額を契約における対価から控除する方法】\nリースを構成する部分"},{"h":"２．借手のリース","n":["※1 リース負債の計上額は，原則として，リース開始日において未払である借手のリース料からこれに","※2 借手のリース料は，借手が借手のリース期間中に原資産を使用する権利に関して行う貸手に対する","※3 割引現在価値の算定に用いる割引率は以下のとおりである。","※4 リース負債にリース開始日までに支払った借手のリース料，付随費用及び資産除去債務に対応する","※ const DEFAULT_SR = { interval: 0, repetitions: 0, easeFactor: 2.5, nextReview: null, lastReview: null };

function updateSR(sr, quality) {
  const s = { ...sr };
  if (quality >= 3) {
    if (s.repetitions === 0) s.interval = 1;
    else if (s.repetitions === 1) s.interval = 3;
    else s.interval = Math.round(s.interval * s.easeFactor);
    s.repetitions += 1;
  } else {
    s.repetitions = 0;
    s.interval = 1;
  }
  s.easeFactor = Math.max(1.3, s.easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  const next = new Date(todayStr());
  next.setDate(next.getDate() + s.interval);
  s.nextReview = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
  s.lastReview = todayStr();
  return s;
}

function buildInitialState() {
  const srData = {};
  const history = [];
  DAY1_RECORDS.forEach(r => {
    const quality = r.result === 'correct' ? 4 : 1;
    const sr = { interval: 0, repetitions: 0, easeFactor: 2.5, nextReview: null, lastReview: null };
    // SM-2 update for Day1
    if (quality >= 3) { sr.interval = 1; sr.repetitions = 1; }
    else { sr.interval = 1; sr.repetitions = 0; }
    sr.easeFactor = Math.max(1.3, sr.easeFactor + (0.1 - (5-quality)*(0.08+(5-quality)*0.02)));
    sr.lastReview = DAY1_DATE;
    const next = new Date(DAY1_DATE);
    next.setDate(next.getDate() + sr.interval);
    sr.nextReview = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
    srData[r.id] = sr;
    history.push({ ...r, date: DAY1_DATE });
  });
  const dailySets = {};
  dailySets[DAY1_DATE] = { questions: DAY1_RECORDS, answers: DAY1_RECORDS, completed: true, date: DAY1_DATE };
  return { srData, history, dailySets };
}

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  // 初回はDay1データで初期化
  const init = buildInitialState();
  saveState(init);
  return init;
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
// 毎日17問 出題ロジック（全て新規問題・章番号順ソート）
// ═══════════════════════════════════════════════════════════
function generateDailySet(srData, date) {
  const today = date || todayStr();
  const isSogo = (p) => p.chapter.startsWith("総合");

  // 総合問題: 1問の日と2問の日を交互（日付ベース）
  const dayNum = Math.floor((new Date(today).getTime() - new Date('2025-01-01').getTime()) / 86400000);
  const sogoMax = dayNum % 2 === 0 ? 2 : 1;
  const kobetuMax = 17 - sogoMax;

  const enrichNew = (p) => ({
    ...p,
    srStatus: 'new',
    srInfo: DEFAULT_SR,
    priority: freqWeight(p.freq) * impWeight(p.imp) * 10 + (isRenketsu(p.chapter) ? 5 : 0)
  });

  // ── 総合問題の選出 ──
  const sogoUnseen = PROBLEMS.filter(p => isSogo(p) && (!srData[p.id] || !srData[p.id].lastReview))
    .map(enrichNew).sort((a, b) => b.priority - a.priority);
  const sogoByChapter = {};
  sogoUnseen.forEach(p => {
    const ch = p.chapter;
    if (!sogoByChapter[ch]) sogoByChapter[ch] = [];
    sogoByChapter[ch].push(p);
  });
  // 総合A/B/Cからラウンドロビンで選出（最大sogoMax問）
  let sogoSelected = [];
  const sogoChapters = Object.keys(sogoByChapter).sort((a,b) => {
    // 総合A→B→Cの優先順
    const order = {"総合A 連結会計":0,"総合B 在外子会社":1,"総合C 個別論点":2};
    return (order[a]||9) - (order[b]||9);
  });
  let sogoIdx = 0;
  while (sogoSelected.length < sogoMax && sogoIdx < sogoChapters.length) {
    const ch = sogoChapters[sogoIdx];
    const pick = sogoByChapter[ch].shift();
    if (pick) sogoSelected.push(pick);
    sogoIdx++;
  }

  // ── 個別問題の選出 ──
  const kobetuUnseen = PROBLEMS.filter(p => !isSogo(p) && (!srData[p.id] || !srData[p.id].lastReview))
    .map(enrichNew).sort((a, b) => b.priority - a.priority);
  const byChapter = {};
  kobetuUnseen.forEach(p => {
    const ch = p.chapter;
    if (!byChapter[ch]) byChapter[ch] = [];
    byChapter[ch].push(p);
  });
  const chapterPicks = Object.values(byChapter).map(arr => arr[0])
    .sort((a, b) => b.priority - a.priority);

  let kobetuSelected = chapterPicks.slice(0, kobetuMax);

  // 連結問題を必ず1問含める（個別問題枠内で）
  const hasRenketsu = kobetuSelected.some(q => isRenketsu(q.chapter)) || sogoSelected.some(q => isRenketsu(q.chapter));
  if (!hasRenketsu && kobetuSelected.length >= kobetuMax) {
    const renketsuPick = chapterPicks.find(c => isRenketsu(c.chapter) && !kobetuSelected.includes(c));
    if (renketsuPick) {
      kobetuSelected[kobetuSelected.length - 1] = renketsuPick;
    }
  }

  // 個別が足りない場合: 既出章の2問目から補充
  if (kobetuSelected.length < kobetuMax) {
    const selectedIds = new Set(kobetuSelected.map(s => s.id));
    const remaining = kobetuUnseen.filter(p => !selectedIds.has(p.id))
      .sort((a, b) => b.priority - a.priority);
    while (kobetuSelected.length < kobetuMax && remaining.length > 0) {
      kobetuSelected.push(remaining.shift());
    }
  }

  let selected = [...kobetuSelected, ...sogoSelected];

  // それでも17問に足りない場合（全問既出）: 復習期限超過→予定復習からフォールバック
  if (selected.length < 17) {
    const selectedIds = new Set(selected.map(s => s.id));
    const reviewCandidates = PROBLEMS.filter(p => !selectedIds.has(p.id) && srData[p.id]?.lastReview)
      .map(p => {
        const sr = srData[p.id];
        const isOverdue = sr.nextReview && sr.nextReview <= today;
        return {
          ...p,
          srStatus: isOverdue ? 'overdue' : 'review',
          srInfo: sr,
          priority: isOverdue ? 100 + daysBetween(sr.nextReview, today) : 10
        };
      })
      .sort((a, b) => b.priority - a.priority);
    while (selected.length < 17 && reviewCandidates.length > 0) {
      selected.push(reviewCandidates.shift());
    }
  }

  // 表示は章番号順にソート
  selected.sort((a, b) => a.chapterNum - b.chapterNum);
  return selected;
}

// ═══════════════════════════════════════════════════════════
// メインApp
// ═══════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState('today');
  const [state, setState] = useState(loadState);
  const [dailySet, setDailySet] = useState([]);
  const [answers, setAnswers] = useState({});
  const [memos, setMemos] = useState({});
  const [showMemo, setShowMemo] = useState({});
  const [timerStart, setTimerStart] = useState({});   // {problemId: timestamp}
  const [timerNow, setTimerNow] = useState(Date.now());
  const [elapsedTimes, setElapsedTimes] = useState({}); // {problemId: seconds}
  const [confirmReset, setConfirmReset] = useState(false);
  const [mistakeFilter, setMistakeFilter] = useState('all');
  const [expandedMistake, setExpandedMistake] = useState(null);
  const [expandedChapter, setExpandedChapter] = useState(null);
  const [mistakeMemos, setMistakeMemos] = useState({});
  const [selectedSummary, setSelectedSummary] = useState(null);

  // ── タイマー: 1秒ごとに更新 ──
  useEffect(() => {
    const hasRunning = Object.keys(timerStart).length > 0;
    if (!hasRunning) return;
    const iv = setInterval(() => setTimerNow(Date.now()), 1000);
    return () => clearInterval(iv);
  }, [Object.keys(timerStart).length]);

  const startTimer = (problemId) => {
    setTimerStart(prev => ({ ...prev, [problemId]: Date.now() }));
  };

  const stopTimer = (problemId) => {
    const start = timerStart[problemId];
    if (start) {
      const sec = Math.round((Date.now() - start) / 1000);
      setElapsedTimes(prev => ({ ...prev, [problemId]: sec }));
      setTimerStart(prev => { const n = { ...prev }; delete n[problemId]; return n; });
      return sec;
    }
    return elapsedTimes[problemId] || 0;
  };

  const formatTime = (sec) => {
    if (!sec && sec !== 0) return '--:--';
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  const getRunningTime = (problemId) => {
    const start = timerStart[problemId];
    if (!start) return elapsedTimes[problemId] || null;
    return Math.round((timerNow - start) / 1000);
  };

  const toggleMistakeExpand = (key) => {
    setExpandedMistake(prev => prev === key ? null : key);
  };

  const getGuideForChapter = (chapter) => {
    const prefix = getChapterPrefix(chapter);
    return TOPIC_GUIDE[prefix] || null;
  };

  const handleMistakeMemoSave = useCallback((problemId, memo) => {
    setMistakeMemos(prev => ({ ...prev, [problemId]: memo }));
    const newHistory = state.history.map(h => h.id === problemId ? { ...h, memo } : h);
    const newState = { ...state, history: newHistory };
    setState(newState);
    saveState(newState);
  }, [state]);

  useEffect(() => {
    const today = todayStr();
    const saved = state.dailySets[today];
    if (saved) {
      setDailySet(saved.questions);
      const ans = {}, mem = {}, times = {};
      (saved.answers || []).forEach(a => { ans[a.id] = a.result; mem[a.id] = a.memo || ''; if (a.time != null) times[a.id] = a.time; });
      setAnswers(ans);
      setMemos(mem);
      setElapsedTimes(times);
    } else {
      setDailySet(generateDailySet(state.srData, today));
    }
  }, []);

  const streak = useMemo(() => {
    let count = 0, d = new Date();
    while (true) {
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (state.dailySets[ds]?.completed) { count++; d.setDate(d.getDate()-1); }
      else if (ds === todayStr()) { d.setDate(d.getDate()-1); }
      else break;
    }
    return count;
  }, [state.dailySets]);

  const todayProgress = useMemo(() => {
    const total = dailySet.length, answered = Object.keys(answers).length;
    const correct = Object.values(answers).filter(v => v === 'correct').length;
    const wrong = answered - correct;
    return { total, answered, correct, wrong, rate: answered > 0 ? Math.round(correct / answered * 100) : 0 };
  }, [dailySet, answers]);

  const handleAnswer = useCallback((problemId, result) => {
    // タイマー停止 & 経過時間取得
    const timeSec = stopTimer(problemId);
    const newAnswers = { ...answers, [problemId]: result };
    setAnswers(newAnswers);
    const today = todayStr();
    const quality = result === 'correct' ? 4 : 1;
    const prob = PROBLEMS.find(p => p.id === problemId);
    const newSr = updateSR(state.srData[problemId] || { ...DEFAULT_SR }, quality);
    const histEntry = { id: problemId, date: today, result, chapter: prob?.chapter||'', question: prob?.q||'', memo: memos[problemId]||'', freq: prob?.freq||'', imp: prob?.imp||'', time: timeSec };
    const newState = { ...state, srData: { ...state.srData, [problemId]: newSr }, history: [...state.history, histEntry] };
    const existingAnswers = (newState.dailySets[today]?.answers || []).filter(a => a.id !== problemId);
    existingAnswers.push(histEntry);
    newState.dailySets[today] = { questions: dailySet, answers: existingAnswers, completed: Object.keys(newAnswers).length >= dailySet.length, date: today };
    setState(newState);
    saveState(newState);
  }, [answers, memos, state, dailySet, timerStart, elapsedTimes]);

  const handleMemoSave = useCallback((problemId, memo) => {
    setMemos(prev => ({ ...prev, [problemId]: memo }));
    if (answers[problemId]) {
      const today = todayStr();
      const newHistory = state.history.map(h => h.id === problemId && h.date === today ? { ...h, memo } : h);
      const ds = { ...state.dailySets };
      if (ds[today]) ds[today] = { ...ds[today], answers: (ds[today].answers||[]).map(a => a.id === problemId ? { ...a, memo } : a) };
      const newState = { ...state, history: newHistory, dailySets: ds };
      setState(newState);
      saveState(newState);
    }
  }, [answers, state]);

  const resetData = () => {
    const empty = { srData: {}, history: [], dailySets: {} };
    setState(empty); saveState(empty); setAnswers({}); setMemos({});
    setDailySet(generateDailySet({}, todayStr()));
    setConfirmReset(false);
  };

  const regenerateToday = () => {
    setDailySet(generateDailySet(state.srData, todayStr()));
    setAnswers({}); setMemos({});
    const ns = { ...state }; delete ns.dailySets[todayStr()]; setState(ns); saveState(ns);
  };

  const analysisData = useMemo(() => {
    const chapterStats = ALL_CHAPTERS.map(ch => {
      const chHist = state.history.filter(h => h.chapter === ch);
      const total = chHist.length, correct = chHist.filter(h=>h.result==='correct').length;
      const probCount = PROBLEMS.filter(p=>p.chapter===ch).length;
      const uniqueSeen = new Set(chHist.map(h=>h.id)).size;
      return { chapter: ch, chapterNum: getChapterNum(ch), stars: getStars(ch), total, correct, wrong: total-correct, rate: total>0?Math.round(correct/total*100):0, probCount, uniqueSeen };
    });
    const freqStats = {
      '◎最頻出': state.history.filter(h => h.freq?.includes('最頻出')),
      '○頻出': state.history.filter(h => h.freq?.includes('頻出') && !h.freq?.includes('最頻出')),
      '△可能性あり': state.history.filter(h => h.freq?.includes('可能性')),
      '─低め': state.history.filter(h => h.freq?.includes('低め'))
    };
    const totalAttempts = state.history.length;
    const totalCorrect = state.history.filter(h=>h.result==='correct').length;
    const uniqueDays = new Set(state.history.map(h=>h.date)).size;
    return { chapterStats, freqStats, totalAttempts, totalCorrect, uniqueDays };
  }, [state.history]);

  const mistakes = useMemo(() => {
    const wrong = state.history.filter(h => h.result === 'wrong');
    if (mistakeFilter === 'all') return wrong;
    return wrong.filter(h => getChapterPrefix(h.chapter) === mistakeFilter);
  }, [state.history, mistakeFilter]);

  const mistakesByDate = useMemo(() => {
    const g = {};
    [...mistakes].reverse().forEach(m => { if (!g[m.date]) g[m.date] = []; g[m.date].push(m); });
    return g;
  }, [mistakes]);

  // 問題別の間違い履歴（章番号順）
  const mistakesByProblem = useMemo(() => {
    const g = {};
    mistakes.forEach(m => {
      if (!g[m.id]) g[m.id] = { ...m, dates: [], memos: [] };
      g[m.id].dates.push(m.date);
      if (m.memo) g[m.id].memos.push(m.memo);
    });
    return Object.values(g).sort((a, b) => getChapterNum(a.chapter) - getChapterNum(b.chapter));
  }, [mistakes]);

  const freqBadgeClass = (f) => f.includes('最頻出')?'badge-freq-top':f.includes('頻出')?'badge-freq-high':f.includes('可能性')?'badge-freq-mid':'badge-freq-low';

  return (
    <div className="app">
      <div className="header">
        <h1>財務会計短答対策</h1>
        <div className="sub">毎日17問・忘却曲線ベース学習</div>
      </div>
      <div className="nav">
        <button className={`nav-btn ${page==='today'?'active':''}`} onClick={()=>setPage('today')}>今日の17問</button>
        <button className={`nav-btn ${page==='mistakes'?'active':''}`} onClick={()=>setPage('mistakes')}>間違い履歴</button>
        <button className={`nav-btn ${page==='analysis'?'active':''}`} onClick={()=>setPage('analysis')}>分析</button>
        <button className={`nav-btn ${page==='summary'?'active':''}`} onClick={()=>setPage('summary')}>サマリー</button>
        <button className={`nav-btn ${page==='settings'?'active':''}`} onClick={()=>setPage('settings')}>設定</button>
      </div>

      <div className="tab-content">

        {/* ═══ 今日の17問 ═══ */}
        {page === 'today' && (
          <div>
            <div className="today-info">
              <div className="date">{new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})}</div>
              <div className="day-count">学習日数: {analysisData.uniqueDays}日目 / 総解答数: {analysisData.totalAttempts}問</div>
              <div className="spaced-info">
                <span className="new">初めて: {dailySet.filter(q=>q.srStatus==='new').length}問</span>
                {' / '}
                <span className="review">要復習: {dailySet.filter(q=>q.srStatus==='overdue').length}問</span>
                {' / '}
                復習予定: {dailySet.filter(q=>q.srStatus==='review').length}問
              </div>
              {streak > 0 && <div className="streak-badge">🔥 {streak}日連続学習中</div>}
            </div>

            <div className="stats-row">
              <div className="stat-card"><div className="val">{todayProgress.answered}/{todayProgress.total}</div><div className="lbl">解答済み</div></div>
              <div className="stat-card"><div className="val green">{todayProgress.correct}</div><div className="lbl">正解</div></div>
              <div className="stat-card"><div className="val red">{todayProgress.wrong}</div><div className="lbl">不正解</div></div>
              <div className="stat-card"><div className={`val ${todayProgress.rate>=80?'green':todayProgress.rate>=60?'orange':'red'}`}>{todayProgress.rate}%</div><div className="lbl">正答率</div></div>
            </div>
            {(() => {
              const times = Object.values(elapsedTimes).filter(t => t != null);
              if (times.length === 0) return null;
              const total = times.reduce((a,b) => a+b, 0);
              const avg = Math.round(total / times.length);
              return (
                <div className="stats-row" style={{gridTemplateColumns:'repeat(3,1fr)',marginTop:0}}>
                  <div className="stat-card"><div className="val" style={{fontSize:18}}>{formatTime(total)}</div><div className="lbl">合計時間</div></div>
                  <div className="stat-card"><div className="val" style={{fontSize:18}}>{formatTime(avg)}</div><div className="lbl">平均/問</div></div>
                  <div className="stat-card"><div className="val" style={{fontSize:18}}>{times.length}</div><div className="lbl">計測済み</div></div>
                </div>
              );
            })()}

            <div className="progress-bar"><div className="progress-fill" style={{width:`${todayProgress.total>0?todayProgress.answered/todayProgress.total*100:0}%`}}/></div>

            {todayProgress.answered === todayProgress.total && todayProgress.total > 0 && (
              <div className="completion-banner">
                <h2>本日の学習完了！</h2>
                <p>正答率 {todayProgress.rate}% ({todayProgress.correct}/{todayProgress.total})</p>
                <button className="btn btn-secondary" style={{marginTop:10}} onClick={regenerateToday}>もう一度新しいセットを生成</button>
              </div>
            )}

            <div className="question-list">
              {dailySet.map((q, i) => {
                const answered = answers[q.id];
                const cardClass = answered==='correct'?'answered-correct':answered==='wrong'?'answered-wrong':(!answered && i===Object.keys(answers).length?'current':'');
                return (
                  <div key={q.id} className={`q-card ${cardClass}`}>
                    <div className="q-top">
                      <span className="q-num">
                        Q{i+1}
                        {' '}
                        <span className={`sr-badge ${q.srStatus==='new'?'sr-new':q.srStatus==='overdue'?'sr-overdue':'sr-review'}`}>
